  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── useWindowWidth hook ──────────────────────────────────────────────────────
    function useWindowWidth() {
      const [w, setW] = useState(window.innerWidth);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);
      return w;
    }

    // ── Config ───────────────────────────────────────────────────────────────────
    const API_V1  = "https://api.balldontlie.io/v1";
    const API_KEY = "60bc54f3-f8d0-4f96-b7c0-bd6cb513e7ef";
    const SEASON  = 2025; // 2025-26 season
    const logoUrl = abbr => `https://a.espncdn.com/i/teamlogos/nba/500/${String(abbr ?? "").toLowerCase()}.png`;

    // ── TheSportsDB photo cache & fetcher ────────────────────────────────────────
    // key: "Firstname Lastname" → URL string | null (null = tried, not found)
    const sportsDbCache = {};
    async function fetchSportsDbPhoto(firstName, lastName) {
      const key = `${firstName} ${lastName}`;
      if (key in sportsDbCache) return sportsDbCache[key];
      try {
        const r = await fetch(
          `https://www.thesportsdb.com/api/v1/json/123/searchplayers.php?p=${encodeURIComponent(key)}`
        );
        if (!r.ok) { sportsDbCache[key] = null; return null; }
        const data = await r.json();
        const pl = data.player?.[0];
        const url = pl?.strThumb || pl?.strCutout || null;
        sportsDbCache[key] = url;
        return url;
      } catch { sportsDbCache[key] = null; return null; }
    }


    // ── All 30 teams ─────────────────────────────────────────────────────────────
    const ALL_TEAMS = [
      {abbreviation:"ATL",city:"Atlanta",      name:"Hawks"},       {abbreviation:"BOS",city:"Boston",       name:"Celtics"},
      {abbreviation:"BKN",city:"Brooklyn",     name:"Nets"},        {abbreviation:"CHA",city:"Charlotte",    name:"Hornets"},
      {abbreviation:"CHI",city:"Chicago",      name:"Bulls"},       {abbreviation:"CLE",city:"Cleveland",    name:"Cavaliers"},
      {abbreviation:"DAL",city:"Dallas",       name:"Mavericks"},   {abbreviation:"DEN",city:"Denver",       name:"Nuggets"},
      {abbreviation:"DET",city:"Detroit",      name:"Pistons"},     {abbreviation:"GSW",city:"Golden State", name:"Warriors"},
      {abbreviation:"HOU",city:"Houston",      name:"Rockets"},     {abbreviation:"IND",city:"Indiana",      name:"Pacers"},
      {abbreviation:"LAC",city:"LA",           name:"Clippers"},    {abbreviation:"LAL",city:"Los Angeles",  name:"Lakers"},
      {abbreviation:"MEM",city:"Memphis",      name:"Grizzlies"},   {abbreviation:"MIA",city:"Miami",        name:"Heat"},
      {abbreviation:"MIL",city:"Milwaukee",    name:"Bucks"},       {abbreviation:"MIN",city:"Minnesota",    name:"Timberwolves"},
      {abbreviation:"NOP",city:"New Orleans",  name:"Pelicans"},    {abbreviation:"NYK",city:"New York",     name:"Knicks"},
      {abbreviation:"OKC",city:"Oklahoma City",name:"Thunder"},     {abbreviation:"ORL",city:"Orlando",      name:"Magic"},
      {abbreviation:"PHI",city:"Philadelphia", name:"76ers"},       {abbreviation:"PHX",city:"Phoenix",      name:"Suns"},
      {abbreviation:"POR",city:"Portland",     name:"Trail Blazers"},{abbreviation:"SAC",city:"Sacramento",  name:"Kings"},
      {abbreviation:"SAS",city:"San Antonio",  name:"Spurs"},       {abbreviation:"TOR",city:"Toronto",      name:"Raptors"},
      {abbreviation:"UTA",city:"Utah",         name:"Jazz"},        {abbreviation:"WAS",city:"Washington",   name:"Wizards"},
    ];

    // NBA conference split (East / West)
    const EAST_ABBRS = ["ATL","BOS","BKN","CHA","CHI","CLE","DET","IND","MIA","MIL","NYK","ORL","PHI","TOR","WAS"];
    const WEST_ABBRS = ["DAL","DEN","GSW","HOU","LAC","LAL","MEM","MIN","NOP","OKC","PHX","POR","SAC","SAS","UTA"];

    // ── BallDontLie API ──────────────────────────────────────────────────────────
    async function apiFetch(path) {
      try {
        const r = await fetch(`${API_V1}${path}`, { headers: { Authorization: API_KEY } });
        if (!r.ok) return { _err: r.status };
        return await r.json(); // await so JSON parse errors are caught below
      } catch { return { _err: "network" }; }
    }

    async function fetchAll(basePath) {
      let all = [], cursor = null;
      while (true) {
        const sep = basePath.includes("?") ? "&" : "?";
        const res = await apiFetch(`${basePath}${sep}per_page=100${cursor ? `&cursor=${cursor}` : ""}`);
        if (res._err) return { _err: res._err };
        all = all.concat(res.data ?? []);
        cursor = res.meta?.next_cursor ?? null;
        if (!cursor) break;
      }
      return { data: all };
    }

    // ── Team ID → team object (populated once, used to look up opponents) ────────
    // /stats only returns home_team_id/visitor_team_id numbers, not full objects.
    const teamsById = {};
    async function ensureTeamsById() {
      if (Object.keys(teamsById).length > 0) return;
      const res = await fetchAll("/teams");
      (res.data ?? []).forEach(t => { if (t.id) teamsById[t.id] = t; });
    }

    function parseMin(m) {
      if (!m) return 0;
      const s = String(m);
      if (s.includes(":")) { const [mins, secs] = s.split(":").map(Number); return mins + (secs || 0) / 60; }
      return parseFloat(s) || 0;
    }

    async function fetchPlayerStats(playerId) {
      const res = await fetchAll(`/stats?player_ids[]=${playerId}&seasons[]=${SEASON}`);
      if (res._err) return { avg: null, lastGames: [], top5: [] };
      const all = res.data ?? [];
      // Only count games where player actually played (has minutes)
      const played = all.filter(g => parseMin(g.min) > 0);
      // Last 5 games by date (all games, not just played)
      const lastGames = [...all]
        .filter(g => g.game?.date)
        .sort((a, b) => new Date(b.game.date) - new Date(a.game.date))
        .slice(0, 5);
      // Top 5 performances this season by combined PTS+REB+AST
      const top5 = [...played]
        .filter(g => g.game?.date)
        .sort((a, b) => ((b.pts??0)+(b.reb??0)+(b.ast??0)) - ((a.pts??0)+(a.reb??0)+(a.ast??0)))
        .slice(0, 5);
      // W/L impact: compare team record with player playing vs without
      const gameResult = g => {
        const weAreHome = g.team?.id === g.game?.home_team_id;
        const our = weAreHome ? g.game?.home_team_score : g.game?.visitor_team_score;
        const their = weAreHome ? g.game?.visitor_team_score : g.game?.home_team_score;
        return (our != null && their != null && our !== their) ? our > their : null;
      };
      const withGames   = played.filter(g => g.game?.date);
      const withoutGames = all.filter(g => parseMin(g.min) <= 0 && g.game?.date);
      const withW  = withGames.filter(g => gameResult(g) === true).length;
      const withL  = withGames.filter(g => gameResult(g) === false).length;
      const woW    = withoutGames.filter(g => gameResult(g) === true).length;
      const woL    = withoutGames.filter(g => gameResult(g) === false).length;
      const withPct   = (withW + withL)  > 0 ? withW  / (withW  + withL)  : null;
      const withoutPct = (woW  + woL)    > 0 ? woW    / (woW   + woL)     : null;
      const impact = { withW, withL, withPct, woW, woL, withoutPct };

      if (!played.length) return { avg: null, lastGames, top5, impact };
      const n = played.length;
      const sum = key => played.reduce((acc, g) => acc + (parseFloat(g[key]) || 0), 0);
      const fgm = sum("fgm"), fga = sum("fga");
      const fg3m = sum("fg3m"), fg3a = sum("fg3a");
      const ftm = sum("ftm"), fta = sum("fta");
      return {
        lastGames,
        top5,
        impact,
        avg: {
          games_played: n,
          pts: +(sum("pts") / n).toFixed(1),
          reb: +(sum("reb") / n).toFixed(1),
          ast: +(sum("ast") / n).toFixed(1),
          stl: +(sum("stl") / n).toFixed(1),
          blk: +(sum("blk") / n).toFixed(1),
          min: +(played.reduce((a, g) => a + parseMin(g.min), 0) / n).toFixed(1),
          fg_pct:  fga  > 0 ? fgm  / fga  : null,
          fg3_pct: fg3a > 0 ? fg3m / fg3a : null,
          ft_pct:  fta  > 0 ? ftm  / fta  : null,
        },
      };
    }

    // ── Fetch player stats for a set of game IDs (triple double detection) ───────
    async function fetchStatsForGameIds(gameIds) {
      if (!gameIds.length) return [];
      // Fetch in one call; BDL allows multiple game_ids[] params
      const query = gameIds.slice(0, 12).map(id => `game_ids[]=${id}`).join("&");
      const res = await fetchAll(`/stats?${query}`);
      if (res._err) return [];
      // Only include players who actually played (have minutes)
      return (res.data ?? []).filter(s => parseMin(s.min) > 0);
    }

    // ── Standings ────────────────────────────────────────────────────────────────
    // Fetch full-season standings.
    // Strategy: try /standings first (fast, 1 call). If empty/error, fall back to
    // fetching every game this season and computing W-L from final scores.
    async function fetchStandings() {
      // ── Attempt 1: /standings endpoint ──────────────────────────────────────
      const res = await apiFetch(`/standings?season=${SEASON}`);
      if (!res._err && res.data?.length) {
        const map = {};
        res.data.forEach(s => {
          const abbr = s.team?.abbreviation;
          if (!abbr) return;
          map[abbr] = { wins: s.wins ?? 0, losses: s.losses ?? 0 };
        });
        if (Object.keys(map).length > 0) return map;
      }

      // ── Attempt 2: compute from every game this season ───────────────────────
      // fetchAll handles cursor-based pagination automatically (~10 pages for a full season)
      const gRes = await fetchAll(`/games?seasons[]=${SEASON}`);
      if (gRes._err) return {};
      const map = {};
      (gRes.data ?? []).forEach(g => {
        if (g.status !== "Final") return;
        const hs = g.home_team_score ?? 0, vs = g.visitor_team_score ?? 0;
        if (hs === 0 && vs === 0) return;           // no score recorded yet
        const homeWon = hs > vs;
        const homeAbbr = g.home_team?.abbreviation;
        const visAbbr  = g.visitor_team?.abbreviation;
        if (homeAbbr) {
          if (!map[homeAbbr]) map[homeAbbr] = { wins: 0, losses: 0 };
          homeWon ? map[homeAbbr].wins++ : map[homeAbbr].losses++;
        }
        if (visAbbr) {
          if (!map[visAbbr]) map[visAbbr] = { wins: 0, losses: 0 };
          homeWon ? map[visAbbr].losses++ : map[visAbbr].wins++;
        }
      });
      return map;
    }

    // Build a quick W-L map from only the games loaded in the local cache (7 days).
    // Used as an immediate placeholder while the full-season fetch is in flight.
    function computeStandingsFromGames(cache) {
      const map = {};
      Object.values(cache).forEach(games => {
        (games ?? []).forEach(g => {
          if (g.status !== "Final" || g.home.score == null || g.visitor.score == null) return;
          const homeWon = (g.home.score ?? 0) > (g.visitor.score ?? 0);
          [[g.home, homeWon], [g.visitor, !homeWon]].forEach(([side, won]) => {
            const abbr = side.abbreviation;
            if (!abbr) return;
            if (!map[abbr]) map[abbr] = { wins: 0, losses: 0 };
            won ? map[abbr].wins++ : map[abbr].losses++;
          });
        });
      });
      return map;
    }

    // ── Date helpers ─────────────────────────────────────────────────────────────
    function dateStr(daysAgo = 0) {
      const d = new Date(); d.setDate(d.getDate() - daysAgo);
      return d.toISOString().split("T")[0];
    }
    function fmtDate(s) { return new Date(s + "T12:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric" }); }
    // Parse BallDontLie status strings into { time, ampm, tz } — displayed in Jerusalem/Israel time
    function fmtGameTime(status) {
      if (!status) return null;
      // Format 1: "7:30 pm ET" — legacy format; convert to Israel time
      const m = status.match(/(\d{1,2}):(\d{2})\s*(am|pm)/i);
      if (m) {
        try {
          const srcTz = /PT/i.test(status) ? "America/Los_Angeles"
                      : /CT/i.test(status) ? "America/Chicago"
                      : /MT/i.test(status) ? "America/Denver"
                      :                      "America/New_York";
          const today = new Date().toLocaleDateString("en-CA");
          const etDate = new Date(`${today}T${m[1].padStart(2,"0")}:${m[2]}:00`);
          // Adjust by converting "as if" it's that time in srcTz
          const srcOffset = new Date().toLocaleString("en-US", { timeZone: srcTz, timeZoneName:"shortOffset" }).match(/GMT([+-]\d+)/)?.[1] ?? "-5";
          etDate.setHours(etDate.getHours() - parseInt(srcOffset));
          if (!isNaN(etDate.getTime())) {
            const ilStr = new Intl.DateTimeFormat("en-US", {
              timeZone: "Asia/Jerusalem", hour: "numeric", minute: "2-digit", hour12: true,
            }).format(etDate);
            const il = ilStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (il) return { time: `${il[1]}:${il[2]}`, ampm: il[3].toUpperCase(), tz: "IL" };
          }
        } catch(e) {}
        return { time: `${m[1]}:${m[2]}`, ampm: m[3].toUpperCase(), tz: "IL" };
      }
      // Format 2: ISO timestamp "2026-03-01T00:30:00.000Z" — BallDontLie v1 /games API
      if (/^\d{4}-\d{2}-\d{2}T\d/.test(status)) {
        const d = new Date(status);
        if (!isNaN(d.getTime())) {
          const ilStr = new Intl.DateTimeFormat("en-US", {
            timeZone: "Asia/Jerusalem", hour: "numeric", minute: "2-digit", hour12: true,
          }).format(d);
          const iso = ilStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
          if (iso) return { time: `${iso[1]}:${iso[2]}`, ampm: iso[3].toUpperCase(), tz: "IL" };
        }
      }
      return null;
    }
    function dayLabel(s) {
      if (s === dateStr(-1)) return "Tomorrow";
      if (s === dateStr(0))  return "Today";
      if (s === dateStr(1))  return "Yesterday";
      return new Date(s + "T12:00:00").toLocaleDateString("en-US", { weekday:"short" });
    }
    const DATES = Array.from({ length: 7 }, (_, i) => dateStr(i));
    // Future dates: next 6 days (daysAgo = -1 = tomorrow, -2 = day after, etc.)
    const FUTURE_DATES = Array.from({ length: 6 }, (_, i) => dateStr(-(i + 1)));
    // Extended range for Don't Miss page – 10 days balances streak accuracy vs API load
    const DONT_MISS_DATES = Array.from({ length: 10 }, (_, i) => dateStr(i));
    // Classic NBA rivalries (pairs of team abbreviations)
    const RIVALRIES = [
      ["BOS","LAL"],["CHI","DET"],["NYK","MIA"],["LAL","GSW"],["BOS","PHI"],
      ["LAL","SAC"],["GSW","CLE"],["OKC","MIA"],["CHI","NYK"],["MIL","BOS"],
      ["PHX","LAL"],["LAC","LAL"],["HOU","GSW"],["UTA","LAL"],["DET","IND"],
      ["TOR","PHI"],["MIL","BKN"],["BOS","MIA"],["NYK","BKN"],["LAL","PHX"],
    ];

    // ── Firebase Config ──────────────────────────────────────────────────────────
    // Setup: go to console.firebase.google.com → New Project → Web App → copy config here
    // Enable: Authentication > Email/Password  AND  Firestore Database
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBa8wrrnzBq0oRVmRo5ZyUwGS44rOSlbOY",
      authDomain: "nab-catchup.firebaseapp.com",
      projectId: "nab-catchup",
      storageBucket: "nab-catchup.firebasestorage.app",

    // ── Data normalisation ───────────────────────────────────────────────────────
    const byPts = arr => [...arr].sort((a, b) => (b.pts ?? 0) - (a.pts ?? 0));
    function fromBoxScores(raw) {
      return raw.map(g => ({
        id: g.id, status: g.status,
        home:    { ...g.home_team,    score: g.home_team_score,    players: byPts(g.home_team?.players    ?? []) },
        visitor: { ...g.visitor_team, score: g.visitor_team_score, players: byPts(g.visitor_team?.players ?? []) },
      }));
    }
    function fromGamesStats(games, stats) {
      return games.map(g => {
        const gs = stats.filter(s => s.game?.id === g.id);
        const isFinal = g.status === "Final";
        // Normalise score: for non-Final games, treat 0 as null (game hasn't started yet)
        // The /games API always returns 0 for unplayed games; null makes downstream
        // "upcoming" checks (score == null) work correctly everywhere.
        const hScore = isFinal ? g.home_team_score    : (g.home_team_score    > 0 ? g.home_team_score    : null);
        const vScore = isFinal ? g.visitor_team_score : (g.visitor_team_score > 0 ? g.visitor_team_score : null);
        return {
          id: g.id, status: g.status,
          home:    { ...g.home_team,    score: hScore, players: byPts(gs.filter(s => s.team?.id === g.home_team?.id)) },
          visitor: { ...g.visitor_team, score: vScore, players: byPts(gs.filter(s => s.team?.id === g.visitor_team?.id)) },
        };
      });
    }
    async function loadGames(date) {
      // Always call BOTH APIs for today and future dates:
      //   • box_scores  → has player stats but ONLY for games already started/finished
      //   • /games      → has ALL scheduled games (including not-yet-started)
      // We merge them so nothing is missing mid-game-day.
      const isCurrentOrFuture = date >= dateStr(0);
      const box = await fetchAll(`/box_scores?date=${date}`);
      const boxGames = !box._err ? fromBoxScores(box.data ?? []) : [];
      const boxIds   = new Set(boxGames.map(g => String(g.id)));

      if (isCurrentOrFuture || boxIds.size === 0) {
        const [gRes, sRes] = await Promise.all([
          fetchAll(`/games?dates[]=${date}`),
          fetchAll(`/stats?dates[]=${date}`),
        ]);
        if (gRes._err && boxIds.size === 0) return { games: null, errCode: gRes._err };
        const schedGames = fromGamesStats(gRes.data ?? [], sRes?.data && !sRes._err ? sRes.data : []);
        // Merge: box_scores data takes priority (has player stats);
        // add any /games entries not already covered by box_scores.
        const merged = [...boxGames, ...schedGames.filter(g => !boxIds.has(String(g.id)))];
        return { games: merged };
      }
      return { games: boxGames };
    }

    // ── PlayerPhoto — TheSportsDB, lazy-fetched, globally cached ─────────────────
    // fetchDelay: ms to wait before starting fetch (use to prioritise POTG > TopPerformers > Favorites)
    function PlayerPhoto({ player, size = 40, fetchDelay = 0 }) {
      const firstName = player?.first_name ?? "";
      const lastName  = player?.last_name  ?? "";
      const cacheKey  = firstName && lastName ? `${firstName} ${lastName}` : null;

      // undefined = not yet fetched | null = tried, none found | string = URL
      const [src, setSrc] = useState(() =>
        cacheKey && cacheKey in sportsDbCache ? sportsDbCache[cacheKey] : undefined
      );
      const [failed, setFailed] = useState(false);

      useEffect(() => {
        if (!cacheKey) return;
        if (cacheKey in sportsDbCache) { setSrc(sportsDbCache[cacheKey]); return; }
        // Fetch once per unique name; result stored in module-level cache.
        // fetchDelay lets POTG photos (0ms) load before TopPerformers (200ms) and Favorites (1000ms).
        const id = setTimeout(() =>
          fetchSportsDbPhoto(firstName, lastName).then(url => setSrc(url)),
        fetchDelay);
        return () => clearTimeout(id);
      }, [cacheKey]);

      const initials = `${firstName[0] ?? ""}${lastName[0] ?? ""}`;
      const circleStyle = { width:size, height:size, borderRadius:"50%", flexShrink:0 };

      if (!src || failed) return (
        <div style={{ ...circleStyle, background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize: size * 0.32, fontWeight:800, color:"white" }}>
          {initials}
        </div>
      );
      return (
        <img src={src} alt={initials}
          style={{ ...circleStyle, objectFit:"cover", objectPosition:"top center" }}
          onError={() => setFailed(true)} />
      );
    }

    // ── YouTube — GAMETIME HIGHLIGHTS search → direct link ───────────────────────
    // Search without a channelId filter — "GAMETIME HIGHLIGHTS" in the query is
    // enough for YouTube's ranking to surface that channel's video at #1.
    const YT_KEY = "AIzaSyAaUCsLHh-Md-A505oS261I_wC8OXF1Q1Q";

    async function searchGametimeHighlight(game, date) {
      try {
        const d   = new Date(date + "T12:00:00");
        const mon = d.toLocaleDateString("en-US", { month:"short" });
        const day = d.getDate();
        const yr  = d.getFullYear();
        // Exact channel name in query ensures the right channel surfaces first
        const q = `"GAMETIME HIGHLIGHTS" ${game.visitor.name} vs ${game.home.name} ${mon} ${day} ${yr}`;
        const params = new URLSearchParams({
          part: "snippet", q, type: "video", order: "relevance",
          maxResults: "5", key: YT_KEY,
        });
        const r = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
        if (!r.ok) return null;
        const data = await r.json();
        // Pick the first result whose title contains "GAMETIME HIGHLIGHTS" (case-insensitive)
        const items = data.items ?? [];
        const match = items.find(v =>
          (v.snippet?.channelTitle ?? "").toLowerCase().includes("gametime highlights") ||
          (v.snippet?.title       ?? "").toLowerCase().includes("gametime highlights")
        ) ?? items[0]; // fall back to top result if none match by name
        return match?.id?.videoId ?? null;
      } catch { return null; }
    }

                          color:"rgba(255,255,255,0.9)", display:"inline-block", lineHeight:1.4 }}>
                          {standings[game.home.abbreviation].wins}–{standings[game.home.abbreviation].losses}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── FINAL / LIVE score header ── */}
            {!isUpcoming && (
              <div style={{ background:"linear-gradient(145deg,#1e1b4b 0%,#1e3a8a 60%,#1d4ed8 100%)",
                padding:isMobile?"14px 10px 10px":"20px 14px 14px", position:"relative", overflow:"hidden" }}>

                <div style={{ position:"absolute", inset:0, opacity:0.06,
                  backgroundImage:"repeating-linear-gradient(135deg,white 0px,white 1px,transparent 1px,transparent 12px)" }} />
                <div style={{ display:"flex", alignItems:"center", position:"relative" }}>
                  {[game.visitor, game.home].map((side, si) => {
                    const rec = standings?.[side.abbreviation];
                    const won = si===0 ? visitorWon : homeWon;
                    const faded = !spoilerMode && (si===0 ? homeWon : visitorWon);
                    return (
                      <div key={si} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                        opacity:faded?0.35:1, transition:"opacity 0.3s" }}>
                        <TeamLogo abbr={side.abbreviation} size={isMobile?36:52} />
                        <span style={{ fontSize:isMobile?10:11, fontWeight:700,
                          color:"rgba(255,255,255,0.75)", letterSpacing:"0.1em" }}>{side.abbreviation}</span>
                        <span style={{ fontSize:isMobile?28:40, fontWeight:900, lineHeight:1,
                          filter:spoilerMode?"blur(10px)":"none", transition:"filter 0.4s", userSelect:spoilerMode?"none":"auto",
                          color:spoilerMode?"rgba(255,255,255,0.3)":won?"white":"rgba(255,255,255,0.45)" }}>
                          {side.score??"—"}
                        </span>
                        {rec && !spoilerMode && (
                          <span style={{ fontSize:isMobile?9:10, fontWeight:700,
                            color:"rgba(255,255,255,0.5)", letterSpacing:"0.03em" }}>
                            {rec.wins}–{rec.losses}
                          </span>
                        )}
                      </div>
                    );
                  })}
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"0 8px", gap:8 }}>
                    <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
                      padding:"4px 10px", borderRadius:20, whiteSpace:"nowrap",
                      background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.22)",
                      color: spoilerMode ? "rgba(255,255,255,0.5)" : isFinal ? "white" : "#4ade80" }}>
                      {spoilerMode ? "VS" : isFinal ? "FINAL" : game.status ?? "LIVE"}
                    </span>
                    <span style={{ color:"rgba(255,255,255,0.25)", fontSize:22, fontWeight:200 }}>·</span>
                  </div>
                </div>
              </div>
            )}

            {/* Player of the Game */}
            {!isUpcoming && !spoilerMode && star?.player && star.pts != null && (
              <div style={{ padding:"10px 14px", background:"rgba(245,158,11,0.12)",
                borderTop:"1px solid rgba(245,158,11,0.25)", borderBottom:"1px solid rgba(245,158,11,0.15)",
                display:"flex", alignItems:"center", gap:12 }}>
                <PlayerPhoto player={star.player} size={48} />
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:9, fontWeight:700, color:"#fbbf24", textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:2 }}>
                    🏆 Player of the Game · {winningTeam.abbreviation}
                  </p>
                  <p style={{ fontSize:13, fontWeight:700, color:"white", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {star.player.first_name} {star.player.last_name}
                  </p>
                  <p style={{ fontSize:10, color:"rgba(251,191,36,0.7)", marginTop:1 }}>
                    {[star.reb&&`${star.reb} reb`, star.ast&&`${star.ast} ast`, star.stl&&`${star.stl} stl`].filter(Boolean).join(" · ")}
                  </p>
                </div>
                <div style={{ flexShrink:0, textAlign:"center" }}>
                  <div style={{ fontSize:28, fontWeight:900, color:"#f59e0b", lineHeight:1 }}>{star.pts}</div>
                  <div style={{ fontSize:9, color:"#d97706", fontWeight:700 }}>PTS</div>
                </div>
              </div>
            )}

            {/* Mini stats — only for finished games */}
            {isFinal && !spoilerMode && hasStats && (
              <div style={{ borderTop:"1px solid rgba(255,255,255,0.08)" }}>
                {[game.visitor, game.home].map((side, si) => {
                  const top = (side.players ?? []).slice(0, 4);
                  if (!top.length) return null;
                  return (
                    <div key={si} style={{ borderBottom:si===0?"1px solid rgba(255,255,255,0.08)":"none" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 12px 3px",
                        background:si===0?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.03)" }}>
                        <TeamLogo abbr={side.abbreviation} size={16} />
                        <span style={{ fontSize:10, fontWeight:800, color:"#fbbf24", letterSpacing:"0.06em" }}>{side.abbreviation}</span>
                        <span style={{ marginLeft:"auto", fontSize:10, fontWeight:900, color:"white" }}>{side.score}</span>
                      </div>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11, tableLayout:"fixed" }}>
                        <colgroup>
                          <col style={{ width:"auto" }} />
                          <col style={{ width:36 }} />
                          <col style={{ width:36 }} />
                          <col style={{ width:36 }} />
                        </colgroup>
                        <thead>
                          <tr style={{ background:"rgba(245,158,11,0.1)" }}>
                            <th style={{ textAlign:"left", padding:"4px 10px", fontWeight:600, color:"#fbbf24", fontSize:10 }}>Player</th>
                            {["PTS","REB","AST"].map(h => <th key={h} style={{ width:36, padding:"4px 4px", textAlign:"center", fontWeight:600, color:"#fbbf24", fontSize:10 }}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {top.map((p, i) => {
                            const pl = p.player ?? {};
                            return (
                              <tr key={pl.id??i} style={{ background:i%2===0?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                                <td style={{ padding:"5px 10px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                                  <span style={{ color:"white", fontWeight:500 }}>{pl.first_name?.[0]}. {pl.last_name}</span>
                                </td>
                                <td style={{ width:36, padding:"5px 4px", textAlign:"center", fontWeight:800, color:"white" }}>{p.pts??"—"}</td>
                                <td style={{ width:36, padding:"5px 4px", textAlign:"center", color:"#60a5fa" }}>{p.reb??"—"}</td>
                                <td style={{ width:36, padding:"5px 4px", textAlign:"center", color:"#60a5fa" }}>{p.ast??"—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Footer */}
            <div style={{ padding:"10px 12px", marginTop:"auto", display:"flex", flexDirection:"column", gap:6 }}>
              {isUpcoming ? (
                <p style={{ fontSize:10, color:"#a5b4fc", textAlign:"center", padding:"4px 0", fontWeight:600 }}>
                  📅 Upcoming — check back after tip-off
                </p>
              ) : (
                <>
                  {spoilerMode ? (
                    <p style={{ fontSize:10, color:"#bfdbfe", textAlign:"center", padding:"5px 0" }}>🙈 Spoiler mode on</p>
                  ) : (
                    hasStats ? (
                      <button onClick={() => setModal(true)} style={{ width:"100%", padding:"9px 12px",
                        borderRadius:12, background:"rgba(245,158,11,0.15)", border:"1px solid rgba(245,158,11,0.35)",
                        color:"#fbbf24", fontSize:11, fontWeight:700, letterSpacing:"0.04em" }}
                        onMouseEnter={e => e.currentTarget.style.background="rgba(245,158,11,0.25)"}
                        onMouseLeave={e => e.currentTarget.style.background="rgba(245,158,11,0.15)"}>
                        Full Box Score →
                      </button>
                    ) : (
                      <p style={{ fontSize:10, color:"#bfdbfe", textAlign:"center", padding:"2px 0" }}>Full stats require GOAT / ALL-STAR tier</p>
                    )
                  )}
                  {isFinal && <HighlightsButton game={game} date={date} />}
                </>
              )}
            </div>
          </div>
          {modal && <BoxScoreModal game={game} onClose={() => setModal(false)} />}
        </>
      );
    }

    // ── Player Detail View ────────────────────────────────────────────────────────
    function PlayerView({ player: initialPlayer, onBack }) {
      const isMobile = useWindowWidth() < 600;
      const [player, setPlayer] = useState(initialPlayer);
      const [avg,    setAvg]    = useState(undefined); // undefined=loading, null=no data
      const [games,  setGames]  = useState(undefined);
      const [top5,   setTop5]   = useState(undefined);
      const [impact, setImpact] = useState(undefined);

      useEffect(() => {
        setPlayer(initialPlayer);
        setAvg(undefined); setGames(undefined); setTop5(undefined); setImpact(undefined);
        // Ensure team IDs are loaded first so opponent names resolve correctly
        ensureTeamsById().then(() =>
          fetchPlayerStats(initialPlayer.id).then(({ avg, lastGames, top5, impact }) => {
            setAvg(avg ?? null);
            setGames(lastGames);
            setTop5(top5 ?? []);
            setImpact(impact ?? null);
          })
        );
      }, [initialPlayer.id]);

      const pct = v => v != null ? `${(v * 100).toFixed(1)}%` : "—";
      const statFmt = v => v != null ? (+v).toFixed(1) : "—";

      // Momentum trend
      const trend = (() => {
        if (!games?.length || avg == null) return null;
        const avgPts = avg.pts ?? 0;
        const above = games.filter(g => (g.pts ?? 0) >= avgPts).length;
        if (above >= 4) return { label:"🔥 On Fire", color:"#f59e0b", bg:"#fffbeb" };
        if (above <= 1) return { label:"❄️ Cold Stretch", color:"#60a5fa", bg:"#eff6ff" };
        return { label:"→ Steady", color:"#22c55e", bg:"#f0fdf4" };
      })();

      return (
        <div>
          {/* Header */}
          <div style={{ background:"rgba(8,12,28,0.88)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", borderBottom:"1px solid rgba(245,158,11,0.2)" }}>
            <div style={{ maxWidth:900, margin:"0 auto", padding:isMobile?"12px 16px":"18px 24px" }}>
              <button onClick={onBack} style={{ background:"rgba(245,158,11,0.15)", border:"1px solid rgba(245,158,11,0.35)",
                borderRadius:10, padding:isMobile?"6px 10px":"8px 14px", color:"#fbbf24", fontWeight:700, fontSize:isMobile?12:13, marginBottom:isMobile?12:18 }}>
                ← Back
              </button>
              <div style={{ display:"flex", alignItems:"center", gap:isMobile?12:20 }}>
                <PlayerPhoto player={player} size={isMobile?56:80} />
                <div>
                  <p style={{ fontSize:isMobile?11:12, color:"#fbbf24", fontWeight:600 }}>
                    {player.team?.abbreviation && <><TeamLogo abbr={player.team.abbreviation} size={isMobile?16:18} style={{verticalAlign:"middle"}} />{" "}</>}
                    {player.team?.full_name ?? player.team?.abbreviation}
                    {!isMobile && player.position ? ` · ${player.position}` : ""}
                  </p>
                  <h2 style={{ fontSize:isMobile?20:26, fontWeight:900, color:"white", lineHeight:1.1 }}>
                    {player.first_name} {player.last_name}
                  </h2>
                  {player.jersey_number && <p style={{ fontSize:isMobile?11:12, color:"rgba(255,255,255,0.5)", marginTop:2 }}>#{player.jersey_number}</p>}
                </div>
                {!isMobile && player.team?.abbreviation && (
                  <div style={{ marginLeft:"auto" }}>
                    <TeamLogo abbr={player.team.abbreviation} size={64} />
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", padding:isMobile?"16px":"24px", display:"flex", flexDirection:"column", gap:isMobile?12:20 }}>

            {/* Season Averages */}
            <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:20, border:"1px solid rgba(245,158,11,0.22)",
              boxShadow:"0 4px 20px rgba(0,0,0,0.4)", padding:"20px 24px" }}>
              <h3 style={{ fontSize:14, fontWeight:800, color:"white", marginBottom:16 }}>📊 Season Averages — {SEASON}-{(SEASON+1).toString().slice(2)}</h3>
              {avg === undefined ? <Spinner /> : avg === null ? (
                <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>No season data available</p>
              ) : (
                <>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))", gap:10, marginBottom:14 }}>
                    {[
                      { label:"PTS",  value: statFmt(avg.pts),  highlight:true },
                      { label:"REB",  value: statFmt(avg.reb) },
                      { label:"AST",  value: statFmt(avg.ast) },
                      { label:"STL",  value: statFmt(avg.stl) },
                      { label:"BLK",  value: statFmt(avg.blk) },
                      { label:"MIN",  value: statFmt(avg.min) },
                    ].map(s => (
                      <div key={s.label} style={{ background:s.highlight?"rgba(245,158,11,0.18)":"rgba(255,255,255,0.07)", borderRadius:12,
                        padding:"12px 8px", textAlign:"center", border:`1px solid ${s.highlight?"rgba(245,158,11,0.4)":"rgba(255,255,255,0.1)"}` }}>
                        <div style={{ fontSize:22, fontWeight:900, color:s.highlight?"#f59e0b":"white" }}>{s.value}</div>
                        <div style={{ fontSize:10, fontWeight:700, color:s.highlight?"#fbbf24":"rgba(255,255,255,0.5)", letterSpacing:"0.06em", marginTop:2 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {[
                      { label:"FG%",  value: pct(avg.fg_pct)  },
                      { label:"3P%",  value: pct(avg.fg3_pct) },
                      { label:"FT%",  value: pct(avg.ft_pct)  },
                    ].map(s => (
                      <div key={s.label} style={{ background:"rgba(245,158,11,0.12)", borderRadius:10, padding:"8px 16px",
                        display:"flex", gap:8, alignItems:"center", border:"1px solid rgba(245,158,11,0.3)" }}>
                        <span style={{ fontSize:13, fontWeight:800, color:"white" }}>{s.value}</span>
                        <span style={{ fontSize:10, fontWeight:700, color:"#fbbf24" }}>{s.label}</span>
                      </div>
                    ))}
                    {avg.games_played && (
                      <div style={{ background:"rgba(245,158,11,0.12)", borderRadius:10, padding:"8px 16px",
                        display:"flex", gap:8, alignItems:"center", border:"1px solid rgba(245,158,11,0.3)" }}>
                        <span style={{ fontSize:13, fontWeight:800, color:"white" }}>{avg.games_played}</span>
                        <span style={{ fontSize:10, fontWeight:700, color:"#fbbf24" }}>GP</span>
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>

            {/* Team W/L Impact */}
            {impact !== undefined && (
              <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:20, border:"1px solid rgba(245,158,11,0.22)",
                boxShadow:"0 4px 20px rgba(0,0,0,0.4)", padding:"20px 24px" }}>
                <h3 style={{ fontSize:14, fontWeight:800, color:"white", marginBottom:16 }}>
                  📊 Team Record — With vs Without
                </h3>
                {impact === null ? (
                  <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>No data available</p>
                ) : (() => {
                  const { withW, withL, withPct, woW, woL, withoutPct } = impact;
                  const diff = withPct != null && withoutPct != null ? withPct - withoutPct : null;
                  const diffPct = diff != null ? Math.abs(diff * 100).toFixed(1) : null;
                  const better = diff != null ? diff > 0 : null;
                  return (
                    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                        {/* With player */}
                        <div style={{ background:"rgba(74,222,128,0.12)", borderRadius:14, padding:"14px 16px",
                          border:"1px solid rgba(74,222,128,0.3)", textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#4ade80",
                            letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>
                            ✅ With {player.last_name}
                          </div>
                          <div style={{ fontSize:isMobile?22:28, fontWeight:900, color:"#4ade80", lineHeight:1 }}>
                            {withW}–{withL}
                          </div>
                          {withPct != null && (
                            <div style={{ fontSize:isMobile?10:11, fontWeight:700, color:"rgba(74,222,128,0.8)", marginTop:4 }}>
                              {(withPct*100).toFixed(1)}% win rate
                            </div>
                          )}
                          <div style={{ fontSize:isMobile?9:10, color:"rgba(74,222,128,0.6)", marginTop:2 }}>
                            {withW + withL} games
                          </div>
                        </div>
                        {/* Without player */}
                        <div style={{ background:"rgba(248,113,113,0.12)", borderRadius:14, padding:"14px 16px",
                          border:"1px solid rgba(248,113,113,0.3)", textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#f87171",
                            letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>
                            ❌ Without
                          </div>
                          <div style={{ fontSize:isMobile?22:28, fontWeight:900, color:"#f87171", lineHeight:1 }}>
                            {woW}–{woL}
                          </div>
                          {withoutPct != null && (
                            <div style={{ fontSize:isMobile?10:11, fontWeight:700, color:"rgba(248,113,113,0.8)", marginTop:4 }}>
                              {(withoutPct*100).toFixed(1)}% win rate
                            </div>
                          )}
                          <div style={{ fontSize:isMobile?9:10, color:"rgba(248,113,113,0.6)", marginTop:2 }}>
                            {woW + woL} games
                          </div>
                        </div>
                      </div>
                      {diff != null && (woW + woL) > 0 && (
                        <div style={{ background: better?"rgba(245,158,11,0.12)":"rgba(255,255,255,0.06)", borderRadius:12, padding:"10px 16px",
                          border:`1px solid ${better?"rgba(245,158,11,0.35)":"rgba(255,255,255,0.12)"}`, display:"flex", alignItems:"center", gap:10 }}>
                          <span style={{ fontSize:20 }}>{better?"🔥":"💧"}</span>
                          <div>
                            <span style={{ fontSize:isMobile?12:13, fontWeight:800,
                              color: better?"#fbbf24":"rgba(255,255,255,0.7)" }}>
                              {better ? `+${diffPct}% better` : `-${diffPct}% worse`} win rate with {player.last_name}
                            </span>
                            <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.4)", marginTop:1 }}>
                              {better ? "Team clearly plays better when he's on the court" : "Win rate dips when he plays — could reflect matchup difficulty"}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Momentum — Last 5 Games */}
            <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:20, border:"1px solid rgba(245,158,11,0.22)",
              boxShadow:"0 4px 20px rgba(0,0,0,0.4)", padding:"20px 24px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:8 }}>
                <h3 style={{ fontSize:14, fontWeight:800, color:"white" }}>📈 Momentum — Last 5 Games</h3>
                {trend && (
                  <span style={{ fontSize:isMobile?10:11, fontWeight:700, padding:"4px 12px", borderRadius:20,
                    background:trend.bg, color:trend.color, border:`1px solid ${trend.color}30` }}>
                    {trend.label}
                  </span>
                )}
              </div>
              {games === undefined ? <Spinner /> : !games?.length ? (
                <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>No recent game data available</p>
              ) : (
                <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }} className="mobile-scroll">
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:isMobile?10:12 }}>
                    <thead>
                      <tr style={{ background:"rgba(245,158,11,0.12)" }}>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"left", whiteSpace:"nowrap" }}>Date</th>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"left", whiteSpace:"nowrap" }}>Opponent</th>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"left", whiteSpace:"nowrap" }}>Result</th>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>PTS</th>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>REB</th>
                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>AST</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>MIN</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>STL</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>BLK</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>FG</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>3PT</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#fbbf24", textAlign:"center", whiteSpace:"nowrap" }}>+/-</th>
                      </tr>
                    </thead>
                    <tbody>
                      {games.map((g, i) => {
                        const date = g.game?.date ? fmtDate(g.game.date) : "—";
                        const weAreHome = g.team?.id === g.game?.home_team_id;
                        const oppId = weAreHome ? g.game?.visitor_team_id : g.game?.home_team_id;
                        const oppTeamObj = teamsById[oppId];
                        const opp = oppTeamObj?.abbreviation ?? (oppId ? String(oppId) : null);
                        const oppFullName = oppTeamObj ? `${oppTeamObj.city ?? ""} ${oppTeamObj.name ?? ""}`.trim() : opp;
                        const homeScore = g.game?.home_team_score, visScore = g.game?.visitor_team_score;
                        const ourScore = weAreHome ? homeScore : visScore;
                        const theirScore = weAreHome ? visScore : homeScore;
                        const won = ourScore != null && theirScore != null ? ourScore > theirScore : null;
                        const aboveAvg = avg && g.pts != null && g.pts >= (avg.pts ?? 0);
                        const pm = g.plus_minus;
                        return (
                          <tr key={i} style={{ background: aboveAvg ? "rgba(74,222,128,0.08)" : i%2===0?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.02)",
                            borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                            <td style={{ padding:"7px 10px", color:"rgba(255,255,255,0.5)", whiteSpace:"nowrap" }}>{date}</td>
                            <td style={{ padding:"7px 10px", fontWeight:600, color:"white", whiteSpace:"nowrap" }}>
                              {opp ? <span style={{ display:"flex", alignItems:"center", gap:isMobile?4:6 }}><TeamLogo abbr={opp} size={isMobile?14:18} />{!isMobile && oppFullName || opp}</span> : "—"}
                            </td>
                            <td style={{ padding:"7px 10px", whiteSpace:"nowrap" }}>
                              {won != null ? (
                                <span style={{ fontSize:isMobile?9:10, fontWeight:700, padding:"2px 8px", borderRadius:20,
                                  background:won?"rgba(74,222,128,0.15)":"rgba(248,113,113,0.15)", color:won?"#4ade80":"#f87171" }}>
                                  {won?"W":"L"}
                                </span>
                              ) : "—"}
                            </td>
                            <td style={{ padding:"7px 10px", textAlign:"center", fontWeight:800,
                              color: aboveAvg ? "#f59e0b" : "rgba(255,255,255,0.7)" }}>{g.pts??"—"}</td>
                            <td style={{ padding:"7px 10px", textAlign:"center", color:"#60a5fa" }}>{g.reb??"—"}</td>
                            <td style={{ padding:"7px 10px", textAlign:"center", color:"#60a5fa" }}>{g.ast??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"rgba(255,255,255,0.45)" }}>{g.min??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"rgba(255,255,255,0.55)" }}>{g.stl??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"rgba(255,255,255,0.55)" }}>{g.blk??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"rgba(255,255,255,0.6)" }}>{g.fgm!=null?`${g.fgm}/${g.fga}`:"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"rgba(255,255,255,0.6)" }}>{g.fg3m!=null?`${g.fg3m}/${g.fg3a}`:"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", fontWeight:700,
                              color:pm>0?"#4ade80":pm<0?"#f87171":"rgba(255,255,255,0.45)" }}>
                              {pm!=null?(pm>0?`+${pm}`:pm):"—"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* Top 5 Season Performances */}
            <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:20, border:"1px solid rgba(245,158,11,0.22)",
              boxShadow:"0 4px 20px rgba(0,0,0,0.4)", padding:"20px 24px" }}>
              <h3 style={{ fontSize:14, fontWeight:800, color:"white", marginBottom:16 }}>🏅 Top 5 Performances This Season</h3>
              {top5 === undefined ? <Spinner /> : !top5?.length ? (
                <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>No game data available yet</p>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {top5.map((g, i) => {
                    const date = g.game?.date ? fmtDate(g.game.date) : "—";
                    const weAreHome = g.team?.id === g.game?.home_team_id;
                    const oppId = weAreHome ? g.game?.visitor_team_id : g.game?.home_team_id;
                    const oppTeamData = teamsById[oppId];
                    const oppAbbr = oppTeamData?.abbreviation ?? (oppId ? String(oppId) : null);
                    const oppName = oppTeamData ? `${oppTeamData.city ?? ""} ${oppTeamData.name ?? ""}`.trim() : oppAbbr;
                    const combined = (g.pts??0) + (g.reb??0) + (g.ast??0);
                    const ourScore = weAreHome ? g.game?.home_team_score : g.game?.visitor_team_score;
                    const theirScore = weAreHome ? g.game?.visitor_team_score : g.game?.home_team_score;
                    const won = ourScore != null && theirScore != null ? ourScore > theirScore : null;
                    const rankColors = ["#f59e0b","#94a3b8","#cd7f32","#60a5fa","#60a5fa"];
                    return (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:14,
                        background: i===0 ? "rgba(245,158,11,0.15)" : "rgba(255,255,255,0.05)",
                        borderRadius:14, padding:"12px 16px",
                        border: i===0 ? "1px solid rgba(245,158,11,0.4)" : "1px solid rgba(255,255,255,0.08)" }}>
                        <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0,
                          background:`linear-gradient(135deg,${rankColors[i]}30,${rankColors[i]}60)`,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:13, fontWeight:900, color:rankColors[i] }}>
                          {i+1}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
                            <span style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.6)" }}>{date}</span>
                            {oppAbbr && (
                              <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"white", fontWeight:600 }}>
                                vs <TeamLogo abbr={oppAbbr} size={18} />
                                <span>{oppName || oppAbbr}</span>
                              </span>
                            )}
                            {won != null && (
                              <span style={{ fontSize:10, fontWeight:700, padding:"1px 7px", borderRadius:20,
                                background:won?"rgba(74,222,128,0.15)":"rgba(248,113,113,0.15)", color:won?"#4ade80":"#f87171" }}>
                                {won?"W":"L"} {ourScore}–{theirScore}
                              </span>
                            )}
                          </div>
                          <div style={{ display:"flex", gap:12 }}>
                            <span style={{ fontSize:13, fontWeight:900, color:"white" }}>{g.pts??0} <span style={{ fontSize:10, fontWeight:600, color:"#fbbf24" }}>PTS</span></span>
                            <span style={{ fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.7)" }}>{g.reb??0} <span style={{ fontSize:10, fontWeight:600, color:"#60a5fa" }}>REB</span></span>
                            <span style={{ fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.7)" }}>{g.ast??0} <span style={{ fontSize:10, fontWeight:600, color:"#60a5fa" }}>AST</span></span>
                            {g.stl>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.55)" }}>{g.stl} STL</span>}
                            {g.blk>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.55)" }}>{g.blk} BLK</span>}
                          </div>
                        </div>
                        <div style={{ textAlign:"center", flexShrink:0 }}>
                          <div style={{ fontSize:22, fontWeight:900, color: i===0?"#f59e0b":"#a5b4fc", lineHeight:1 }}>{combined}</div>
                          <div style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.4)", letterSpacing:"0.07em" }}>COMBINED</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    // ── Don't Miss View ───────────────────────────────────────────────────────────
    function DontMissView({ gameCache, loadDate, standings, spoilerMode }) {
      const isMobile = useWindowWidth() < 600;
      const [loading,    setLoading]    = useState(true);
      const [tdDate,     setTdDate]     = useState(null);

      // Two-phase load so the page appears fast:
      // Phase 1 – load the 2 most recent dates in parallel (often already cached
      //            from HomeView, so this is usually instant). Show the page as
      //            soon as they're done — Top Performers can fetch right away.
      // Phase 2 – load the remaining 8 dates in background batches of 3 so
      //            streaks & upsets fill in without blocking the initial render.
      useEffect(() => {
        let active = true;
        (async () => {
          // Phase 1: just today + yesterday
          await Promise.all(DONT_MISS_DATES.slice(0, 2).map(d => loadDate(d)));
          if (!active) return;
          setLoading(false);  // ← page becomes visible here

          // Phase 2: remaining dates in batches of 3 (background)
          for (let i = 2; i < DONT_MISS_DATES.length; i += 3) {
            if (!active) return;
            await Promise.all(DONT_MISS_DATES.slice(i, i + 3).map(d => loadDate(d)));
          }
        })();
        return () => { active = false; };
      }, []);

      // Find most-recent final day to label the Top Performers card
      useEffect(() => {
        if (loading) return;
        for (const date of DONT_MISS_DATES) {
          const finals = (gameCache[date] ?? []).filter(g => g.status === "Final");
          if (finals.length > 0) { setTdDate(date); break; }
        }
      }, [loading, gameCache]);

      // Top Performers — derived instantly from already-cached game player data, no extra API call
      const topPerformers = React.useMemo(() => {
        if (loading) return [];
        // Find the most recent date with final games
        let targetGames = [];
        for (const date of DONT_MISS_DATES) {
          const finals = (gameCache[date] ?? []).filter(g => g.status === "Final");
          if (finals.length > 0) { targetGames = finals; break; }
        }
        if (!targetGames.length) return [];
        // Flatten all players from both teams, normalising box_scores vs stats API shape
        const all = [];
        targetGames.forEach(game => {
          [game.home, game.visitor].forEach(team => {
            (team.players ?? []).forEach(p => {
              if (parseMin(p.min) <= 0) return;
              all.push({
                // box_scores players are flat; stats API players are nested under p.player
                player: p.player ?? { first_name: p.first_name, last_name: p.last_name, id: p.id },
                team:   { abbreviation: team.abbreviation, id: team.id },
                pts: p.pts ?? 0, reb: p.reb ?? 0, ast: p.ast ?? 0, min: p.min,
              });
            });
          });
        });
        return [...all]
          .sort((a, b) => ((b.pts??0)+(b.ast??0)+(b.reb??0)) - ((a.pts??0)+(a.ast??0)+(a.reb??0)))
          .slice(0, 10);
      }, [loading, gameCache]);

      // ── Compute streaks (hot / cold) from all 14 days in the cache ──────────────
      const { hotStreaks, coldStreaks } = React.useMemo(() => {
        const teamGames = {};
        DONT_MISS_DATES.forEach(date => {
          (gameCache[date] ?? []).forEach(g => {
            if (g.status !== "Final") return;
            const homeWon = (g.home.score ?? 0) > (g.visitor.score ?? 0);
            [[g.home.abbreviation, homeWon], [g.visitor.abbreviation, !homeWon]].forEach(([abbr, won]) => {
              if (!abbr) return;
              if (!teamGames[abbr]) teamGames[abbr] = [];
              teamGames[abbr].push({ date, won });
            });
          });
        });
        const hot = [], cold = [];
        Object.entries(teamGames).forEach(([abbr, games]) => {
          games.sort((a, b) => b.date.localeCompare(a.date));
          if (!games.length) return;
          const firstWon = games[0].won;
          let streak = 0;
          for (const g of games) { if (g.won === firstWon) streak++; else break; }
          if (streak >= 3) {
            const team = ALL_TEAMS.find(t => t.abbreviation === abbr);
            const entry = { abbr, team, streak, rec: standings?.[abbr] };
            firstWon ? hot.push(entry) : cold.push(entry);
          }
        });
        hot.sort((a, b) => b.streak - a.streak);
        cold.sort((a, b) => b.streak - a.streak);
        return { hotStreaks: hot, coldStreaks: cold };
      }, [gameCache, standings]);

      // ── Compute upsets from all 14 days ─────────────────────────────────────────
      const upsets = React.useMemo(() => {
        if (!standings || !Object.keys(standings).length) return [];
        const list = [];
        DONT_MISS_DATES.forEach(date => {
          (gameCache[date] ?? []).forEach(g => {
            if (g.status !== "Final") return;
            const hs = g.home.score ?? 0, vs = g.visitor.score ?? 0;
            if (hs === 0 && vs === 0) return;
            const homeWon = hs > vs;
            const winner = homeWon ? g.home : g.visitor;
            const loser  = homeWon ? g.visitor : g.home;
            const wRec = standings[winner.abbreviation], lRec = standings[loser.abbreviation];
            if (!wRec || !lRec) return;
            const wGP = wRec.wins + wRec.losses, lGP = lRec.wins + lRec.losses;
            if (wGP < 5 || lGP < 5) return;
            const wPct = wRec.wins / wGP, lPct = lRec.wins / lGP;
            if (lPct - wPct < 0.08) return; // threshold: at least 8% gap
            list.push({ date, winner, loser,
              winnerScore: homeWon ? hs : vs, loserScore: homeWon ? vs : hs,
              wPct, lPct, magnitude: lPct - wPct, wRec, lRec });
          });
        });
        list.sort((a, b) => b.date !== a.date ? b.date.localeCompare(a.date) : b.magnitude - a.magnitude);
        return list.slice(0, 8);
      }, [gameCache, standings]);

      const SectionCard = ({ emoji, title, subtitle, gradient, children }) => (
        <div style={{
          background:"rgba(8,12,28,0.80)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",
          borderRadius:isMobile?14:20, border:"1px solid rgba(255,255,255,0.08)",
          boxShadow:"0 4px 24px rgba(0,0,0,0.4)", overflow:"hidden" }}>
          <div style={{ background:gradient, padding:isMobile?"11px 14px":"14px 22px",
            display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:isMobile?18:20 }}>{emoji}</span>
            <div>
              <div style={{ fontSize:isMobile?13:15, fontWeight:900, color:"white", letterSpacing:"0.03em" }}>{title}</div>
              {subtitle && <div style={{ fontSize:9, color:"rgba(255,255,255,0.55)", fontWeight:600, marginTop:1 }}>{subtitle}</div>}
            </div>
          </div>
          {children}
        </div>
      );

      const Empty = ({ msg }) => (
        <div style={{ padding:"28px 20px", textAlign:"center", color:"rgba(255,255,255,0.45)", fontSize:12, fontWeight:600 }}>{msg}</div>
      );

      if (loading) return (
        <div style={{ maxWidth:1280, margin:"0 auto", padding:"60px 24px" }}><Spinner full /></div>
      );

      return (
        <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 12px 28px":"20px 24px 36px" }}>


          <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:isMobile?12:20 }}>

            {/* ── Top Performers of the Night ── */}
            <SectionCard emoji="🏆" title="Top Performers of the Night"
              subtitle={tdDate ? `${fmtDate(tdDate)} · ranked by PTS + AST + REB` : "Most recent game day"}
              gradient="linear-gradient(135deg,#78350f,#d97706)">
              {!topPerformers.length ? <Empty msg="No stats available for last game day" />
              : <div>{topPerformers.map((s, i) => {
                  const name = `${s.player?.first_name ?? ""} ${s.player?.last_name ?? ""}`.trim();
                  const total = (s.pts??0) + (s.ast??0) + (s.reb??0);
                  const rankColors = ["#f59e0b","#9ca3af","#b45309"];
                  const rankColor = i < 3 ? rankColors[i] : "#cbd5e1";
                  return (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:isMobile?8:12,
                      padding:isMobile?"9px 12px":"11px 18px",
                      borderBottom: i < topPerformers.length-1 ? "1px solid #fef3c7" : "none",
                      background: i%2===0 ? "rgba(255,255,255,0.05)" : "rgba(245,158,11,0.06)" }}>
                      {/* Rank */}
                      <div style={{ minWidth:isMobile?20:24, textAlign:"center", flexShrink:0 }}>
                        <div style={{ fontSize:isMobile?12:14, fontWeight:900, color:rankColor,
                          textShadow: i < 3 ? `0 0 8px ${rankColor}55` : "none" }}>
                          #{i+1}
                        </div>
                      </div>
                      <TeamLogo abbr={s.team?.abbreviation} size={isMobile?28:36} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"white",
                          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{name || "—"}</div>
                        <div style={{ fontSize:8, fontWeight:700, color:"#fbbf24", letterSpacing:"0.05em" }}>
                          {s.team?.abbreviation}
                        </div>
                      </div>
                      {/* PTS · AST · REB */}
                      {[["PTS",s.pts],["AST",s.ast],["REB",s.reb]].map(([lbl,val]) => (
                        <div key={lbl} style={{ textAlign:"center", minWidth:isMobile?26:32 }}>
                          <div style={{ fontSize:isMobile?14:18, fontWeight:900, color:"#f59e0b" }}>{val??0}</div>
                          <div style={{ fontSize:7, fontWeight:700, color:"rgba(255,255,255,0.5)", letterSpacing:"0.06em" }}>{lbl}</div>
                        </div>
                      ))}
                      {/* Total score */}
                      <div style={{ textAlign:"center", minWidth:isMobile?32:38, flexShrink:0,
                        background:"rgba(245,158,11,0.2)", borderRadius:8, padding:"3px 5px",
                        border:"1px solid rgba(245,158,11,0.4)" }}>
                        <div style={{ fontSize:isMobile?13:16, fontWeight:900, color:"#fbbf24", lineHeight:1 }}>{total}</div>
                        <div style={{ fontSize:7, fontWeight:700, color:"rgba(251,191,36,0.7)", letterSpacing:"0.04em" }}>TOT</div>
                      </div>
                    </div>
                  );
                })}</div>}
            </SectionCard>

            {/* ── Upsets ── */}
            <SectionCard emoji="💥" title="Upsets"
              subtitle={`Underdog wins from the past ${DONT_MISS_DATES.length} days (8%+ win-rate gap)`}
              gradient="linear-gradient(135deg,#7f1d1d,#dc2626)">
              {!upsets.length ? <Empty msg={`No major upsets in the past ${DONT_MISS_DATES.length} days`} />
              : <div>{upsets.map((u, i) => (
                  <div key={i} style={{ padding:isMobile?"10px 14px":"12px 20px",
                    borderBottom: i < upsets.length-1 ? "1px solid rgba(220,38,38,0.15)" : "none",
                    background: i%2===0 ? "rgba(255,255,255,0.04)" : "rgba(220,38,38,0.06)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                      <span style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.5)" }}>{fmtDate(u.date)}</span>
                      <span style={{ fontSize:9, fontWeight:800, background:"rgba(220,38,38,0.2)",
                        border:"1px solid rgba(248,113,113,0.4)", color:"#f87171", padding:"2px 8px", borderRadius:20 }}>
                        +{Math.round(u.magnitude*100)}% underdog
                      </span>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:isMobile?6:10 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:isMobile?5:8, flex:1, minWidth:0 }}>
                        <TeamLogo abbr={u.winner.abbreviation} size={isMobile?26:34} />
                        <div>
                          <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"#4ade80" }}>
                            {isMobile ? u.winner.abbreviation : `${u.winner.city} ${u.winner.name}`}
                          </div>
                          {u.wRec && <div style={{ fontSize:8, color:"rgba(255,255,255,0.45)", fontWeight:600 }}>
                            {u.wRec.wins}–{u.wRec.losses} · {(u.wPct*100).toFixed(0)}% win rate
                          </div>}
                        </div>
                      </div>
                      {!spoilerMode && (
                        <div style={{ textAlign:"center", flexShrink:0, padding:"0 6px" }}>
                          <div style={{ fontSize:isMobile?15:18, fontWeight:900, color:"white" }}>
                            {u.winnerScore}–{u.loserScore}
                          </div>
                        </div>
                      )}
                      <div style={{ display:"flex", alignItems:"center", gap:isMobile?5:8, flex:1, minWidth:0, justifyContent:"flex-end" }}>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"rgba(255,255,255,0.5)" }}>
                            {isMobile ? u.loser.abbreviation : `${u.loser.city} ${u.loser.name}`}
                          </div>
                          {u.lRec && <div style={{ fontSize:8, color:"rgba(255,255,255,0.35)", fontWeight:600 }}>
                            {u.lRec.wins}–{u.lRec.losses} · {(u.lPct*100).toFixed(0)}% win rate
                          </div>}
                        </div>
                        <TeamLogo abbr={u.loser.abbreviation} size={isMobile?26:34} />
                      </div>
                    </div>
                  </div>
                ))}</div>}
            </SectionCard>

            {/* ── Hot Streak ── */}
            <SectionCard emoji="🔥" title="Hot Streak"
              subtitle={`Teams on a 3+ game winning run (last ${DONT_MISS_DATES.length} days)`}
              gradient="linear-gradient(135deg,#7c2d12,#ea580c)">
              {!hotStreaks.length ? <Empty msg={`No teams on a 3+ game win streak right now`} />
              : <div>{hotStreaks.map((t, i) => (
                  <div key={t.abbr} style={{ display:"flex", alignItems:"center", gap:isMobile?10:16,
                    padding:isMobile?"10px 14px":"12px 20px",
                    borderBottom: i < hotStreaks.length-1 ? "1px solid rgba(234,88,12,0.15)" : "none",
                    background: i%2===0 ? "rgba(255,255,255,0.04)" : "rgba(234,88,12,0.07)" }}>
                    <div style={{ fontSize:isMobile?14:16, fontWeight:900, color:"#f59e0b",
                      minWidth:isMobile?22:26, textAlign:"center" }}>#{i+1}</div>
                    <TeamLogo abbr={t.abbr} size={isMobile?36:44} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:isMobile?12:14, fontWeight:800, color:"white" }}>
                        {isMobile ? t.abbr : (t.team ? `${t.team.city} ${t.team.name}` : t.abbr)}
                      </div>
                      {t.rec && <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>
                        {t.rec.wins}–{t.rec.losses} season record
                      </div>}
                    </div>
                    <div style={{ textAlign:"center", flexShrink:0 }}>
                      <div style={{ fontSize:isMobile?24:30, fontWeight:900, color:"#fb923c", lineHeight:1 }}>W{t.streak}</div>
                      <div style={{ fontSize:8, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.06em", marginTop:1 }}>IN A ROW</div>
                    </div>
                  </div>
                ))}</div>}
            </SectionCard>

            {/* ── Cold Streak ── */}
            <SectionCard emoji="❄️" title="Cold Streak"
              subtitle={`Teams on a 3+ game losing run (last ${DONT_MISS_DATES.length} days)`}
              gradient="linear-gradient(135deg,#0c4a6e,#0284c7)">
              {!coldStreaks.length ? <Empty msg={`No teams on a 3+ game losing streak right now`} />
              : <div>{coldStreaks.map((t, i) => (
                  <div key={t.abbr} style={{ display:"flex", alignItems:"center", gap:isMobile?10:16,
                    padding:isMobile?"10px 14px":"12px 20px",
                    borderBottom: i < coldStreaks.length-1 ? "1px solid rgba(2,132,199,0.15)" : "none",
                    background: i%2===0 ? "rgba(255,255,255,0.04)" : "rgba(2,132,199,0.07)" }}>
                    <div style={{ fontSize:isMobile?14:16, fontWeight:900, color:"#38bdf8",
                      minWidth:isMobile?22:26, textAlign:"center" }}>#{i+1}</div>
                    <TeamLogo abbr={t.abbr} size={isMobile?36:44} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:isMobile?12:14, fontWeight:800, color:"white" }}>
                        {isMobile ? t.abbr : (t.team ? `${t.team.city} ${t.team.name}` : t.abbr)}
                      </div>
                      {t.rec && <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>
                        {t.rec.wins}–{t.rec.losses} season record
                      </div>}
                    </div>
                    <div style={{ textAlign:"center", flexShrink:0 }}>
                      <div style={{ fontSize:isMobile?24:30, fontWeight:900, color:"#38bdf8", lineHeight:1 }}>L{t.streak}</div>
                      <div style={{ fontSize:8, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.06em", marginTop:1 }}>IN A ROW</div>
                    </div>
                  </div>
                ))}</div>}
            </SectionCard>

          </div>
        </div>
      );
    }

    // ── Standings Panel ───────────────────────────────────────────────────────────
    // ── Account Modal ─────────────────────────────────────────────────────────────
    function AccountModal({ onClose, currentUser, setCurrentUser, favTeams, favPlayers, setFavTeams, setFavPlayers }) {
      const isMobile = useWindowWidth() < 600;
      const [tab,       setTab]       = useState(currentUser ? "profile" : "login");
      const [username,  setUsername]  = useState("");
      const [password,  setPassword]  = useState("");
      const [error,     setError]     = useState("");
      const [loading,   setLoading]   = useState(false);
      const [selAvatar, setSelAvatar] = useState(currentUser?.avatar ?? AVATARS[0].id);
      const [saved,     setSaved]     = useState(false);

      const toEmail = u => `${u.trim().toLowerCase().replace(/[^a-z0-9]/g,"_")}@nbacatchup.local`;

      const handleSignUp = async () => {
        if (!FB_READY) return;
        if (username.trim().length < 3) { setError("Username must be at least 3 characters"); return; }
        if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
        setLoading(true); setError("");
        try {
          const cred = await fbAuth.createUserWithEmailAndPassword(toEmail(username), password);
          const av = AVATARS.find(a => a.id === selAvatar) ?? AVATARS[0];
          const profile = { username: username.trim(), avatar: av.id, favTeams, favPlayers, friends: [] };
          await fbDb.collection("users").doc(cred.user.uid).set(profile);
          setCurrentUser({ uid: cred.user.uid, ...profile });
          onClose();
        } catch(e) {
          setError(e.code === "auth/email-already-in-use" ? "Username already taken" : e.message);
        }
        setLoading(false);
      };

      const handleLogin = async () => {
        if (!FB_READY) return;
        if (!username.trim() || !password) { setError("Please enter username and password"); return; }
        setLoading(true); setError("");
        try {
          const cred = await fbAuth.signInWithEmailAndPassword(toEmail(username), password);
          const doc = await fbDb.collection("users").doc(cred.user.uid).get();
          if (doc.exists) {
            const data = doc.data();
            setCurrentUser({ uid: cred.user.uid, friends: [], ...data });
            if (data.favTeams)   setFavTeams(data.favTeams);
            if (data.favPlayers) setFavPlayers(data.favPlayers);
          } else {
            setCurrentUser({ uid: cred.user.uid, username: username.trim(), avatar: AVATARS[0].id, favTeams, favPlayers, friends: [] });
          }
          onClose();
        } catch(e) {
          setError(e.code === "auth/user-not-found" || e.code === "auth/wrong-password" || e.code === "auth/invalid-credential"
            ? "Wrong username or password" : e.message);
        }
        setLoading(false);
      };

      const handleLogout = async () => {
        if (fbAuth) await fbAuth.signOut();
        setCurrentUser(null);
        onClose();
      };

      const handleSaveAvatar = async () => {
        if (!currentUser || !fbDb) return;
        setLoading(true);
        await fbDb.collection("users").doc(currentUser.uid).update({ avatar: selAvatar });
        setCurrentUser(prev => ({ ...prev, avatar: selAvatar }));
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
        setLoading(false);

      // Overlay close on backdrop click
      const handleBackdrop = e => { if (e.target === e.currentTarget) onClose(); };

            {/* Firebase not configured notice */}

                    {label}

            )}

            {/* Login / Signup form */}
            {FB_READY && !currentUser && (

                {/* Avatar picker — signup only */}
                {tab === "signup" && (
