<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏀 NBA CatchUp</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #eef4ff; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulseGlow { 0%,100% { box-shadow:0 0 0 0 rgba(30,58,138,.3); } 50% { box-shadow:0 0 0 6px rgba(30,58,138,0); } }
    .card-anim { animation: fadeUp 0.25s ease both; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:#eef4ff; }
    ::-webkit-scrollbar-thumb { background:#bfdbfe; border-radius:4px; }
    button, input { font-family:inherit; }
    button { cursor:pointer; border:none; }
    @media (max-width: 600px) {
      .mobile-hide { display: none !important; }
      .mobile-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .mobile-full { width: 100% !important; min-width: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── useWindowWidth hook ──────────────────────────────────────────────────────
    function useWindowWidth() {
      const [w, setW] = useState(window.innerWidth);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);
      return w;
    }

    // ── Config ───────────────────────────────────────────────────────────────────
    const API_V1  = "https://api.balldontlie.io/v1";
    const API_KEY = "60bc54f3-f8d0-4f96-b7c0-bd6cb513e7ef";
    const SEASON  = 2025; // 2025-26 season
    const logoUrl = abbr => `https://a.espncdn.com/i/teamlogos/nba/500/${(abbr ?? "").toLowerCase()}.png`;

    // ── TheSportsDB photo cache & fetcher ────────────────────────────────────────
    // key: "Firstname Lastname" → URL string | null (null = tried, not found)
    const sportsDbCache = {};
    async function fetchSportsDbPhoto(firstName, lastName) {
      const key = `${firstName} ${lastName}`;
      if (key in sportsDbCache) return sportsDbCache[key];
      try {
        const r = await fetch(
          `https://www.thesportsdb.com/api/v1/json/123/searchplayers.php?p=${encodeURIComponent(key)}`
        );
        if (!r.ok) { sportsDbCache[key] = null; return null; }
        const data = await r.json();
        const pl = data.player?.[0];
        const url = pl?.strThumb || pl?.strCutout || null;
        sportsDbCache[key] = url;
        return url;
      } catch { sportsDbCache[key] = null; return null; }
    }


    // ── All 30 teams ─────────────────────────────────────────────────────────────
    const ALL_TEAMS = [
      {abbreviation:"ATL",city:"Atlanta",      name:"Hawks"},       {abbreviation:"BOS",city:"Boston",       name:"Celtics"},
      {abbreviation:"BKN",city:"Brooklyn",     name:"Nets"},        {abbreviation:"CHA",city:"Charlotte",    name:"Hornets"},
      {abbreviation:"CHI",city:"Chicago",      name:"Bulls"},       {abbreviation:"CLE",city:"Cleveland",    name:"Cavaliers"},
      {abbreviation:"DAL",city:"Dallas",       name:"Mavericks"},   {abbreviation:"DEN",city:"Denver",       name:"Nuggets"},
      {abbreviation:"DET",city:"Detroit",      name:"Pistons"},     {abbreviation:"GSW",city:"Golden State", name:"Warriors"},
      {abbreviation:"HOU",city:"Houston",      name:"Rockets"},     {abbreviation:"IND",city:"Indiana",      name:"Pacers"},
      {abbreviation:"LAC",city:"LA",           name:"Clippers"},    {abbreviation:"LAL",city:"Los Angeles",  name:"Lakers"},
      {abbreviation:"MEM",city:"Memphis",      name:"Grizzlies"},   {abbreviation:"MIA",city:"Miami",        name:"Heat"},
      {abbreviation:"MIL",city:"Milwaukee",    name:"Bucks"},       {abbreviation:"MIN",city:"Minnesota",    name:"Timberwolves"},
      {abbreviation:"NOP",city:"New Orleans",  name:"Pelicans"},    {abbreviation:"NYK",city:"New York",     name:"Knicks"},
      {abbreviation:"OKC",city:"Oklahoma City",name:"Thunder"},     {abbreviation:"ORL",city:"Orlando",      name:"Magic"},
      {abbreviation:"PHI",city:"Philadelphia", name:"76ers"},       {abbreviation:"PHX",city:"Phoenix",      name:"Suns"},
      {abbreviation:"POR",city:"Portland",     name:"Trail Blazers"},{abbreviation:"SAC",city:"Sacramento",  name:"Kings"},
      {abbreviation:"SAS",city:"San Antonio",  name:"Spurs"},       {abbreviation:"TOR",city:"Toronto",      name:"Raptors"},
      {abbreviation:"UTA",city:"Utah",         name:"Jazz"},        {abbreviation:"WAS",city:"Washington",   name:"Wizards"},
    ];

    // NBA conference split (East / West)
    const EAST_ABBRS = ["ATL","BOS","BKN","CHA","CHI","CLE","DET","IND","MIA","MIL","NYK","ORL","PHI","TOR","WAS"];
    const WEST_ABBRS = ["DAL","DEN","GSW","HOU","LAC","LAL","MEM","MIN","NOP","OKC","PHX","POR","SAC","SAS","UTA"];

    // ── BallDontLie API ──────────────────────────────────────────────────────────
    async function apiFetch(path) {
      try {
        const r = await fetch(`${API_V1}${path}`, { headers: { Authorization: API_KEY } });
        if (!r.ok) return { _err: r.status };
        return await r.json(); // await so JSON parse errors are caught below
      } catch { return { _err: "network" }; }
    }

    async function fetchAll(basePath) {
      let all = [], cursor = null;
      while (true) {
        const sep = basePath.includes("?") ? "&" : "?";
        const res = await apiFetch(`${basePath}${sep}per_page=100${cursor ? `&cursor=${cursor}` : ""}`);
        if (res._err) return { _err: res._err };
        all = all.concat(res.data ?? []);
        cursor = res.meta?.next_cursor ?? null;
        if (!cursor) break;
      }
      return { data: all };
    }

    // ── Team ID → team object (populated once, used to look up opponents) ────────
    // /stats only returns home_team_id/visitor_team_id numbers, not full objects.
    const teamsById = {};
    async function ensureTeamsById() {
      if (Object.keys(teamsById).length > 0) return;
      const res = await fetchAll("/teams");
      (res.data ?? []).forEach(t => { if (t.id) teamsById[t.id] = t; });
    }

    function parseMin(m) {
      if (!m) return 0;
      const s = String(m);
      if (s.includes(":")) { const [mins, secs] = s.split(":").map(Number); return mins + (secs || 0) / 60; }
      return parseFloat(s) || 0;
    }

    async function fetchPlayerStats(playerId) {
      const res = await fetchAll(`/stats?player_ids[]=${playerId}&seasons[]=${SEASON}`);
      if (res._err) return { avg: null, lastGames: [], top5: [] };
      const all = res.data ?? [];
      // Only count games where player actually played (has minutes)
      const played = all.filter(g => parseMin(g.min) > 0);
      // Last 5 games by date (all games, not just played)
      const lastGames = [...all]
        .filter(g => g.game?.date)
        .sort((a, b) => new Date(b.game.date) - new Date(a.game.date))
        .slice(0, 5);
      // Top 5 performances this season by combined PTS+REB+AST
      const top5 = [...played]
        .filter(g => g.game?.date)
        .sort((a, b) => ((b.pts??0)+(b.reb??0)+(b.ast??0)) - ((a.pts??0)+(a.reb??0)+(a.ast??0)))
        .slice(0, 5);
      // W/L impact: compare team record with player playing vs without
      const gameResult = g => {
        const weAreHome = g.team?.id === g.game?.home_team_id;
        const our = weAreHome ? g.game?.home_team_score : g.game?.visitor_team_score;
        const their = weAreHome ? g.game?.visitor_team_score : g.game?.home_team_score;
        return (our != null && their != null && our !== their) ? our > their : null;
      };
      const withGames   = played.filter(g => g.game?.date);
      const withoutGames = all.filter(g => parseMin(g.min) <= 0 && g.game?.date);
      const withW  = withGames.filter(g => gameResult(g) === true).length;
      const withL  = withGames.filter(g => gameResult(g) === false).length;
      const woW    = withoutGames.filter(g => gameResult(g) === true).length;
      const woL    = withoutGames.filter(g => gameResult(g) === false).length;
      const withPct   = (withW + withL)  > 0 ? withW  / (withW  + withL)  : null;
      const withoutPct = (woW  + woL)    > 0 ? woW    / (woW   + woL)     : null;
      const impact = { withW, withL, withPct, woW, woL, withoutPct };

      if (!played.length) return { avg: null, lastGames, top5, impact };
      const n = played.length;
      const sum = key => played.reduce((acc, g) => acc + (parseFloat(g[key]) || 0), 0);
      const fgm = sum("fgm"), fga = sum("fga");
      const fg3m = sum("fg3m"), fg3a = sum("fg3a");
      const ftm = sum("ftm"), fta = sum("fta");
      return {
        lastGames,
        top5,
        impact,
        avg: {
          games_played: n,
          pts: +(sum("pts") / n).toFixed(1),
          reb: +(sum("reb") / n).toFixed(1),
          ast: +(sum("ast") / n).toFixed(1),
          stl: +(sum("stl") / n).toFixed(1),
          blk: +(sum("blk") / n).toFixed(1),
          min: +(played.reduce((a, g) => a + parseMin(g.min), 0) / n).toFixed(1),
          fg_pct:  fga  > 0 ? fgm  / fga  : null,
          fg3_pct: fg3a > 0 ? fg3m / fg3a : null,
          ft_pct:  fta  > 0 ? ftm  / fta  : null,
        },
      };
    }

    // ── Standings ────────────────────────────────────────────────────────────────
    // Fetch full-season standings.
    // Strategy: try /standings first (fast, 1 call). If empty/error, fall back to
    // fetching every game this season and computing W-L from final scores.
    async function fetchStandings() {
      // ── Attempt 1: /standings endpoint ──────────────────────────────────────
      const res = await apiFetch(`/standings?season=${SEASON}`);
      if (!res._err && res.data?.length) {
        const map = {};
        res.data.forEach(s => {
          const abbr = s.team?.abbreviation;
          if (!abbr) return;
          map[abbr] = { wins: s.wins ?? 0, losses: s.losses ?? 0 };
        });
        if (Object.keys(map).length > 0) return map;
      }

      // ── Attempt 2: compute from every game this season ───────────────────────
      // fetchAll handles cursor-based pagination automatically (~10 pages for a full season)
      const gRes = await fetchAll(`/games?seasons[]=${SEASON}`);
      if (gRes._err) return {};
      const map = {};
      (gRes.data ?? []).forEach(g => {
        if (g.status !== "Final") return;
        const hs = g.home_team_score ?? 0, vs = g.visitor_team_score ?? 0;
        if (hs === 0 && vs === 0) return;           // no score recorded yet
        const homeWon = hs > vs;
        const homeAbbr = g.home_team?.abbreviation;
        const visAbbr  = g.visitor_team?.abbreviation;
        if (homeAbbr) {
          if (!map[homeAbbr]) map[homeAbbr] = { wins: 0, losses: 0 };
          homeWon ? map[homeAbbr].wins++ : map[homeAbbr].losses++;
        }
        if (visAbbr) {
          if (!map[visAbbr]) map[visAbbr] = { wins: 0, losses: 0 };
          homeWon ? map[visAbbr].losses++ : map[visAbbr].wins++;
        }
      });
      return map;
    }

    // Build a quick W-L map from only the games loaded in the local cache (7 days).
    // Used as an immediate placeholder while the full-season fetch is in flight.
    function computeStandingsFromGames(cache) {
      const map = {};
      Object.values(cache).forEach(games => {
        (games ?? []).forEach(g => {
          if (g.status !== "Final" || g.home.score == null || g.visitor.score == null) return;
          const homeWon = (g.home.score ?? 0) > (g.visitor.score ?? 0);
          [[g.home, homeWon], [g.visitor, !homeWon]].forEach(([side, won]) => {
            const abbr = side.abbreviation;
            if (!abbr) return;
            if (!map[abbr]) map[abbr] = { wins: 0, losses: 0 };
            won ? map[abbr].wins++ : map[abbr].losses++;
          });
        });
      });
      return map;
    }

    // ── Date helpers ─────────────────────────────────────────────────────────────
    function dateStr(daysAgo = 0) {
      const d = new Date(); d.setDate(d.getDate() - daysAgo);
      return d.toISOString().split("T")[0];
    }
    function fmtDate(s) { return new Date(s + "T12:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric" }); }
    // Parse BallDontLie status strings like "7:30 pm ET" into { time, ampm, tz }
    function fmtGameTime(status) {
      if (!status) return null;
      const m = status.match(/(\d{1,2}):(\d{2})\s*(am|pm)/i);
      if (!m) return null;
      const tz = (status.match(/(ET|PT|CT|MT)/i) ?? [])[0] ?? "ET";
      return { time: `${m[1]}:${m[2]}`, ampm: m[3].toUpperCase(), tz };
    }
    function dayLabel(s) {
      if (s === dateStr(0)) return "Today";
      if (s === dateStr(1)) return "Yesterday";
      return new Date(s + "T12:00:00").toLocaleDateString("en-US", { weekday:"short" });
    }
    const DATES = Array.from({ length: 7 }, (_, i) => dateStr(i));
    // Future dates: next 6 days (daysAgo = -1 = tomorrow, -2 = day after, etc.)
    const FUTURE_DATES = Array.from({ length: 6 }, (_, i) => dateStr(-(i + 1)));

    // ── Data normalisation ───────────────────────────────────────────────────────
    const byPts = arr => [...arr].sort((a, b) => (b.pts ?? 0) - (a.pts ?? 0));
    function fromBoxScores(raw) {
      return raw.map(g => ({
        id: g.id, status: g.status,
        home:    { ...g.home_team,    score: g.home_team_score,    players: byPts(g.home_team?.players    ?? []) },
        visitor: { ...g.visitor_team, score: g.visitor_team_score, players: byPts(g.visitor_team?.players ?? []) },
      }));
    }
    function fromGamesStats(games, stats) {
      return games.map(g => {
        const gs = stats.filter(s => s.game?.id === g.id);
        return {
          id: g.id, status: g.status,
          home:    { ...g.home_team,    score: g.home_team_score,    players: byPts(gs.filter(s => s.team?.id === g.home_team?.id)) },
          visitor: { ...g.visitor_team, score: g.visitor_team_score, players: byPts(gs.filter(s => s.team?.id === g.visitor_team?.id)) },
        };
      });
    }
    async function loadGames(date) {
      const box = await fetchAll(`/box_scores?date=${date}`);
      if (!box._err) return { games: fromBoxScores(box.data ?? []) };
      const [gRes, sRes] = await Promise.all([fetchAll(`/games?dates[]=${date}`), fetchAll(`/stats?dates[]=${date}`)]);
      if (gRes._err) return { games: null, errCode: gRes._err };
      return { games: fromGamesStats(gRes.data ?? [], sRes?.data && !sRes._err ? sRes.data : []) };
    }

    // ── PlayerPhoto — TheSportsDB, lazy-fetched, globally cached ─────────────────
    // fetchDelay: ms to wait before starting fetch (use to prioritise POTG > TopPerformers > Favorites)
    function PlayerPhoto({ player, size = 40, fetchDelay = 0 }) {
      const firstName = player?.first_name ?? "";
      const lastName  = player?.last_name  ?? "";
      const cacheKey  = firstName && lastName ? `${firstName} ${lastName}` : null;

      // undefined = not yet fetched | null = tried, none found | string = URL
      const [src, setSrc] = useState(() =>
        cacheKey && cacheKey in sportsDbCache ? sportsDbCache[cacheKey] : undefined
      );
      const [failed, setFailed] = useState(false);

      useEffect(() => {
        if (!cacheKey) return;
        if (cacheKey in sportsDbCache) { setSrc(sportsDbCache[cacheKey]); return; }
        // Fetch once per unique name; result stored in module-level cache.
        // fetchDelay lets POTG photos (0ms) load before TopPerformers (200ms) and Favorites (1000ms).
        const id = setTimeout(() =>
          fetchSportsDbPhoto(firstName, lastName).then(url => setSrc(url)),
        fetchDelay);
        return () => clearTimeout(id);
      }, [cacheKey]);

      const initials = `${firstName[0] ?? ""}${lastName[0] ?? ""}`;
      const circleStyle = { width:size, height:size, borderRadius:"50%", flexShrink:0 };

      if (!src || failed) return (
        <div style={{ ...circleStyle, background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize: size * 0.32, fontWeight:800, color:"white" }}>
          {initials}
        </div>
      );
      return (
        <img src={src} alt={initials}
          style={{ ...circleStyle, objectFit:"cover", objectPosition:"top center" }}
          onError={() => setFailed(true)} />
      );
    }

    // ── TeamLogo ─────────────────────────────────────────────────────────────────
    function TeamLogo({ abbr, size = 52 }) {
      const [failed, setFailed] = useState(false);
      if (failed) return (
        <div style={{ width:size, height:size, borderRadius:8, background:"#dbeafe",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:size*0.27, fontWeight:900, color:"#3b82f6" }}>
          {(abbr ?? "?").slice(0,3).toUpperCase()}
        </div>
      );
      return <img src={logoUrl(abbr)} alt={abbr ?? ""} width={size} height={size}
        style={{ objectFit:"contain" }} onError={() => setFailed(true)} />;
    }

    // ── YouTube — GAMETIME HIGHLIGHTS search → direct link ───────────────────────
    // Search without a channelId filter — "GAMETIME HIGHLIGHTS" in the query is
    // enough for YouTube's ranking to surface that channel's video at #1.
    const YT_KEY = "AIzaSyAaUCsLHh-Md-A505oS261I_wC8OXF1Q1Q";

    async function searchGametimeHighlight(game, date) {
      try {
        const d   = new Date(date + "T12:00:00");
        const mon = d.toLocaleDateString("en-US", { month:"short" });
        const day = d.getDate();
        const yr  = d.getFullYear();
        // Exact channel name in query ensures the right channel surfaces first
        const q = `"GAMETIME HIGHLIGHTS" ${game.visitor.name} vs ${game.home.name} ${mon} ${day} ${yr}`;
        const params = new URLSearchParams({
          part: "snippet", q, type: "video", order: "relevance",
          maxResults: "5", key: YT_KEY,
        });
        const r = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
        if (!r.ok) return null;
        const data = await r.json();
        // Pick the first result whose title contains "GAMETIME HIGHLIGHTS" (case-insensitive)
        const items = data.items ?? [];
        const match = items.find(v =>
          (v.snippet?.channelTitle ?? "").toLowerCase().includes("gametime highlights") ||
          (v.snippet?.title       ?? "").toLowerCase().includes("gametime highlights")
        ) ?? items[0]; // fall back to top result if none match by name
        return match?.id?.videoId ?? null;
      } catch { return null; }
    }

    // ── HighlightsButton — searches GAMETIME HIGHLIGHTS and opens on YouTube ───────
    function HighlightsButton({ game, date, style: extraStyle = {} }) {
      const [busy, setBusy] = useState(false);
      const handleClick = async () => {
        const fallback = `https://www.youtube.com/results?search_query=${encodeURIComponent(
          `${game.visitor.name} vs ${game.home.name} GAMETIME HIGHLIGHTS ${date}`
        )}`;
        // Open window SYNCHRONOUSLY first (mobile browsers block window.open after async)
        const win = window.open(fallback, "_blank");
        setBusy(true);
        const videoId = await searchGametimeHighlight(game, date);
        setBusy(false);
        // Redirect to specific video once found
        if (videoId && win && !win.closed) {
          try { win.location.href = `https://youtu.be/${videoId}`; } catch {}
        }
      };
      return (
        <button
          onClick={handleClick}
          disabled={busy}
          style={{ width:"100%", padding:"9px 12px", borderRadius:12,
            background: busy ? "#f5f5f5" : "#fff1f2",
            border:`1px solid ${busy ? "#e5e5e5" : "#fecaca"}`,
            color: busy ? "#aaa" : "#dc2626",
            fontSize:11, fontWeight:700, letterSpacing:"0.04em",
            transition:"all 0.15s", ...extraStyle }}
          onMouseEnter={e => { if (!busy) { e.currentTarget.style.background="#fee2e2"; e.currentTarget.style.borderColor="#fca5a5"; }}}
          onMouseLeave={e => { if (!busy) { e.currentTarget.style.background="#fff1f2"; e.currentTarget.style.borderColor="#fecaca"; }}}>
          {busy ? "🔍 Searching…" : "🎬 Watch Highlights ↗"}
        </button>
      );
    }

    // ── Spinner ──────────────────────────────────────────────────────────────────
    function Spinner({ full }) {
      return (
        <div style={{ display:"flex", justifyContent:"center", padding:full?"80px 0":"40px 0",
          gridColumn:full?"1/-1":undefined }}>
          <div style={{ width:38, height:38, border:"4px solid #dbeafe", borderTopColor:"#3b82f6",
            borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
        </div>
      );
    }

    // ── BoxScoreTable (with player photos) ───────────────────────────────────────
    function BoxScoreTable({ side }) {
      const isMobile = useWindowWidth() < 600;
      const players = side.players ?? [];
      if (!players.length) return null;
      return (
        <div style={{ marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, padding:"0 4px", marginBottom:8 }}>
            <TeamLogo abbr={side.abbreviation} size={22} />
            <span style={{ fontWeight:700, color:"#1e3a8a", fontSize:13 }}>{side.city} {side.name}</span>
            <span style={{ marginLeft:"auto", fontWeight:900, color:"#1d4ed8", fontSize:15 }}>{side.score}</span>
          </div>
          <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch", borderRadius:12, border:"1px solid #dbeafe" }} className="mobile-scroll">
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:isMobile?10:11 }}>
              <thead>
                <tr style={{ background:"#f0f6ff" }}>
                  <th style={{ textAlign:"left", padding:isMobile?"5px 4px":"7px 12px", fontWeight:600, color:"#60a5fa", whiteSpace:"nowrap" }}>Player</th>
                  <th style={{ padding:isMobile?"5px 4px":"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>PTS</th>
                  <th style={{ padding:isMobile?"5px 4px":"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>REB</th>
                  <th style={{ padding:isMobile?"5px 4px":"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>AST</th>
                  <th style={{ padding:isMobile?"5px 4px":"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>+/-</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>MIN</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>STL</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>BLK</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>FG</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>3PT</th>
                  <th className="mobile-hide" style={{ padding:"7px 6px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>FT</th>
                </tr>
              </thead>
              <tbody>
                {players.map((p, i) => {
                  const pl = p.player ?? {}, pm = p.plus_minus;
                  return (
                    <tr key={pl.id ?? i} style={{ background:i%2===0?"white":"#f8fbff", borderBottom:"1px solid #f0f7ff" }}>
                      <td style={{ padding:isMobile?"5px 4px":"6px 12px", whiteSpace:"nowrap" }}>
                        <span style={{ fontWeight:500, color:"#1e3a8a" }}>{pl.first_name?.[0]}. {pl.last_name}</span>
                      </td>
                      <td style={{ padding:isMobile?"5px 4px":"7px 6px", textAlign:"center", fontWeight:800, color:"#1e3a8a" }}>{p.pts??"—"}</td>
                      <td style={{ padding:isMobile?"5px 4px":"7px 6px", textAlign:"center", color:"#3b82f6" }}>{p.reb??"—"}</td>
                      <td style={{ padding:isMobile?"5px 4px":"7px 6px", textAlign:"center", color:"#3b82f6" }}>{p.ast??"—"}</td>
                      <td style={{ padding:isMobile?"5px 4px":"7px 6px", textAlign:"center", fontWeight:700,
                        color:pm>0?"#16a34a":pm<0?"#ef4444":"#93c5fd" }}>
                        {pm!=null?(pm>0?`+${pm}`:pm):"—"}
                      </td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#93c5fd" }}>{p.min??"—"}</td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#60a5fa" }}>{p.stl??"—"}</td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#60a5fa" }}>{p.blk??"—"}</td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#2563eb" }}>{p.fgm!=null?`${p.fgm}/${p.fga}`:"—"}</td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#2563eb" }}>{p.fg3m!=null?`${p.fg3m}/${p.fg3a}`:"—"}</td>
                      <td className="mobile-hide" style={{ padding:"7px 6px", textAlign:"center", color:"#2563eb" }}>{p.ftm!=null?`${p.ftm}/${p.fta}`:"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── BoxScoreModal ────────────────────────────────────────────────────────────

      useEffect(() => {
        const h = e => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, []);
      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:200,
          background:"rgba(0,0,0,0.35)",
          display:"flex", alignItems:"center", justifyContent:"center", padding:isMobile?8:16 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"white", borderRadius:isMobile?16:24,
            width:"100%", maxWidth:isMobile?"100%":820, maxHeight:"90vh", overflowY:"auto", margin:isMobile?8:0,
            boxShadow:"0 30px 80px rgba(59,130,246,0.3)", padding:isMobile?16:28 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
              <div style={{ display:"flex", alignItems:"center", gap:14 }}>

    // ── GameCard ─────────────────────────────────────────────────────────────────
    function GameCard({ game, delay, spoilerMode, date, standings }) {
      const isMobile = useWindowWidth() < 600;
      const [modal, setModal] = useState(false);
      const isFinal    = game.status === "Final";
      const isUpcoming = game.home.score == null && game.visitor.score == null && !isFinal;
      const isLive     = !isFinal && !isUpcoming;
      const gametime   = isUpcoming ? fmtGameTime(game.status) : null;

      const homeWon    = isFinal && (game.home.score ?? 0) > (game.visitor.score ?? 0);
      const visitorWon = isFinal && (game.visitor.score ?? 0) > (game.home.score ?? 0);
      const winningTeam = homeWon ? game.home : visitorWon ? game.visitor : null;
      const star = winningTeam ? byPts(winningTeam.players ?? [])[0] ?? null : null;
      const allPlayers = [...(game.home.players??[]), ...(game.visitor.players??[])];
      const hasStats   = allPlayers.some(p => p.pts != null);

      return (
        <>
          <div className="card-anim" style={{ background:"white", borderRadius:20,
            border: isUpcoming ? "1px solid #c7d2fe" : "1px solid #dbeafe",
            boxShadow: isUpcoming
              ? "0 4px 24px rgba(99,102,241,0.13)"
              : "0 2px 18px rgba(59,130,246,0.08)",
            overflow:"hidden", display:"flex", flexDirection:"column",
            animationDelay:`${delay*60}ms` }}>

            {/* ── UPCOMING matchup header ── */}
            {isUpcoming && (
              <div style={{ background:"linear-gradient(145deg,#1e1b4b 0%,#1e3a8a 60%,#1d4ed8 100%)",
                padding:isMobile?"16px 12px 14px":"22px 16px 18px", position:"relative", overflow:"hidden" }}>
                {/* subtle shimmer lines */}
                <div style={{ position:"absolute", inset:0, opacity:0.06,
                  backgroundImage:"repeating-linear-gradient(135deg,white 0px,white 1px,transparent 1px,transparent 12px)" }} />
                <div style={{ display:"flex", alignItems:"center", position:"relative" }}>
                  {/* Visitor */}
                  <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:isMobile?5:7 }}>
                    <TeamLogo abbr={game.visitor.abbreviation} size={isMobile?44:62} />
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:isMobile?11:13, fontWeight:900, color:"white", letterSpacing:"0.08em" }}>{game.visitor.abbreviation}</div>
                      <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.5)", fontWeight:500, marginTop:1 }}>{isMobile?game.visitor.abbreviation:game.visitor.city}</div>
                      {standings?.[game.visitor.abbreviation] && (
                        <div style={{ fontSize:isMobile?9:10, fontWeight:800, marginTop:3,
                          background:"rgba(255,255,255,0.18)", borderRadius:20, padding:"2px 7px",
                          color:"rgba(255,255,255,0.9)", display:"inline-block", lineHeight:1.4 }}>
                          {standings[game.visitor.abbreviation].wins}–{standings[game.visitor.abbreviation].losses}
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Centre: time */}
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:isMobile?4:6, padding:"0 4px" }}>
                    <div style={{ fontSize:isMobile?8:10, fontWeight:800, color:"rgba(255,255,255,0.45)",
                      letterSpacing:"0.14em", textTransform:"uppercase" }}>vs</div>
                    {gametime ? (
                      <div style={{ background:"rgba(255,255,255,0.12)", borderRadius:12,
                        padding:isMobile?"6px 10px":"8px 14px", textAlign:"center", backdropFilter:"blur(4px)",
                        border:"1px solid rgba(255,255,255,0.18)" }}>
                        <div style={{ fontSize:isMobile?16:22, fontWeight:900, color:"white", lineHeight:1 }}>{gametime.time}</div>
                        <div style={{ fontSize:isMobile?8:10, color:"rgba(255,255,255,0.65)", fontWeight:700,
                          letterSpacing:"0.06em", marginTop:1 }}>{gametime.ampm} {gametime.tz}</div>
                      </div>
                    ) : (
                      <div style={{ background:"rgba(255,255,255,0.1)", borderRadius:12, padding:isMobile?"6px 10px":"8px 16px",
                        fontSize:isMobile?11:13, fontWeight:800, color:"rgba(255,255,255,0.7)" }}>TBD</div>
                    )}
                    {!isMobile && <div style={{ fontSize:9, color:"rgba(255,255,255,0.35)", fontWeight:600,
                      background:"rgba(255,255,255,0.08)", borderRadius:20, padding:"2px 8px" }}>
                      🏠 {game.home.abbreviation}
                    </div>}
                  </div>
                  {/* Home */}
                  <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:isMobile?5:7 }}>
                    <TeamLogo abbr={game.home.abbreviation} size={isMobile?44:62} />
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:isMobile?11:13, fontWeight:900, color:"white", letterSpacing:"0.08em" }}>{game.home.abbreviation}</div>
                      <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.5)", fontWeight:500, marginTop:1 }}>{isMobile?game.home.abbreviation:game.home.city}</div>
                      {standings?.[game.home.abbreviation] && (
                        <div style={{ fontSize:isMobile?9:10, fontWeight:800, marginTop:3,
                          background:"rgba(255,255,255,0.18)", borderRadius:20, padding:"2px 7px",
                          color:"rgba(255,255,255,0.9)", display:"inline-block", lineHeight:1.4 }}>
                          {standings[game.home.abbreviation].wins}–{standings[game.home.abbreviation].losses}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── FINAL / LIVE score header ── */}
            {!isUpcoming && (
              <div style={{ background:"linear-gradient(150deg,#dbeafe 0%,#eff6ff 100%)", padding:isMobile?"14px 10px 10px":"20px 14px 14px" }}>
                <div style={{ display:"flex", alignItems:"center" }}>
                  {[game.visitor, game.home].map((side, si) => {
                    const rec = standings?.[side.abbreviation];
                    const won = si===0 ? visitorWon : homeWon;
                    const faded = !spoilerMode && (si===0 ? homeWon : visitorWon);
                    return (
                      <div key={si} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                        opacity:faded?0.35:1, transition:"opacity 0.3s" }}>
                        <TeamLogo abbr={side.abbreviation} size={isMobile?36:52} />
                        <span style={{ fontSize:isMobile?10:11, fontWeight:700, color:"#60a5fa", letterSpacing:"0.1em" }}>{side.abbreviation}</span>
                        <span style={{ fontSize:isMobile?28:40, fontWeight:900, lineHeight:1,
                          filter:spoilerMode?"blur(10px)":"none", transition:"filter 0.4s", userSelect:spoilerMode?"none":"auto",
                          color:spoilerMode?"#93c5fd":won?"#1e3a8a":"#93c5fd" }}>
                          {side.score??"—"}
                        </span>
                        {rec && (
                          <span style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#64748b", letterSpacing:"0.03em" }}>
                            {rec.wins}–{rec.losses}
                          </span>
                        )}
                      </div>
                    );
                  })}
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"0 8px", gap:8 }}>
                    <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em", padding:"4px 10px", borderRadius:20, whiteSpace:"nowrap",
                      background: spoilerMode ? "#f0f6ff" : isFinal ? "#dbeafe" : "#dcfce7",
                      color:       spoilerMode ? "#93c5fd" : isFinal ? "#1d4ed8" : "#15803d" }}>
                      {spoilerMode ? "VS" : isFinal ? "FINAL" : game.status ?? "LIVE"}
                    </span>
                    <span style={{ color:"#bfdbfe", fontSize:22, fontWeight:200 }}>·</span>
                  </div>
                </div>
              </div>
            )}

            {/* Player of the Game */}
            {!isUpcoming && !spoilerMode && star?.player && star.pts != null && (
              <div style={{ padding:"10px 14px", background:"#fffbeb",
                borderTop:"1px solid #fde68a", borderBottom:"1px solid #f0f7ff",
                display:"flex", alignItems:"center", gap:12 }}>
                <PlayerPhoto player={star.player} size={48} />
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:9, fontWeight:700, color:"#b45309", textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:2 }}>
                    🏆 Player of the Game · {winningTeam.abbreviation}
                  </p>
                  <p style={{ fontSize:13, fontWeight:700, color:"#78350f", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {star.player.first_name} {star.player.last_name}
                  </p>
                  <p style={{ fontSize:10, color:"#b45309", marginTop:1 }}>
                    {[star.reb&&`${star.reb} reb`, star.ast&&`${star.ast} ast`, star.stl&&`${star.stl} stl`].filter(Boolean).join(" · ")}
                  </p>
                </div>
                <div style={{ flexShrink:0, textAlign:"center" }}>
                  <div style={{ fontSize:28, fontWeight:900, color:"#f59e0b", lineHeight:1 }}>{star.pts}</div>
                  <div style={{ fontSize:9, color:"#d97706", fontWeight:700 }}>PTS</div>
                </div>
              </div>
            )}

            {/* Mini stats — only for finished games */}
            {isFinal && !spoilerMode && hasStats && (
              <div style={{ borderTop:"1px solid #f0f7ff" }}>
                {[game.visitor, game.home].map((side, si) => {
                  const top = (side.players ?? []).slice(0, 4);
                  if (!top.length) return null;
                  return (
                    <div key={si} style={{ borderBottom:si===0?"1px solid #f0f7ff":"none" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 12px 3px",
                        background:si===0?"#f8fbff":"#f5f8ff" }}>
                        <TeamLogo abbr={side.abbreviation} size={16} />
                        <span style={{ fontSize:10, fontWeight:800, color:"#3b82f6", letterSpacing:"0.06em" }}>{side.abbreviation}</span>
                        <span style={{ marginLeft:"auto", fontSize:10, fontWeight:900, color:"#1e3a8a" }}>{side.score}</span>
                      </div>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                        <thead>
                          <tr style={{ background:"#f0f6ff" }}>
                            <th style={{ textAlign:"left", padding:"4px 12px", fontWeight:600, color:"#93c5fd", fontSize:10 }}>Player</th>
                            {["PTS","REB","AST"].map(h => <th key={h} style={{ padding:"4px 8px", textAlign:"center", fontWeight:600, color:"#93c5fd", fontSize:10 }}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {top.map((p, i) => {
                            const pl = p.player ?? {};
                            return (
                              <tr key={pl.id??i} style={{ background:i%2===0?"white":"#f8fbff", borderBottom:"1px solid #f0f7ff" }}>
                                <td style={{ padding:"5px 12px" }}>
                                  <span style={{ color:"#1e3a8a", fontWeight:500, whiteSpace:"nowrap" }}>{pl.first_name?.[0]}. {pl.last_name}</span>
                                </td>
                                <td style={{ padding:"5px 8px", textAlign:"center", fontWeight:800, color:"#1e3a8a" }}>{p.pts??"—"}</td>
                                <td style={{ padding:"5px 8px", textAlign:"center", color:"#3b82f6" }}>{p.reb??"—"}</td>
                                <td style={{ padding:"5px 8px", textAlign:"center", color:"#3b82f6" }}>{p.ast??"—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Footer */}
            <div style={{ padding:"10px 12px", marginTop:"auto", display:"flex", flexDirection:"column", gap:6 }}>
              {isUpcoming ? (
                <p style={{ fontSize:10, color:"#a5b4fc", textAlign:"center", padding:"4px 0", fontWeight:600 }}>
                  📅 Upcoming — check back after tip-off
                </p>
              ) : (
                <>
                  {spoilerMode ? (
                    <p style={{ fontSize:10, color:"#bfdbfe", textAlign:"center", padding:"5px 0" }}>🙈 Spoiler mode on</p>
                  ) : (
                    hasStats ? (
                      <button onClick={() => setModal(true)} style={{ width:"100%", padding:"9px 12px",
                        borderRadius:12, background:"#eff6ff", border:"1px solid #bfdbfe",
                        color:"#2563eb", fontSize:11, fontWeight:700, letterSpacing:"0.04em" }}
                        onMouseEnter={e => e.currentTarget.style.background="#dbeafe"}
                        onMouseLeave={e => e.currentTarget.style.background="#eff6ff"}>
                        Full Box Score →
                      </button>
                    ) : (
                      <p style={{ fontSize:10, color:"#bfdbfe", textAlign:"center", padding:"2px 0" }}>Full stats require GOAT / ALL-STAR tier</p>
                    )
                  )}
                  {isFinal && <HighlightsButton game={game} date={date} />}
                </>
              )}
            </div>
          </div>
          {modal && <BoxScoreModal game={game} onClose={() => setModal(false)} />}
        </>
      );
    }

    // ── Player Detail View ────────────────────────────────────────────────────────
    function PlayerView({ player: initialPlayer, onBack }) {
      const isMobile = useWindowWidth() < 600;
      const [player, setPlayer] = useState(initialPlayer);
      const [avg,    setAvg]    = useState(undefined); // undefined=loading, null=no data
      const [games,  setGames]  = useState(undefined);
      const [top5,   setTop5]   = useState(undefined);
      const [impact, setImpact] = useState(undefined);

      useEffect(() => {
        setPlayer(initialPlayer);
        setAvg(undefined); setGames(undefined); setTop5(undefined); setImpact(undefined);
        // Ensure team IDs are loaded first so opponent names resolve correctly
        ensureTeamsById().then(() =>
          fetchPlayerStats(initialPlayer.id).then(({ avg, lastGames, top5, impact }) => {
            setAvg(avg ?? null);
            setGames(lastGames);
            setTop5(top5 ?? []);
            setImpact(impact ?? null);
          })
        );
      }, [initialPlayer.id]);

      const pct = v => v != null ? `${(v * 100).toFixed(1)}%` : "—";
      const statFmt = v => v != null ? (+v).toFixed(1) : "—";

      // Momentum trend
      const trend = (() => {
        if (!games?.length || avg == null) return null;
        const avgPts = avg.pts ?? 0;
        const above = games.filter(g => (g.pts ?? 0) >= avgPts).length;
        if (above >= 4) return { label:"🔥 On Fire", color:"#f59e0b", bg:"#fffbeb" };
        if (above <= 1) return { label:"❄️ Cold Stretch", color:"#60a5fa", bg:"#eff6ff" };
        return { label:"→ Steady", color:"#22c55e", bg:"#f0fdf4" };
      })();

      return (
        <div>
          {/* Header */}
          <div style={{ background:"white", borderBottom:"1px solid #dbeafe" }}>
            <div style={{ maxWidth:900, margin:"0 auto", padding:isMobile?"12px 16px":"18px 24px" }}>
              <button onClick={onBack} style={{ background:"#f0f6ff", border:"1px solid #dbeafe",
                borderRadius:10, padding:isMobile?"6px 10px":"8px 14px", color:"#3b82f6", fontWeight:700, fontSize:isMobile?12:13, marginBottom:isMobile?12:18 }}>
                ← Back
              </button>
              <div style={{ display:"flex", alignItems:"center", gap:isMobile?12:20 }}>
                <PlayerPhoto player={player} size={isMobile?56:80} />
                <div>
                  <p style={{ fontSize:isMobile?11:12, color:"#60a5fa", fontWeight:600 }}>
                    {player.team?.abbreviation && <><TeamLogo abbr={player.team.abbreviation} size={isMobile?16:18} style={{verticalAlign:"middle"}} />{" "}</>}
                    {player.team?.full_name ?? player.team?.abbreviation}
                    {!isMobile && player.position ? ` · ${player.position}` : ""}
                  </p>
                  <h2 style={{ fontSize:isMobile?20:26, fontWeight:900, color:"#1e3a8a", lineHeight:1.1 }}>
                    {player.first_name} {player.last_name}
                  </h2>
                  {player.jersey_number && <p style={{ fontSize:isMobile?11:12, color:"#93c5fd", marginTop:2 }}>#{player.jersey_number}</p>}
                </div>
                {!isMobile && player.team?.abbreviation && (
                  <div style={{ marginLeft:"auto" }}>
                    <TeamLogo abbr={player.team.abbreviation} size={64} />
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", padding:isMobile?"16px":"24px", display:"flex", flexDirection:"column", gap:isMobile?12:20 }}>

            {/* Season Averages */}
            <div style={{ background:"white", borderRadius:20, border:"1px solid #dbeafe",
              boxShadow:"0 2px 14px rgba(59,130,246,0.07)", padding:"20px 24px" }}>
              <h3 style={{ fontSize:14, fontWeight:800, color:"#1e3a8a", marginBottom:16 }}>📊 Season Averages — {SEASON}-{(SEASON+1).toString().slice(2)}</h3>
              {avg === undefined ? <Spinner /> : avg === null ? (
                <p style={{ color:"#93c5fd", fontSize:13 }}>No season data available</p>
              ) : (
                <>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))", gap:10, marginBottom:14 }}>
                    {[
                      { label:"PTS",  value: statFmt(avg.pts),  highlight:true },
                      { label:"REB",  value: statFmt(avg.reb) },
                      { label:"AST",  value: statFmt(avg.ast) },
                      { label:"STL",  value: statFmt(avg.stl) },
                      { label:"BLK",  value: statFmt(avg.blk) },
                      { label:"MIN",  value: statFmt(avg.min) },
                    ].map(s => (
                      <div key={s.label} style={{ background:s.highlight?"#eff6ff":"#f8fbff", borderRadius:12,
                        padding:"12px 8px", textAlign:"center", border:"1px solid #dbeafe" }}>
                        <div style={{ fontSize:22, fontWeight:900, color:s.highlight?"#1d4ed8":"#1e3a8a" }}>{s.value}</div>

                    ))}

                      </div>

                    {avg.games_played && (
                      <div style={{ background:"#f0f6ff", borderRadius:10, padding:"8px 16px",
                        display:"flex", gap:8, alignItems:"center", border:"1px solid #dbeafe" }}>
                        <span style={{ fontSize:13, fontWeight:800, color:"#1e3a8a" }}>{avg.games_played}</span>
                        <span style={{ fontSize:10, fontWeight:700, color:"#60a5fa" }}>GP</span>
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>

            {/* Team W/L Impact */}
            {impact !== undefined && (
              <div style={{ background:"white", borderRadius:20, border:"1px solid #dbeafe",
                boxShadow:"0 2px 14px rgba(59,130,246,0.07)", padding:"20px 24px" }}>
                <h3 style={{ fontSize:14, fontWeight:800, color:"#1e3a8a", marginBottom:16 }}>
                  📊 Team Record — With vs Without
                </h3>
                {impact === null ? (
                  <p style={{ color:"#93c5fd", fontSize:13 }}>No data available</p>
                ) : (() => {
                  const { withW, withL, withPct, woW, woL, withoutPct } = impact;
                  const diff = withPct != null && withoutPct != null ? withPct - withoutPct : null;
                  const diffPct = diff != null ? Math.abs(diff * 100).toFixed(1) : null;
                  const better = diff != null ? diff > 0 : null;
                  return (
                    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                        {/* With player */}
                        <div style={{ background:"#f0fdf4", borderRadius:14, padding:"14px 16px",
                          border:"1px solid #bbf7d0", textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#15803d",
                            letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>
                            ✅ With {player.last_name}
                          </div>
                          <div style={{ fontSize:isMobile?22:28, fontWeight:900, color:"#15803d", lineHeight:1 }}>
                            {withW}–{withL}
                          </div>
                          {withPct != null && (
                            <div style={{ fontSize:isMobile?10:11, fontWeight:700, color:"#16a34a", marginTop:4 }}>
                              {(withPct*100).toFixed(1)}% win rate
                            </div>
                          )}
                          <div style={{ fontSize:isMobile?9:10, color:"#86efac", marginTop:2 }}>
                            {withW + withL} games
                          </div>
                        </div>
                        {/* Without player */}
                        <div style={{ background:"#fff1f2", borderRadius:14, padding:"14px 16px",
                          border:"1px solid #fecaca", textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#dc2626",
                            letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>
                            ❌ Without
                          </div>
                          <div style={{ fontSize:isMobile?22:28, fontWeight:900, color:"#dc2626", lineHeight:1 }}>
                            {woW}–{woL}
                          </div>
                          {withoutPct != null && (
                            <div style={{ fontSize:isMobile?10:11, fontWeight:700, color:"#ef4444", marginTop:4 }}>
                              {(withoutPct*100).toFixed(1)}% win rate
                            </div>
                          )}
                          <div style={{ fontSize:isMobile?9:10, color:"#fca5a5", marginTop:2 }}>
                            {woW + woL} games
                          </div>
                        </div>
                      </div>
                      {diff != null && (woW + woL) > 0 && (
                        <div style={{ background: better?"#fffbeb":"#f8fbff", borderRadius:12, padding:"10px 16px",
                          border:`1px solid ${better?"#fde68a":"#dbeafe"}`, display:"flex", alignItems:"center", gap:10 }}>
                          <span style={{ fontSize:20 }}>{better?"🔥":"💧"}</span>
                          <div>
                            <span style={{ fontSize:isMobile?12:13, fontWeight:800,
                              color: better?"#92400e":"#1e3a8a" }}>
                              {better ? `+${diffPct}% better` : `-${diffPct}% worse`} win rate with {player.last_name}
                            </span>
                            <div style={{ fontSize:isMobile?9:10, color:"#93c5fd", marginTop:1 }}>
                              {better ? "Team clearly plays better when he's on the court" : "Win rate dips when he plays — could reflect matchup difficulty"}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Momentum — Last 5 Games */}
            <div style={{ background:"white", borderRadius:20, border:"1px solid #dbeafe",
              boxShadow:"0 2px 14px rgba(59,130,246,0.07)", padding:"20px 24px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:8 }}>
                <h3 style={{ fontSize:14, fontWeight:800, color:"#1e3a8a" }}>📈 Momentum — Last 5 Games</h3>
                {trend && (
                  <span style={{ fontSize:isMobile?10:11, fontWeight:700, padding:"4px 12px", borderRadius:20,
                    background:trend.bg, color:trend.color, border:`1px solid ${trend.color}30` }}>
                    {trend.label}
                  </span>
                )}
              </div>
              {games === undefined ? <Spinner /> : !games?.length ? (
                <p style={{ color:"#93c5fd", fontSize:13 }}>No recent game data available</p>
              ) : (
                <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }} className="mobile-scroll">
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:isMobile?10:12 }}>

                        <th style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>AST</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>MIN</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>STL</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>BLK</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>FG</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>3PT</th>
                        <th className="mobile-hide" style={{ padding:"7px 10px", fontWeight:600, color:"#60a5fa", textAlign:"center", whiteSpace:"nowrap" }}>+/-</th>
                      </tr>
                    </thead>
                    <tbody>
                      {games.map((g, i) => {
                        const date = g.game?.date ? fmtDate(g.game.date) : "—";
                        const weAreHome = g.team?.id === g.game?.home_team_id;
                        const oppId = weAreHome ? g.game?.visitor_team_id : g.game?.home_team_id;
                        const oppTeamObj = teamsById[oppId];
                        const opp = oppTeamObj?.abbreviation ?? (oppId ? String(oppId) : null);
                        const oppFullName = oppTeamObj ? `${oppTeamObj.city ?? ""} ${oppTeamObj.name ?? ""}`.trim() : opp;
                        const homeScore = g.game?.home_team_score, visScore = g.game?.visitor_team_score;
                        const ourScore = weAreHome ? homeScore : visScore;
                        const theirScore = weAreHome ? visScore : homeScore;
                        const won = ourScore != null && theirScore != null ? ourScore > theirScore : null;
                        const aboveAvg = avg && g.pts != null && g.pts >= (avg.pts ?? 0);
                        const pm = g.plus_minus;
                        return (
                          <tr key={i} style={{ background: aboveAvg ? "rgba(34,197,94,0.04)" : i%2===0?"white":"#f8fbff",
                            borderBottom:"1px solid #f0f7ff" }}>
                            <td style={{ padding:"7px 10px", color:"#60a5fa", whiteSpace:"nowrap" }}>{date}</td>
                            <td style={{ padding:"7px 10px", fontWeight:600, color:"#1e3a8a", whiteSpace:"nowrap" }}>
                              {opp ? <span style={{ display:"flex", alignItems:"center", gap:isMobile?4:6 }}><TeamLogo abbr={opp} size={isMobile?14:18} />{!isMobile && oppFullName || opp}</span> : "—"}
                            </td>
                            <td style={{ padding:"7px 10px", whiteSpace:"nowrap" }}>
                              {won != null ? (
                                <span style={{ fontSize:isMobile?9:10, fontWeight:700, padding:"2px 8px", borderRadius:20,
                                  background:won?"#f0fdf4":"#fff1f2", color:won?"#15803d":"#dc2626" }}>
                                  {won?"W":"L"}
                                </span>
                              ) : "—"}
                            </td>
                            <td style={{ padding:"7px 10px", textAlign:"center", fontWeight:800,
                              color: aboveAvg ? "#1d4ed8" : "#64748b" }}>{g.pts??"—"}</td>
                            <td style={{ padding:"7px 10px", textAlign:"center", color:"#3b82f6" }}>{g.reb??"—"}</td>
                            <td style={{ padding:"7px 10px", textAlign:"center", color:"#3b82f6" }}>{g.ast??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"#93c5fd" }}>{g.min??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"#60a5fa" }}>{g.stl??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"#60a5fa" }}>{g.blk??"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"#2563eb" }}>{g.fgm!=null?`${g.fgm}/${g.fga}`:"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", color:"#2563eb" }}>{g.fg3m!=null?`${g.fg3m}/${g.fg3a}`:"—"}</td>
                            <td className="mobile-hide" style={{ padding:"7px 10px", textAlign:"center", fontWeight:700,
                              color:pm>0?"#16a34a":pm<0?"#ef4444":"#93c5fd" }}>
                              {pm!=null?(pm>0?`+${pm}`:pm):"—"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* Top 5 Season Performances */}
            <div style={{ background:"white", borderRadius:20, border:"1px solid #dbeafe",
              boxShadow:"0 2px 14px rgba(59,130,246,0.07)", padding:"20px 24px" }}>
              <h3 style={{ fontSize:14, fontWeight:800, color:"#1e3a8a", marginBottom:16 }}>🏅 Top 5 Performances This Season</h3>
              {top5 === undefined ? <Spinner /> : !top5?.length ? (
                <p style={{ color:"#93c5fd", fontSize:13 }}>No game data available yet</p>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {top5.map((g, i) => {
                    const date = g.game?.date ? fmtDate(g.game.date) : "—";
                    const weAreHome = g.team?.id === g.game?.home_team_id;
                    const oppId = weAreHome ? g.game?.visitor_team_id : g.game?.home_team_id;
                    const oppTeamData = teamsById[oppId];
                    const oppAbbr = oppTeamData?.abbreviation ?? (oppId ? String(oppId) : null);
                    const oppName = oppTeamData ? `${oppTeamData.city ?? ""} ${oppTeamData.name ?? ""}`.trim() : oppAbbr;
                    const combined = (g.pts??0) + (g.reb??0) + (g.ast??0);
                    const ourScore = weAreHome ? g.game?.home_team_score : g.game?.visitor_team_score;
                    const theirScore = weAreHome ? g.game?.visitor_team_score : g.game?.home_team_score;
                    const won = ourScore != null && theirScore != null ? ourScore > theirScore : null;
                    const rankColors = ["#f59e0b","#94a3b8","#cd7f32","#60a5fa","#60a5fa"];
                    return (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:14,
                        background: i===0 ? "#fffbeb" : "#f8fbff",
                        borderRadius:14, padding:"12px 16px",
                        border: i===0 ? "1px solid #fde68a" : "1px solid #dbeafe" }}>
                        <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0,
                          background:`linear-gradient(135deg,${rankColors[i]}30,${rankColors[i]}60)`,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:13, fontWeight:900, color:rankColors[i] }}>
                          {i+1}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
                            <span style={{ fontSize:12, fontWeight:700, color:"#1e3a8a" }}>{date}</span>
                            {oppAbbr && (
                              <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#1e3a8a", fontWeight:600 }}>
                                vs <TeamLogo abbr={oppAbbr} size={18} />
                                <span>{oppName || oppAbbr}</span>
                              </span>
                            )}
                            {won != null && (
                              <span style={{ fontSize:10, fontWeight:700, padding:"1px 7px", borderRadius:20,
                                background:won?"#f0fdf4":"#fff1f2", color:won?"#15803d":"#dc2626" }}>
                                {won?"W":"L"} {ourScore}–{theirScore}
                              </span>
                            )}
                          </div>
                          <div style={{ display:"flex", gap:12 }}>
                            <span style={{ fontSize:13, fontWeight:900, color:"#1e3a8a" }}>{g.pts??0} <span style={{ fontSize:10, fontWeight:600, color:"#60a5fa" }}>PTS</span></span>
                            <span style={{ fontSize:13, fontWeight:700, color:"#3b82f6" }}>{g.reb??0} <span style={{ fontSize:10, fontWeight:600, color:"#93c5fd" }}>REB</span></span>
                            <span style={{ fontSize:13, fontWeight:700, color:"#3b82f6" }}>{g.ast??0} <span style={{ fontSize:10, fontWeight:600, color:"#93c5fd" }}>AST</span></span>
                            {g.stl>0 && <span style={{ fontSize:11, color:"#60a5fa" }}>{g.stl} STL</span>}
                            {g.blk>0 && <span style={{ fontSize:11, color:"#60a5fa" }}>{g.blk} BLK</span>}
                          </div>
                        </div>
                        <div style={{ textAlign:"center", flexShrink:0 }}>
                          <div style={{ fontSize:22, fontWeight:900, color: i===0?"#f59e0b":"#1d4ed8", lineHeight:1 }}>{combined}</div>
                          <div style={{ fontSize:9, fontWeight:700, color:"#93c5fd", letterSpacing:"0.07em" }}>COMBINED</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    // ── Standings Panel ───────────────────────────────────────────────────────────
    function StandingsPanel({ standings }) {
      const isMobile = useWindowWidth() < 600;
      const hasData = Object.keys(standings).length > 0;

      // Sort a list of abbreviations by win-pct desc, then wins desc
      const ranked = abbrs => abbrs
        .map(abbr => {
          const r = standings[abbr] ?? { wins: 0, losses: 0 };
          const gp = r.wins + r.losses;
          return { abbr, wins: r.wins, losses: r.losses, pct: gp > 0 ? r.wins / gp : 0, gp };
        })
        .sort((a, b) => b.pct !== a.pct ? b.pct - a.pct : b.wins - a.wins);

      const east = ranked(EAST_ABBRS);
      const west = ranked(WEST_ABBRS);

      const Row = ({ t, i, compact }) => (
        <div style={{ display:"flex", alignItems:"center", gap:compact?3:5,
          padding:compact?"3px 6px":"5px 8px",
          background: i % 2 === 0 ? "transparent" : "#f8fbff",
          borderRadius:4 }}>
          <span style={{ width:compact?12:16, fontSize:compact?8:9, fontWeight:700, textAlign:"right", flexShrink:0,
            color: i < 6 ? "#1d4ed8" : "#a0aec0" }}>
            {i + 1}
          </span>
          <TeamLogo abbr={t.abbr} size={compact?14:16} />
          <span style={{ flex:1, fontSize:compact?9:10, fontWeight:700, color:"#1e3a8a",
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {t.abbr}
          </span>
          <span style={{ fontSize:compact?8:9, fontWeight:700, color:"#334155", whiteSpace:"nowrap" }}>
            {t.wins}–{t.losses}
          </span>
        </div>
      );

      const Conf = ({ teams, title, compact }) => (
        <div>
          <div style={{ fontSize:compact?8:8, fontWeight:800, color:"#60a5fa", letterSpacing:"0.1em",
            textTransform:"uppercase", padding:compact?"3px 6px 2px":"4px 8px 3px" }}>
            {title}
          </div>
          {(hasData ? teams.filter(t => t.gp > 0) : teams).map((t, i) => (
            <Row key={t.abbr} t={t} i={i} compact={compact} />
          ))}
          {!hasData && <div style={{ padding:"8px", textAlign:"center" }}><Spinner /></div>}
        </div>
      );

      // ── Desktop: vertical card ───────────────────────────────────────────────
      if (!isMobile) return (
        <div style={{ background:"white", borderRadius:14, border:"1px solid #dbeafe",
          boxShadow:"0 2px 12px rgba(59,130,246,0.07)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)", padding:"9px 12px" }}>
            <span style={{ fontSize:11, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>🏆 Standings</span>
          </div>
          <div style={{ padding:"6px 2px 8px" }}>
            <Conf teams={east} title="Eastern" />
            <div style={{ height:1, background:"#dbeafe", margin:"6px 8px" }} />
            <Conf teams={west} title="Western" />
          </div>
        </div>
      );

      // ── Mobile: horizontal two-column card at bottom ─────────────────────────
      return (
        <div style={{ margin:"16px 12px 24px", background:"white", borderRadius:14,
          border:"1px solid #dbeafe", boxShadow:"0 2px 12px rgba(59,130,246,0.07)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)", padding:"9px 14px" }}>
            <span style={{ fontSize:12, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>🏆 Standings</span>
          </div>
          <div style={{ display:"flex" }}>
            <div style={{ flex:1, borderRight:"1px solid #dbeafe", padding:"4px 0 6px" }}>
              <Conf teams={east} title="Eastern" compact />
            </div>
            <div style={{ flex:1, padding:"4px 0 6px" }}>
              <Conf teams={west} title="Western" compact />
            </div>
          </div>
        </div>
      );
    }

    // ── Top Performers ───────────────────────────────────────────────────────────
    function TopPerformers({ games, spoilerMode }) {
      const isMobile = useWindowWidth() < 600;
      // Flatten all players from all finished games that have stats
      const allPlayers = games.flatMap(g => [
        ...(g.home.players    ?? []).map(p => ({ ...p, teamAbbr: g.home.abbreviation })),
        ...(g.visitor.players ?? []).map(p => ({ ...p, teamAbbr: g.visitor.abbreviation })),
      ]).filter(p => p.pts != null && p.player);

      if (spoilerMode) return null;
      if (allPlayers.length === 0) return null;

      const top5 = (key) =>
        [...allPlayers]
          .filter(p => (p[key] ?? 0) > 0)
          .sort((a, b) => (b[key] ?? 0) - (a[key] ?? 0))
          .slice(0, 5);

      const scorers    = top5("pts");
      const assisters  = top5("ast");
      const rebounders = top5("reb");

      // Top 5 by combined PTS+AST+REB, showing each stat individually
      const allRounders = [...allPlayers]
        .filter(p => (p.pts ?? 0) + (p.ast ?? 0) + (p.reb ?? 0) > 0)
        .sort((a, b) =>
          ((b.pts ?? 0) + (b.ast ?? 0) + (b.reb ?? 0)) -
          ((a.pts ?? 0) + (a.ast ?? 0) + (a.reb ?? 0))
        )
        .slice(0, 5);

      const medals = ["🥇", "🥈", "🥉", "4", "5"];
      const rankStyle = i => ({ fontSize: i === 0 ? (isMobile?12:14) : (isMobile?11:12), opacity: 1 - i * 0.12 });

      // Reusable avatar: player photo with tiny team logo badge
      const PlayerAvatar = ({ player, teamAbbr, photoSize = 32 }) => (
        <div style={{ position:"relative", flexShrink:0 }}>
          <PlayerPhoto player={player} size={photoSize} fetchDelay={300} />
          <div style={{ position:"absolute", bottom:-2, right:-2,
            width:14, height:14, borderRadius:"50%", overflow:"hidden",
            border:"1px solid white", background:"white" }}>
            <img src={logoUrl(teamAbbr)} alt={teamAbbr}
              style={{ width:"100%", height:"100%", objectFit:"contain" }} />
          </div>
        </div>
      );

      // Single-stat section (pts / ast / reb)
      const Section = ({ title, color, icon, players, statKey }) => (
        <div style={{ flex:isMobile?1:"auto", minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
            <span style={{ fontSize:isMobile?16:18 }}>{icon}</span>
            <span style={{ fontSize:isMobile?10:11, fontWeight:800, color, letterSpacing:"0.06em", textTransform:"uppercase" }}>{title}</span>
          </div>
          {players.map((p, i) => {
            const isFirst = i === 0;
            const name = isFirst
              ? `${p.player.first_name} ${p.player.last_name}`
              : `${p.player.first_name?.[0]}. ${p.player.last_name}`;
            return (
              <div key={p.player?.id ?? i} style={{ display:"flex", alignItems:"center", gap:8,
                padding: isFirst ? "8px 0 10px" : "5px 0",
                borderBottom: i < players.length-1 ? "1px solid #f0f6ff" : "none",
                ...rankStyle(i) }}>
                <span style={{ width:18, textAlign:"center", fontSize: i < 3 ? 13 : 11,
                  color: i < 3 ? "inherit" : "#94a3b8", fontWeight:700, flexShrink:0 }}>
                  {i < 3 ? medals[i] : `${i+1}.`}
                </span>
                {isFirst
                  ? <PlayerAvatar player={p.player} teamAbbr={p.teamAbbr} photoSize={44} />
                  : <div style={{ width:44, flexShrink:0 }} />}
                <span style={{ flex:1, fontSize: isFirst ? 13 : 12, fontWeight: isFirst ? 800 : 600,
                  color:"#1e3a8a", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {name}
                </span>
                {spoilerMode ? (
                  <span style={{ fontSize:11, color:"#bfdbfe" }}>—</span>

                  <span style={{ fontSize: isFirst ? 18 : 13, fontWeight:900, color,
                    minWidth:26, textAlign:"right", flexShrink:0 }}>
                    {p[statKey]}
                  </span>
                )}
              </div>
            );
          })}
        </div>
      );

      // All-around section — ranked by PTS+AST+REB, each stat shown separately
      const AllAroundSection = () => (
        <div style={{ flex:isMobile?"1":"0 0 auto", width:isMobile?"100%":280 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
            <span style={{ fontSize:isMobile?16:18 }}>🌟</span>
            <span style={{ fontSize:isMobile?10:11, fontWeight:800, color:"#b45309",
              letterSpacing:"0.06em", textTransform:"uppercase" }}>All-Around</span>
            {!isMobile && <span style={{ fontSize:10, color:"#d97706", fontWeight:600, marginLeft:2 }}>PTS · AST · REB</span>}
          </div>
          {allRounders.map((p, i) => {
            const isFirst = i === 0;
            const name = isFirst
              ? `${p.player.first_name} ${p.player.last_name}`
              : `${p.player.first_name?.[0]}. ${p.player.last_name}`;
            return (
              <div key={p.player?.id ?? i} style={{ display:"flex", alignItems:"center", gap:8,
                padding: isFirst ? "8px 0 10px" : "5px 0",
                borderBottom: i < allRounders.length-1 ? "1px solid #fef3c7" : "none",

                {isFirst
                  ? <PlayerAvatar player={p.player} teamAbbr={p.teamAbbr} photoSize={44} />
                  : <div style={{ width:44, flexShrink:0 }} />}
                <span style={{ flex:1, fontSize: isFirst ? 13 : 12, fontWeight: isFirst ? 800 : 600,
                  color:"#1e3a8a", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {name}
                </span>
                {spoilerMode ? (
                  <span style={{ fontSize:11, color:"#bfdbfe" }}>—</span>
                ) : (
                  <div style={{ display:"flex", gap:3, alignItems:"baseline", flexShrink:0 }}>
                    <span style={{ fontSize: isFirst ? 14 : 12, fontWeight:900, color:"#1d4ed8" }}>{p.pts ?? 0}</span>
                    <span style={{ fontSize:9, color:"#93c5fd", fontWeight:600 }}>p</span>
                    <span style={{ fontSize:9, color:"#cbd5e1" }}>·</span>
                    <span style={{ fontSize: isFirst ? 14 : 12, fontWeight:900, color:"#0891b2" }}>{p.ast ?? 0}</span>
                    <span style={{ fontSize:9, color:"#7dd3fc", fontWeight:600 }}>a</span>
                    <span style={{ fontSize:9, color:"#cbd5e1" }}>·</span>
                    <span style={{ fontSize: isFirst ? 14 : 12, fontWeight:900, color:"#7c3aed" }}>{p.reb ?? 0}</span>
                    <span style={{ fontSize:9, color:"#c4b5fd", fontWeight:600 }}>r</span>

      return (
        <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"0 16px 0":"0 24px 0" }}>

            <div style={{ fontSize:isMobile?10:11, fontWeight:800, color:"#60a5fa", letterSpacing:"0.08em",
              textTransform:"uppercase", marginBottom:12 }}>
              ⭐ Top Performers

              {!isMobile && <div style={{ width:1, background:"#dbeafe", flexShrink:0 }} />}
              {!isMobile && <Section title="Rebounds" color="#7c3aed" icon="💪" players={rebounders} statKey="reb" />}

                <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:12 }}>
