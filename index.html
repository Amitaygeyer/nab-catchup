                        <TeamLogo abbr={game.visitor.abbreviation} size={16} />
                        <span style={{ fontSize:10, fontWeight:900, color:"#a5b4fc" }}>{game.visitor.abbreviation}</span>
                        <span style={{ fontSize:9, color:"#a5b4fc", marginLeft:"auto" }}>{awayPct}%</span>
                      </div>
                      {awayEntries.length > 0
                        ? awayEntries.map(([uid, vote]) => <VRow key={uid} uid={uid} vote={vote} />)
                        : <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontStyle:"italic", padding:"4px 8px" }}>No picks</div>}
                    </div>
                    <div style={{ width:1, background:"rgba(255,255,255,0.1)", flexShrink:0 }} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:8, padding:"5px 8px",
                        background:"rgba(245,158,11,0.2)", borderRadius:8, border:"1px solid rgba(245,158,11,0.4)" }}>
                        <TeamLogo abbr={game.home.abbreviation} size={16} />
                        <span style={{ fontSize:10, fontWeight:900, color:"#fbbf24" }}>{game.home.abbreviation}</span>
                        <span style={{ fontSize:9, color:"#fbbf24", marginLeft:"auto" }}>{homePct}%</span>
                      </div>
                      {homeEntries.length > 0
                        ? homeEntries.map(([uid, vote]) => <VRow key={uid} uid={uid} vote={vote} />)
                        : <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontStyle:"italic", padding:"4px 8px" }}>No picks</div>}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Friends picks panel */}
            {showFriends && (
              <div style={{ padding:"0 12px 12px", borderTop:"1px solid rgba(124,58,237,0.25)",
                background:"rgba(124,58,237,0.08)" }}>
                {!currentUser ? (
                  <div style={{ textAlign:"center", fontSize:12, color:"#c4b5fd", padding:"12px 0", fontWeight:600 }}>Sign in to see friends' picks</div>
                ) : friendUids.length === 0 ? (
                  <div style={{ textAlign:"center", fontSize:12, color:"#c4b5fd", padding:"12px 0", fontWeight:600 }}>Add friends in the <b>👥 Friends</b> tab</div>
                ) : friendTotal === 0 ? (
                  <div style={{ textAlign:"center", fontSize:12, color:"rgba(255,255,255,0.4)", padding:"12px 0" }}>None of your friends picked this game</div>
                ) : (
                  <>
                    <div style={{ padding:"10px 0 8px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <TeamLogo abbr={game.visitor.abbreviation} size={13} />
                          <span style={{ fontSize:11, fontWeight:900, color:"#a78bfa" }}>{friendAwayPct}%</span>
                          <span style={{ fontSize:9, color:"rgba(255,255,255,0.4)" }}>({friendAway.length})</span>
                        </div>
                        <span style={{ fontSize:9, color:"#c4b5fd", fontWeight:700 }}>{friendTotal} friend{friendTotal !== 1 ? "s" : ""} voted</span>
                        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <span style={{ fontSize:9, color:"rgba(255,255,255,0.4)" }}>({friendHome.length})</span>
                          <span style={{ fontSize:11, fontWeight:900, color:"#f59e0b" }}>{friendHomePct}%</span>
                          <TeamLogo abbr={game.home.abbreviation} size={13} />
                        </div>
                      </div>
                      <div style={{ height:7, borderRadius:5, background:"rgba(255,255,255,0.08)", overflow:"hidden", display:"flex" }}>
                        <div style={{ width:`${friendAwayPct}%`, background:"linear-gradient(90deg,#7c3aed,#a78bfa)", transition:"width 0.4s" }} />
                        <div style={{ flex:1, background:"linear-gradient(90deg,#f59e0b,#fbbf24)" }} />
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:6,
                          padding:"4px 8px", background:"rgba(124,58,237,0.2)", borderRadius:7, border:"1px solid rgba(167,139,250,0.4)" }}>
                          <TeamLogo abbr={game.visitor.abbreviation} size={14} />
                          <span style={{ fontSize:9, fontWeight:900, color:"#a78bfa" }}>{game.visitor.abbreviation}</span>
                        </div>
                        {friendAway.length > 0
                          ? friendAway.map(([uid, vote]) => <VRow key={uid} uid={uid} vote={vote} />)
                          : <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", fontStyle:"italic", padding:"4px 8px" }}>No picks</div>}
                      </div>
                      <div style={{ width:1, background:"rgba(255,255,255,0.08)", flexShrink:0 }} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:6,
                          padding:"4px 8px", background:"rgba(245,158,11,0.2)", borderRadius:7, border:"1px solid rgba(245,158,11,0.4)" }}>
                          <TeamLogo abbr={game.home.abbreviation} size={14} />
                          <span style={{ fontSize:9, fontWeight:900, color:"#fbbf24" }}>{game.home.abbreviation}</span>
                        </div>
                        {friendHome.length > 0
                          ? friendHome.map(([uid, vote]) => <VRow key={uid} uid={uid} vote={vote} />)
                          : <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", fontStyle:"italic", padding:"4px 8px" }}>No picks</div>}
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        );
      };

      // ── Combined loading: Firestore + all vote-date game caches ──────────────────
      // Firestore fires instantly (even empty). We must ALSO wait for game data,
      // otherwise upcomingGames appears empty and "no games" flashes prematurely.
      const voteGamesLoading = VOTE_DATES.some(d => gameCache[d] === undefined);
      const isLoading = loadingVotes || voteGamesLoading;

      // ── Find the single NEXT upcoming gameday to vote on ─────────────────────────
      // Walk forward through VOTE_DATES, return the first date that has games where
      // scores are still null (i.e. tip-off hasn't happened yet).
      const nextVoteDay = React.useMemo(() => {
        for (const d of VOTE_DATES) {
          if (gameCache[d] === undefined) continue; // still loading this date
          const upcoming = (gameCache[d] ?? []).filter(g =>
            g.status !== "Final" &&
            (g.home.score    == null || g.home.score    === 0) &&
            (g.visitor.score == null || g.visitor.score === 0)
          );
          if (upcoming.length > 0) {
            return {
              date:  d,
              label: d === DATES[0] ? "Today" : d === FUTURE_DATES[0] ? "Tomorrow" : fmtDate(d),
              games: upcoming,
              open:  isVotingOpen(d),
            };
          }
        }
        return null;
      }, [gameCache]);

      // Group games for result tab
      const resultsByDate = RESULT_DATES.map(d => ({
        date: d,
        label: d === DATES[1] ? "Yesterday" : fmtDate(d),
        games: (gameCache[d] ?? []).filter(g => g.status === "Final"),
      })).filter(g => g.games.length > 0);

      const medalColor = i => i === 0 ? "#f59e0b" : i === 1 ? "#9ca3af" : i === 2 ? "#cd7c2f" : "#cbd5e1";
      const medalEmoji = i => i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i+1}`;

      return (
        <div style={{ maxWidth:900, margin:"0 auto", padding:isMobile?"14px 12px":"20px 24px" }}>
          {/* Page header */}
          <div style={{ marginBottom:16,
            background:"rgba(8,12,28,0.72)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",
            borderRadius:16, padding:isMobile?"14px 16px":"16px 24px",
            border:"1px solid rgba(245,158,11,0.22)",
            boxShadow:"0 4px 20px rgba(0,0,0,0.35)" }}>
            <h2 style={{ fontSize:isMobile?20:26, fontWeight:900, color:"white", marginBottom:4,
              textShadow:"0 1px 8px rgba(245,158,11,0.3)" }}>🎲 Stakes</h2>
            <p style={{ fontSize:isMobile?12:13, color:"rgba(255,255,255,0.6)", fontWeight:500 }}>
              Pick the winners · Voting closes <b style={{ color:"#fbbf24" }}>1 hour before tip-off</b> · Compete with friends
            </p>

            {/* Tabs */}
            <div style={{ display:"flex", gap:isMobile?4:6, marginTop:14, overflowX:"auto",
              WebkitOverflowScrolling:"touch" }} className="mobile-scroll">
              {[
                { id:"vote",        label:"🎯 Vote",        sub:"Upcoming" },
                { id:"results",     label:"📊 Results",     sub:"Last 3 days" },
                { id:"leaderboard", label:"🏆 Leaderboard", sub:"Rankings" },
                { id:"friends-lb",  label:"👥 Friends LB",  sub:"Friends only" },
              ].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:isMobile?"8px 12px":"9px 16px",
                  borderRadius:10, flexShrink:0, cursor:"pointer", transition:"all 0.15s", border:"none",
                  background: tab===t.id ? "linear-gradient(135deg,#f59e0b,#d97706)" : "rgba(255,255,255,0.10)",
                  boxShadow: tab===t.id ? "0 2px 10px rgba(245,158,11,0.4)" : "none" }}>
                  <div style={{ fontSize:isMobile?12:13, fontWeight:800,
                    color: tab===t.id ? "white" : "rgba(255,255,255,0.65)", whiteSpace:"nowrap" }}>{t.label}</div>
                  <div style={{ fontSize:9, fontWeight:600, marginTop:2,
                    color: tab===t.id ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.35)" }}>{t.sub}</div>
                </button>
              ))}
            </div>
          </div>

          {/* ── VOTE TAB ── */}
          {tab === "vote" && (
            <div>
              {isLoading && <div style={{ textAlign:"center", padding:40 }}><Spinner full /></div>}
              {!isLoading && !nextVoteDay && (
                <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                  border:"1px solid rgba(245,158,11,0.22)" }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>😴</div>
                  <div style={{ fontWeight:700, color:"white" }}>No upcoming games in the next 3 days</div>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>Check back closer to the next game day!</div>
                </div>
              )}
              {!isLoading && nextVoteDay && (
                <div style={{ marginBottom:24 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                    <h3 style={{ fontSize:isMobile?14:16, fontWeight:900, color:"white" }}>{nextVoteDay.label}</h3>
                    <span style={{ fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:20,
                      background: nextVoteDay.open ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)",
                      color: nextVoteDay.open ? "#4ade80" : "#f87171",
                      border: `1px solid ${nextVoteDay.open ? "rgba(74,222,128,0.4)" : "rgba(248,113,113,0.4)"}` }}>
                      {nextVoteDay.open ? "🟢 Voting open" : "🔴 Voting closed"}
                    </span>
                  </div>
                  {nextVoteDay.games.map(g => <VoteCard key={g.id} game={g} date={nextVoteDay.date} />)}
                </div>
              )}
            </div>
          )}

          {/* ── RESULTS TAB ── */}
          {tab === "results" && (
            <div>
              {loadingVotes && <div style={{ textAlign:"center", padding:40 }}><Spinner full /></div>}
              {!loadingVotes && resultsByDate.length === 0 && (
                <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                  border:"1px solid rgba(245,158,11,0.22)" }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>📭</div>
                  <div style={{ fontWeight:700, color:"white" }}>No results yet</div>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>Results appear after games finish</div>
                </div>
              )}
              {resultsByDate.map(({ date, label, games }) => (
                <div key={date} style={{ marginBottom:24 }}>
                  <h3 style={{ fontSize:isMobile?14:16, fontWeight:900, color:"white", marginBottom:12 }}>{label}</h3>
                  {games.map(g => <ResultCard key={g.id} game={g} date={date} />)}
                </div>
              ))}
            </div>
          )}

          {/* ── LEADERBOARD TAB ── */}
          {tab === "leaderboard" && (() => {
            if (leaderboard.length === 0) return (
              <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                border:"1px solid rgba(245,158,11,0.22)" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>🏆</div>
                <div style={{ fontWeight:700, color:"white" }}>Leaderboard coming soon</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>Make picks and finish games to see rankings!</div>
              </div>
            );

            // Sort for each leaderboard
            const mostWins = [...leaderboard].sort((a, b) => b.correct !== a.correct ? b.correct - a.correct : b.pct - a.pct);
            const smartScore = u => Math.round(u.correct * u.correct / Math.max(u.total, 1));
            const smartLB = [...leaderboard].sort((a, b) => smartScore(b) !== smartScore(a) ? smartScore(b) - smartScore(a) : b.correct - a.correct);

            const LBTable = ({ rows, scoreCol, scoreFn, scoreLabel, accentColor, headerGrad, caption }) => (
              <div style={{ background:"rgba(8,12,28,0.75)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
                borderRadius:16, border:"1px solid rgba(245,158,11,0.22)", boxShadow:"0 4px 20px rgba(0,0,0,0.4)", overflow:"hidden", marginBottom:16 }}>
                <div style={{ background:headerGrad, padding:"12px 20px", display:"flex", gap:isMobile?8:14, alignItems:"center" }}>
                  <span style={{ fontSize:isMobile?13:14, fontWeight:900, color:"white", flex:1 }}>{scoreCol}</span>
                  <span style={{ width:isMobile?44:60, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.6)", textAlign:"center" }}>W</span>
                  <span style={{ width:isMobile?44:60, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.6)", textAlign:"center" }}>L</span>
                  <span style={{ width:isMobile?52:68, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.6)", textAlign:"right" }}>{scoreLabel}</span>
                </div>
                {rows.map((user, i) => {
                  const a = av(user.avatar);
                  const isMe = user.uid === currentUser?.uid;
                  const losses = user.total - user.correct;
                  const score = scoreFn(user);
                  return (
                    <div key={user.uid} style={{ display:"flex", alignItems:"center", gap:isMobile?8:14,
                      padding:isMobile?"10px 14px":"12px 20px",
                      background: isMe ? "rgba(99,102,241,0.18)" : i % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.02)",
                      borderBottom: i < rows.length - 1 ? "1px solid rgba(255,255,255,0.06)" : "none",
                      borderLeft: isMe ? "3px solid #6366f1" : "3px solid transparent" }}>
                      <div style={{ width:28, textAlign:"center", fontSize:i < 3 ? 18 : 11, fontWeight:900, color:medalColor(i), flexShrink:0 }}>
                        {medalEmoji(i)}
                      </div>
                      <div style={{ flex:1, display:"flex", alignItems:"center", gap:8, minWidth:0 }}>
                        <div style={{ width:isMobile?26:32, height:isMobile?26:32, borderRadius:"50%",
                          background:a.bg, display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:isMobile?13:15, flexShrink:0, boxShadow: isMe ? "0 0 0 2px #6366f1" : "none" }}>
                          {a.emoji}
                        </div>
                        <div style={{ minWidth:0 }}>
                          <div style={{ fontSize:isMobile?12:13, fontWeight:800, color:"white",
                            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                            {user.username}{isMe && <span style={{ fontSize:9, color:"#a5b4fc", marginLeft:5, fontWeight:700 }}>YOU</span>}
                          </div>
                          <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>{user.total} pick{user.total !== 1 ? "s" : ""}</div>
                        </div>
                      </div>
                      <div style={{ width:isMobile?44:60, textAlign:"center", fontSize:isMobile?12:13, fontWeight:800, color:"#4ade80" }}>{user.correct}</div>
                      <div style={{ width:isMobile?44:60, textAlign:"center", fontSize:isMobile?12:13, fontWeight:800, color:"#f87171" }}>{losses}</div>
                      <div style={{ width:isMobile?52:68, textAlign:"right" }}>
                        <span style={{ fontSize:isMobile?14:16, fontWeight:900, color:accentColor }}>
                          {score}
                        </span>
                      </div>
                    </div>
                  );
                })}
                <div style={{ padding:"8px 20px", fontSize:10, color:"rgba(255,255,255,0.3)", textAlign:"right" }}>{caption}</div>
              </div>
            );

            return (
              <div>
                <LBTable
                  rows={mostWins}
                  scoreCol="🏆 Most Correct Picks"
                  scoreFn={u => u.correct}
                  scoreLabel="WINS"
                  accentColor="#4ade80"
                  headerGrad="linear-gradient(135deg,#064e3b,#065f46)"
                  caption="Ranked by total correct picks · all-time"
                />
                <LBTable
                  rows={smartLB}
                  scoreCol="⚡ Smart Score"
                  scoreFn={u => smartScore(u)}
                  scoreLabel="SCORE"
                  accentColor="#fbbf24"
                  headerGrad="linear-gradient(135deg,#78350f,#92400e)"
                  caption="Score = wins² ÷ total picks · rewards consistency + volume"
                />
              </div>
            );
          })()}

          {/* ── FRIENDS LEADERBOARD TAB ── */}
          {tab === "friends-lb" && (() => {
            if (!currentUser) return (
              <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                border:"1px solid rgba(245,158,11,0.22)" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>👥</div>
                <div style={{ fontWeight:700, color:"white" }}>Sign in to see your Friends Leaderboard</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>Sign in and add friends to compete together</div>
              </div>
            );
            const friendUids = currentUser.friends ?? [];
            if (friendUids.length === 0) return (
              <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                border:"1px solid rgba(245,158,11,0.22)" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>👥</div>
                <div style={{ fontWeight:700, color:"white" }}>No friends yet</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>
                  Head to the <b style={{ color:"#fbbf24" }}>👥 Friends</b> tab to add friends, then race them on the leaderboard!
                </div>
              </div>
            );
            // Filter leaderboard to friends + self
            const myUid = currentUser.uid;
            const friendsLB = leaderboard.filter(u => u.uid === myUid || friendUids.includes(u.uid));
            if (friendsLB.length === 0) return (
              <div style={{ textAlign:"center", padding:"60px 24px", background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16,
                border:"1px solid rgba(245,158,11,0.22)" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>⏳</div>
                <div style={{ fontWeight:700, color:"white" }}>No picks yet</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:6 }}>You and your friends haven't made any picks on finished games yet</div>
              </div>
            );
            return (
              <div>
                <div style={{ background:"rgba(8,12,28,0.75)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:16, border:"1px solid rgba(124,58,237,0.35)",
                  boxShadow:"0 4px 20px rgba(0,0,0,0.4)", overflow:"hidden" }}>
                  {/* Header */}
                  <div style={{ background:"linear-gradient(135deg,#4c1d95,#6d28d9)", padding:"14px 20px",
                    display:"flex", gap:isMobile?8:14, alignItems:"center" }}>
                    <span style={{ width:32, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.5)", textAlign:"center" }}>RANK</span>
                    <span style={{ flex:1, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.5)", letterSpacing:"0.08em" }}>PLAYER</span>
                    <span style={{ width:isMobile?36:50, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.5)", textAlign:"center" }}>W</span>
                    <span style={{ width:isMobile?36:50, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.5)", textAlign:"center" }}>L</span>
                    <span style={{ width:isMobile?44:60, fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.5)", textAlign:"right" }}>%</span>
                  </div>
                  {friendsLB.map((user, i) => {
                    const a = av(user.avatar);
                    const isMe = user.uid === myUid;
                    const losses = user.total - user.correct;
                    return (
                      <div key={user.uid} style={{ display:"flex", alignItems:"center", gap:isMobile?8:14,
                        padding:isMobile?"10px 14px":"12px 20px",
                        background: isMe ? "rgba(124,58,237,0.2)" : i % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.02)",
                        borderBottom: i < friendsLB.length - 1 ? "1px solid rgba(255,255,255,0.06)" : "none",
                        borderLeft: isMe ? "3px solid #7c3aed" : "3px solid transparent" }}>
                        <div style={{ width:32, textAlign:"center", fontSize:i < 3 ? 18 : 12,
                          fontWeight:900, color:medalColor(i), flexShrink:0 }}>
                          {medalEmoji(i)}
                        </div>
                        <div style={{ flex:1, display:"flex", alignItems:"center", gap:8, minWidth:0 }}>
                          <div style={{ width:isMobile?28:34, height:isMobile?28:34, borderRadius:"50%",
                            background:a.bg, display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:isMobile?14:16, flexShrink:0,
                            boxShadow: isMe ? "0 0 0 2px #7c3aed" : "none" }}>
                            {a.emoji}
                          </div>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:isMobile?12:13, fontWeight:800, color:"white",
                              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                              {user.username}{isMe && <span style={{ fontSize:9, color:"#c4b5fd", marginLeft:5, fontWeight:700 }}>YOU</span>}
                            </div>
                            <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>{user.total} pick{user.total !== 1 ? "s" : ""} total</div>
                          </div>
                        </div>
                        <div style={{ width:isMobile?36:50, textAlign:"center", fontSize:isMobile?13:14,
                          fontWeight:800, color:"#4ade80" }}>{user.correct}</div>
                        <div style={{ width:isMobile?36:50, textAlign:"center", fontSize:isMobile?13:14,
                          fontWeight:800, color:"#f87171" }}>{losses}</div>
                        <div style={{ width:isMobile?44:60, textAlign:"right" }}>
                          <span style={{ fontSize:isMobile?14:16, fontWeight:900,
                            color: user.pct >= 60 ? "#4ade80" : user.pct >= 50 ? "#fbbf24" : "#f87171" }}>
                            {user.pct}%
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ marginTop:12, fontSize:11, color:"rgba(255,255,255,0.4)", textAlign:"center" }}>
                  Friends-only · all-time rankings
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ── Root ─────────────────────────────────────────────────────────────────────
    function NBAGames() {
      const isMobile = useWindowWidth() < 600;
      const [view,        setView]        = useState("home");
      const [spoilerMode, setSpoilerMode] = useState(() => { try { return localStorage.getItem("nba-spoiler-mode") === "true"; } catch { return false; } });
      const [gameCache,   setGameCache]   = useState({});
      const [apiStandings,  setApiStandings]  = useState({});
      const [standings,     setStandings]     = useState({});
      const [favTeams,    setFavTeams]    = useState(() => { try { return JSON.parse(localStorage.getItem("nba-fav-teams")??"[]"); } catch { return []; } });
      const [favPlayers,  setFavPlayers]  = useState(() => { try { return JSON.parse(localStorage.getItem("nba-fav-players")??"[]"); } catch { return []; } });
      const [currentUser,  setCurrentUser]  = useState(null);
      const [accountOpen,  setAccountOpen]  = useState(false);

      // ── Global votes state (lifted here so FriendsView can read leaderboard) ────
      const [votes,        setVotes]        = useState({});
      const [loadingVotes, setLoadingVotes] = useState(true);

      useEffect(() => {
        if (!fbDb) { setLoadingVotes(false); return; }
        const unsub = fbDb.collection("votes").onSnapshot(snap => {
          const v = {};
          snap.docs.forEach(doc => {
            const d = doc.data();
            const key = `${d.date}_${d.gameId}`;
            if (!v[key]) v[key] = {};
            v[key][d.userId] = { teamAbbr: d.teamAbbr, username: d.username, avatar: d.avatar ?? AVATARS[0].id };
          });
          setVotes(v);
          setLoadingVotes(false);
        }, () => setLoadingVotes(false));
        return () => unsub();
      }, []);

      // Compute global leaderboard from votes + gameCache (needed in both Stakes + Friends)
      const globalLeaderboard = React.useMemo(() => {
        const getW = g => g.status === "Final" && g.home.score != null && g.visitor.score != null
          ? (g.home.score > g.visitor.score ? g.home.abbreviation : g.visitor.abbreviation) : null;
        const stats = {};
        Object.entries(gameCache).forEach(([date, games]) => {
          (games ?? []).forEach(game => {
            const winner = getW(game);
            if (!winner) return;
            const key = `${date}_${game.id}`;
            Object.entries(votes[key] ?? {}).forEach(([uid, vote]) => {
              if (!stats[uid]) stats[uid] = { username: vote.username, avatar: vote.avatar, correct: 0, total: 0, uid };
              stats[uid].total++;
              if (vote.teamAbbr === winner) stats[uid].correct++;
            });
          });
        });
        return Object.entries(stats)
          .map(([uid, s]) => ({ uid, ...s, pct: s.total > 0 ? Math.round(s.correct / s.total * 100) : 0 }));
      }, [votes, gameCache]);

      const gameCacheRef = useRef({});
      useEffect(() => { gameCacheRef.current = gameCache; }, [gameCache]);
      const inFlight = useRef(new Set());

      useEffect(() => { localStorage.setItem("nba-fav-teams",   JSON.stringify(favTeams));   }, [favTeams]);
      useEffect(() => { localStorage.setItem("nba-fav-players", JSON.stringify(favPlayers)); }, [favPlayers]);
      useEffect(() => { localStorage.setItem("nba-spoiler-mode", String(spoilerMode)); }, [spoilerMode]);
      // Sync favorites to Firestore whenever they change (if logged in)
      useEffect(() => {
        if (!currentUser || !fbDb) return;
        const t = setTimeout(() => {
          fbDb.collection("users").doc(currentUser.uid)
            .update({ favTeams, favPlayers })
            .catch(() => {});
        }, 800);
        return () => clearTimeout(t);
      }, [favTeams, favPlayers, currentUser]);
      // Temporary placeholder: compute from the standard 7-day DATES window only.
      // Explicitly scoped to DATES so that extra dates loaded by other views
      // (e.g. DontMiss) never pollute the placeholder with non-season data.
      // Once apiStandings is populated this effect becomes a no-op.
      useEffect(() => {
        if (Object.keys(apiStandings).length === 0) {
          const slice = Object.fromEntries(
            DATES.map(d => [d, gameCache[d]]).filter(([, v]) => v !== undefined)
          );
          setStandings(computeStandingsFromGames(slice));
        }
      }, [gameCache, apiStandings]);

      // Fetch full-season standings. Retries up to 3 times with 3-second back-off
      // in case the API is temporarily rate-limited at startup.
      useEffect(() => {
        let cancelled = false, attempts = 0;
        const load = () => fetchStandings().then(fs => {
          if (cancelled) return;
          if (Object.keys(fs).length > 0) {
            setApiStandings(fs);
            setStandings(fs);
          } else if (++attempts < 4) {
            setTimeout(load, 3000); // wait 3 s then retry
          }
        });
        load();
        return () => { cancelled = true; };
      }, []);

      const loadDate = useCallback(async date => {
        if (gameCacheRef.current[date] !== undefined || inFlight.current.has(date)) return null;
        inFlight.current.add(date);
        try {
          const res = await loadGames(date);
          setGameCache(prev => ({ ...prev, [date]: res.games ?? [] }));
          inFlight.current.delete(date);
          return res;
        } catch (e) {
          console.error("loadDate failed:", date, e);
          inFlight.current.delete(date);
          return { games: null, errCode: "network" };
        }
      }, []);

      const isHome     = view === "home";
      const isFavs     = view === "favorites";
      const isDontMiss = view === "dontmiss";
      const isStakes   = view === "stakes";
      const isFriends  = view === "friends";
      const isTeam     = view?.type === "team";
      const isPlayer   = view?.type === "player";

      return (
        <div style={{ minHeight:"100vh", background:"rgba(238,244,255,0.08)" }}>
          {/* Header */}
          <div style={{ position:"sticky", top:0, zIndex:50,
            background:"rgba(8,12,28,0.90)", backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)",
            borderBottom:"1px solid rgba(245,158,11,0.22)",
            boxShadow:"0 2px 24px rgba(0,0,0,0.45)" }}>
            {/* Row 1: Logo + action buttons */}
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"10px 16px 8px":"12px 24px 10px",
              display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <h1 style={{ fontSize:isMobile?17:22, fontWeight:900, color:"white", display:"flex", alignItems:"center", gap:8,
                textShadow:"0 1px 8px rgba(245,158,11,0.4)" }}>
                🏀<span style={{ letterSpacing:"-0.02em" }}>{isMobile?" NBA":"  NBA CatchUp"}</span>
              </h1>
              <div style={{ display:"flex", gap:isMobile?6:8, alignItems:"center" }}>
                {/* Account button */}
                <button onClick={() => setAccountOpen(true)} style={{ display:"flex", alignItems:"center",
                  gap:5, padding:isMobile?"6px 10px":"7px 14px", borderRadius:20,
                  background: currentUser ? AVATARS.find(a=>a.id===currentUser.avatar)?.bg ?? "#1e3a8a"
                                          : "rgba(255,255,255,0.12)",
                  color: "white",
                  border: currentUser ? "none" : "1px solid rgba(255,255,255,0.2)",
                  fontSize:isMobile?11:12, fontWeight:700, flexShrink:0,
                  boxShadow: currentUser ? "0 2px 10px rgba(0,0,0,0.3)" : "none",
                  transition:"all 0.2s" }}>
                  <span style={{ fontSize:isMobile?14:15 }}>
                    {currentUser ? (AVATARS.find(a=>a.id===currentUser.avatar)?.emoji ?? "👤") : "👤"}
                  </span>
                  <span>{currentUser ? currentUser.username : "Sign In"}</span>
                </button>
                {/* Spoiler button */}
                <button onClick={() => setSpoilerMode(m => !m)} style={{ display:"flex", alignItems:"center",
                  gap:5, padding:isMobile?"6px 10px":"7px 14px", borderRadius:20,
                  background:spoilerMode?"rgba(245,158,11,0.85)":"rgba(255,255,255,0.12)",
                  color:"white",
                  border:"1px solid " + (spoilerMode?"rgba(245,158,11,0.5)":"rgba(255,255,255,0.18)"),
                  fontSize:isMobile?11:12, fontWeight:700, flexShrink:0,
                  boxShadow:spoilerMode?"0 2px 14px rgba(245,158,11,0.4)":"none",
                  transition:"all 0.2s" }}>
                  <span style={{ fontSize:isMobile?14:15 }}>{spoilerMode?"🙈":"👁️"}</span>
                  <span>{spoilerMode?"Hidden":"Visible"}</span>
                </button>
              </div>
            </div>
            {/* Row 2: Nav tabs */}
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"0 12px 10px":"0 24px 10px",
              display:"flex", gap:isMobile?6:8, overflowX:"auto", WebkitOverflowScrolling:"touch" }}
              className="mobile-scroll">
              {[
                { id:"home",      label:"🏀 Games" },
                { id:"favorites", label:`⭐ Favourites${favTeams.length+favPlayers.length > 0 ? ` (${favTeams.length+favPlayers.length})` : ""}` },
                { id:"dontmiss",  label:"📰 League News" },
                { id:"stakes",    label:"🎲 Stakes" },
                { id:"friends",   label:`👥 Friends${currentUser && (currentUser.friends??[]).length > 0 ? ` (${(currentUser.friends??[]).length})` : ""}` },
              ].map(tab => {
                const active = tab.id==="home" ? isHome : tab.id==="dontmiss" ? isDontMiss : tab.id==="stakes" ? isStakes : tab.id==="friends" ? isFriends : isFavs||isTeam||isPlayer;
                return (
                  <button key={tab.id} onClick={() => setView(tab.id)} style={{ padding:isMobile?"7px 13px":"7px 18px",
                    borderRadius:20, fontSize:isMobile?12:13, fontWeight:700, flexShrink:0,
                    background: active ? "linear-gradient(135deg,#f59e0b,#d97706)" : "rgba(255,255,255,0.10)",
                    color: active ? "white" : "rgba(255,255,255,0.72)",
                    border: active ? "none" : "1px solid rgba(255,255,255,0.14)",
                    boxShadow: active ? "0 2px 10px rgba(245,158,11,0.45)" : "none",
                    transition:"all 0.15s", whiteSpace:"nowrap" }}>
                    {tab.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Body: main content + sticky sidebar (desktop) / stacked (mobile) */}
          <div style={{ display:"flex", alignItems:"flex-start" }}>

            {/* ── Main content ── */}
            <div style={{ flex:1, minWidth:0 }}>
              {isHome && <HomeView gameCache={gameCache} loadDate={loadDate} spoilerMode={spoilerMode} standings={standings} />}
              {isFavs  && <FavoritesView favTeams={favTeams} setFavTeams={setFavTeams}
                favPlayers={favPlayers} setFavPlayers={setFavPlayers}
                onSelectTeam={t => setView({type:"team",team:t})}
                onSelectPlayer={p => setView({type:"player",player:p})} />}
              {isDontMiss && <DontMissView gameCache={gameCache} loadDate={loadDate}
                standings={standings} spoilerMode={spoilerMode} />}
              {isStakes && <StakesView gameCache={gameCache} loadDate={loadDate}
                currentUser={currentUser} standings={standings}
                votes={votes} loadingVotes={loadingVotes} leaderboard={globalLeaderboard} />}
              {isFriends && <FriendsView currentUser={currentUser} setCurrentUser={setCurrentUser}
                leaderboard={globalLeaderboard} />}
              {isTeam  && <TeamView team={view.team} gameCache={gameCache} loadDate={loadDate}
                onBack={() => setView("favorites")} spoilerMode={spoilerMode} standings={standings} />}
              {isPlayer && <PlayerView player={view.player} onBack={() => setView("favorites")} />}
              {/* Mobile: standings at bottom of every page */}
              {isMobile && <StandingsPanel standings={standings} spoilerMode={spoilerMode} />}
            </div>

            {/* ── Desktop sticky sidebar ── */}
            {!isMobile && (
              <div style={{ width:210, flexShrink:0, position:"sticky", top:58,
                maxHeight:"calc(100vh - 58px)", overflowY:"auto",
                padding:"16px 12px 16px 0" }}>
                <StandingsPanel standings={standings} spoilerMode={spoilerMode} />
              </div>
            )}
          </div>
          {accountOpen && (
            <AccountModal
              onClose={() => setAccountOpen(false)}
              currentUser={currentUser}
              setCurrentUser={setCurrentUser}
              favTeams={favTeams}
              favPlayers={favPlayers}
              setFavTeams={setFavTeams}
              setFavPlayers={setFavPlayers}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary><NBAGames /></ErrorBoundary>
    );
  </script>
</body>
</html>
