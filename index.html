    // ── Home View ────────────────────────────────────────────────────────────────
    function HomeView({ gameCache, loadDate, spoilerMode, standings }) {
      const isMobile = useWindowWidth() < 600;
      const [selected, setSelected] = useState(DATES[1]);
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState(null);

      useEffect(() => {
        let cancelled = false;
        async function go() {
          if (gameCache[selected] !== undefined) return;
          setLoading(true); setError(null);
          const res = await loadDate(selected);
          if (cancelled) return;
          if (res?.errCode) setError(res.errCode === 401 ? "auth" : "network");
          setLoading(false);
        }
        go();
        return () => { cancelled = true; };
      }, [selected]);

      const games = gameCache[selected];
      return (
        <>
          <div style={{ background:"white", borderBottom:"1px solid #dbeafe" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"8px 16px 10px":"10px 24px 12px" }}>
              <div style={{ display:"flex", gap:isMobile?6:8, overflowX:"auto", paddingBottom:2 }} className="mobile-scroll">
                {DATES.map(d => {
                  const active = d === selected;
                  return (
                    <button key={d} onClick={() => setSelected(d)} style={{ flexShrink:0, minWidth:isMobile?60:72,
                      padding:isMobile?"6px 10px":"8px 14px", borderRadius:12, background:active?"#3b82f6":"#f0f6ff",
                      color:active?"white":"#60a5fa", boxShadow:active?"0 2px 10px rgba(59,130,246,0.35)":"none",
                      transition:"all 0.15s", outline:"none" }}>
                      <div style={{ fontSize:isMobile?11:12, fontWeight:800 }}>{dayLabel(d)}</div>
                      <div style={{ fontSize:9, opacity:0.75, marginTop:1 }}>{fmtDate(d)}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
          {/* Top Performers — only when data is ready and games exist */}
          {!loading && !error && games && games.length > 0 && (
            <div style={{ paddingTop:isMobile?12:20 }}>
              <TopPerformers games={games} spoilerMode={spoilerMode} />
            </div>
          )}

          {/* Games grid */}
          <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"16px 12px 20px":"20px 24px 24px",
            display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))", gap:isMobile?12:16, alignItems:"start" }}>
            {loading || !games ? <Spinner full />
            : error ? (
              <div style={{ gridColumn:"1/-1", background:"white", borderRadius:20,
                border:"1px solid #dbeafe", padding:"60px 24px", textAlign:"center" }}>
                <p style={{ fontSize:44, marginBottom:12 }}>⚠️</p>
                <p style={{ fontWeight:700, color:"#1e3a8a", marginBottom:6 }}>
                  {error==="auth"?"API key not authorised":"Couldn't reach the API"}
                </p>
                <p style={{ fontSize:13, color:"#93c5fd" }}>Check your plan at app.balldontlie.io</p>
              </div>
            ) : games.length === 0 ? (
              <div style={{ gridColumn:"1/-1", background:"white", borderRadius:20,
                border:"1px solid #dbeafe", padding:"70px 24px", textAlign:"center" }}>
                <p style={{ fontSize:48, marginBottom:12 }}>😴</p>
                <p style={{ fontWeight:700, color:"#1e3a8a" }}>No games on {fmtDate(selected)}</p>
              </div>
            ) : games.map((g, i) => <GameCard key={g.id} game={g} delay={i} spoilerMode={spoilerMode} date={selected} standings={standings} />)}
          </div>
        </>
      );
    }

    // ── Favourites View ──────────────────────────────────────────────────────────
    function FavoritesView({ favTeams, setFavTeams, favPlayers, setFavPlayers, onSelectTeam, onSelectPlayer }) {
      const isMobile = useWindowWidth() < 600;
      const [tab,           setTab]          = useState(favPlayers.length > 0 ? "players" : "teams");
      const [teamSearch,    setTeamSearch]    = useState("");
      const [playerQuery,   setPlayerQuery]   = useState("");
      const [playerResults, setPlayerResults] = useState([]);
      const [searching,     setSearching]     = useState(false);
      const searchTimer = useRef(null);

      // Debounced player search
      useEffect(() => {
        clearTimeout(searchTimer.current);
        if (!playerQuery.trim()) { setPlayerResults([]); return; }
        searchTimer.current = setTimeout(async () => {
          setSearching(true);
          const res = await apiFetch(`/players?search=${encodeURIComponent(playerQuery)}&per_page=15`);
          setSearching(false);
          if (!res._err) setPlayerResults(res.data ?? []);
        }, 400);
      }, [playerQuery]);

      const isFavTeam   = abbr => favTeams.some(f => f.abbreviation === abbr);
      const isFavPlayer = id   => favPlayers.some(f => f.id === id);
      const toggleTeam  = t => setFavTeams(p => isFavTeam(t.abbreviation) ? p.filter(f=>f.abbreviation!==t.abbreviation) : [...p,t]);
      const togglePlayer = p => setFavPlayers(prev => isFavPlayer(p.id) ? prev.filter(f=>f.id!==p.id) : [...prev, p]);

      const filteredTeams = ALL_TEAMS.filter(t =>

          fontSize:isMobile?11:12, fontWeight:700, boxShadow:tab===id?"0 2px 8px rgba(59,130,246,0.3)":"none",
          transition:"all 0.15s" }}>

              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr 1fr":"repeat(auto-fill, minmax(100px, 1fr))", gap:isMobile?8:12 }}>

                    onMouseLeave={e => { if(!isMobile) { e.currentTarget.style.background="white"; e.currentTarget.style.transform="translateY(0)"; } }}>
                    <PlayerPhoto player={p} size={isMobile?40:52} fetchDelay={1000} />
                    <div style={{ textAlign:"center" }}>
                      <p style={{ fontSize:isMobile?11:12, fontWeight:800, color:"#1e3a8a" }}>{p.first_name} {p.last_name}</p>
                      <p style={{ fontSize:isMobile?9:10, color:"#60a5fa", fontWeight:600 }}>
                        {p.team?.abbreviation}{!isMobile && p.position ? ` · ${p.position}` : ""}

              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr 1fr":"repeat(auto-fill, minmax(100px, 1fr))", gap:isMobile?8:12 }}>
                {favTeams.map(t => (
                  <div key={t.abbreviation} onClick={() => onSelectTeam(t)}
                    style={{ cursor:"pointer", background:"white", borderRadius:isMobile?12:18, padding:isMobile?"12px":"16px 20px",
                      border:"1px solid #dbeafe", boxShadow:"0 2px 12px rgba(59,130,246,0.08)",
                      display:"flex", flexDirection:"column", alignItems:"center", gap:isMobile?6:8,

                    onMouseEnter={e => { if(!isMobile){ e.currentTarget.style.background="#eff6ff"; e.currentTarget.style.transform="translateY(-2px)"; } }}

                      <p style={{ fontSize:isMobile?10:12, fontWeight:700, color:"#1e3a8a" }}>{t.name}</p>

                        <p style={{ fontSize:11, color:"#60a5fa" }}>

                  </div>

          )}
        </div>
      );
    }

    // Thin wrapper so TeamView can render a highlights button per game row
    function TeamGameHighlightsBtn({ game }) {

        <div style={{ padding:"8px 24px 16px" }}>
          <HighlightsButton game={game} date={game.date}
            style={{ width:"auto", padding:"9px 20px" }} />

      );

    // ── Team View ────────────────────────────────────────────────────────────────
    function TeamView({ team, gameCache, loadDate, onBack, spoilerMode, standings }) {
      const isMobile = useWindowWidth() < 600;
      const [loadingAll, setLoadingAll] = useState(true);

      useEffect(() => {
        let active = true;
        // Load both past (DATES) and future (FUTURE_DATES) dates
        Promise.all([...DATES, ...FUTURE_DATES].map(d => loadDate(d))).then(() => { if (active) setLoadingAll(false); });
        return () => { active = false; };
      }, [team.abbreviation]);

      const teamGames = DATES
        .flatMap(d => (gameCache[d] ?? [])
          .filter(g => g.home.abbreviation === team.abbreviation || g.visitor.abbreviation === team.abbreviation)
          .map(g => ({ ...g, date: d }))
        )
        .sort((a, b) => b.date.localeCompare(a.date));

      // Upcoming: future dates sorted ascending (soonest first)
      const upcomingGames = FUTURE_DATES
        .flatMap(d => (gameCache[d] ?? [])
          .filter(g => g.home.abbreviation === team.abbreviation || g.visitor.abbreviation === team.abbreviation)
          .map(g => ({ ...g, date: d }))
        )
        .sort((a, b) => a.date.localeCompare(b.date));

      // Weekly record from last 7 days of games
      const finishedGames = teamGames.filter(g => g.status === "Final");
      const weeklyW = finishedGames.filter(g => {
        const isHome = g.home.abbreviation === team.abbreviation;
        const our = isHome ? (g.home.score??0) : (g.visitor.score??0);
        const opp = isHome ? (g.visitor.score??0) : (g.home.score??0);
        return our > opp;
      }).length;
      const weeklyL = finishedGames.length - weeklyW;

      // Season record from standings
      const seasonRec = standings?.[team.abbreviation];

      return (
        <div>
          <div style={{ background:"white", borderBottom:"1px solid #dbeafe" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 16px":"16px 24px",
              display:"flex", alignItems:"center", gap:isMobile?8:16, flexWrap:"wrap" }}>
              <button onClick={onBack} style={{ background:"#f0f6ff", border:"1px solid #dbeafe",
                borderRadius:10, padding:isMobile?"6px 10px":"8px 14px", color:"#3b82f6", fontWeight:700, fontSize:isMobile?12:13 }}>← Back</button>
              <TeamLogo abbr={team.abbreviation} size={isMobile?32:44} />
              <div>
                <p style={{ fontSize:isMobile?10:11, color:"#93c5fd", fontWeight:600 }}>{team.city}</p>
                <h2 style={{ fontSize:isMobile?16:20, fontWeight:900, color:"#1e3a8a" }}>{team.name}</h2>
              </div>
              {/* Records */}
              <div style={{ display:"flex", gap:isMobile?6:10, marginLeft:"auto", flexWrap:"wrap" }}>
                {seasonRec && (
                  <div style={{ background:"#eff6ff", borderRadius:isMobile?8:12, padding:isMobile?"6px 10px":"8px 16px", textAlign:"center",
                    border:"1px solid #dbeafe" }}>
                    <div style={{ fontSize:isMobile?14:18, fontWeight:900, color:"#1d4ed8", lineHeight:1 }}>
                      {seasonRec.wins}–{seasonRec.losses}
                    </div>
                    <div style={{ fontSize:isMobile?8:9, fontWeight:700, color:"#60a5fa", letterSpacing:"0.07em", marginTop:1 }}>SEASON</div>
                  </div>
                )}
                {finishedGames.length > 0 && (
                  <div style={{ background: weeklyW > weeklyL ? "#f0fdf4" : weeklyW < weeklyL ? "#fff1f2" : "#f8fbff",
                    borderRadius:isMobile?8:12, padding:isMobile?"6px 10px":"8px 16px", textAlign:"center",
                    border: `1px solid ${weeklyW > weeklyL ? "#bbf7d0" : weeklyW < weeklyL ? "#fecaca" : "#dbeafe"}` }}>
                    <div style={{ fontSize:isMobile?14:18, fontWeight:900, lineHeight:1,
                      color: weeklyW > weeklyL ? "#15803d" : weeklyW < weeklyL ? "#dc2626" : "#1e3a8a" }}>
                      {weeklyW}–{weeklyL}
                    </div>
                    <div style={{ fontSize:isMobile?8:9, fontWeight:700, color:"#60a5fa", letterSpacing:"0.07em", marginTop:1 }}>LAST 7</div>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 12px 0":"20px 24px 0" }}>

            {/* ── Upcoming games mini-schedule ── */}
            {upcomingGames.length > 0 && (
              <div style={{ background:"white", borderRadius:isMobile?12:18, border:"1px solid #c7d2fe",
                boxShadow:"0 2px 12px rgba(99,102,241,0.08)", marginBottom:isMobile?12:20, overflow:"hidden" }}>
                <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)", padding:isMobile?"10px 14px":"12px 20px",
                  display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:isMobile?13:15 }}>📅</span>
                  <span style={{ fontSize:isMobile?12:13, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>
                    Upcoming Schedule
                  </span>
                  <span style={{ fontSize:isMobile?10:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginLeft:4 }}>
                    Next {upcomingGames.length} game{upcomingGames.length !== 1 ? "s" : ""}
                  </span>
                </div>
                <div style={{ display:"flex", flexDirection:"column" }}>
                  {upcomingGames.map((game, idx) => {
                    const isHome = game.home.abbreviation === team.abbreviation;
                    const opp = isHome ? game.visitor : game.home;
                    const gt = fmtGameTime(game.status);
                    const oppRec = standings?.[opp.abbreviation];
                    return (
                      <div key={game.id} style={{ display:"flex", alignItems:"center",
                        padding:isMobile?"10px 14px":"12px 20px", gap:isMobile?10:16,
                        borderBottom: idx < upcomingGames.length - 1 ? "1px solid #eef2ff" : "none",
                        background: idx % 2 === 0 ? "white" : "#fafbff" }}>
                        {/* Date */}
                        <div style={{ minWidth:isMobile?38:48, flexShrink:0, textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"#a5b4fc",
                            letterSpacing:"0.07em", textTransform:"uppercase", lineHeight:1 }}>
                            {new Date(game.date + "T12:00:00").toLocaleDateString("en-US",{weekday:"short"})}
                          </div>
                          <div style={{ fontSize:isMobile?13:15, fontWeight:900, color:"#1e3a8a", lineHeight:1.2 }}>
                            {new Date(game.date + "T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"})}
                          </div>
                        </div>
                        {/* Home/Away pill */}
                        <span style={{ fontSize:isMobile?8:9, fontWeight:800, letterSpacing:"0.07em",
                          padding:"2px 7px", borderRadius:20, flexShrink:0,
                          background: isHome ? "#dbeafe" : "#f0f9ff",
                          color: isHome ? "#1d4ed8" : "#0369a1" }}>
                          {isHome ? "HOME" : "AWAY"}
                        </span>
                        {/* Opponent */}
                        <div style={{ display:"flex", alignItems:"center", gap:isMobile?6:10, flex:1, minWidth:0 }}>
                          <TeamLogo abbr={opp.abbreviation} size={isMobile?28:34} />
                          <div>
                            <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"#1e3a8a" }}>
                              {isMobile ? opp.abbreviation : `${opp.city} ${opp.name}`}
                            </div>
                            {oppRec && (
                              <div style={{ fontSize:isMobile?9:10, color:"#60a5fa", fontWeight:600 }}>
                                {oppRec.wins}–{oppRec.losses}
                              </div>
                            )}
                          </div>
                        </div>
                        {/* Time */}
                        <div style={{ flexShrink:0, textAlign:"right" }}>
                          {gt ? (
                            <>
                              <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"#1e3a8a" }}>
                                {gt.time} <span style={{ fontSize:isMobile?9:10, fontWeight:600 }}>{gt.ampm}</span>
                              </div>
                              <div style={{ fontSize:isMobile?8:9, color:"#a5b4fc", fontWeight:600 }}>{gt.tz}</div>
                            </>
                          ) : (
                            <span style={{ fontSize:isMobile?10:11, color:"#c7d2fe", fontWeight:700 }}>TBD</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── Past games grid ── */}
            {loadingAll && !teamGames.length ? <Spinner full />
            : !teamGames.length ? (
              <div style={{ textAlign:"center", padding:"80px 24px" }}>
                <p style={{ fontSize:48, marginBottom:12 }}>📅</p>
                <p style={{ fontWeight:700, color:"#1e3a8a" }}>No games in the last 7 days</p>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))", gap:isMobile?12:16, alignItems:"start",
                paddingBottom:isMobile?16:24 }}>
                {teamGames.map((game, idx) => (
                  <GameCard key={game.id} game={game} delay={idx} spoilerMode={spoilerMode}
                    date={game.date} standings={standings} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── ErrorBoundary — prevents a single component error from blanking the page ──
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      componentDidCatch(e, info) { console.error("NBA CatchUp error:", e, info); }
      render() {
        if (!this.state.err) return this.props.children;
        return (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            minHeight:"100vh", background:"#eef4ff", padding:32, textAlign:"center" }}>
            <p style={{ fontSize:48, marginBottom:16 }}>⚠️</p>
            <h2 style={{ fontSize:20, fontWeight:900, color:"#1e3a8a", marginBottom:8 }}>Something went wrong</h2>
            <p style={{ fontSize:13, color:"#60a5fa", marginBottom:24, maxWidth:400 }}>
              {this.state.err?.message ?? "Unexpected error"}
            </p>
            <button onClick={() => { this.setState({ err: null }); }}
              style={{ padding:"10px 28px", borderRadius:12, background:"#3b82f6",
                color:"white", fontSize:13, fontWeight:700 }}>
              Try Again
            </button>
          </div>
        );
      }
    }

    // ── Root ─────────────────────────────────────────────────────────────────────
    function NBAGames() {
      const isMobile = useWindowWidth() < 600;
      const [view,        setView]        = useState("home");
      const [spoilerMode, setSpoilerMode] = useState(() => { try { return localStorage.getItem("nba-spoiler-mode") === "true"; } catch { return false; } });
      const [gameCache,   setGameCache]   = useState({});
      const [apiStandings,  setApiStandings]  = useState({});
      const [standings,     setStandings]     = useState({});
      const [favTeams,    setFavTeams]    = useState(() => { try { return JSON.parse(localStorage.getItem("nba-fav-teams")??"[]"); } catch { return []; } });
      const [favPlayers,  setFavPlayers]  = useState(() => { try { return JSON.parse(localStorage.getItem("nba-fav-players")??"[]"); } catch { return []; } });

      const gameCacheRef = useRef({});
      useEffect(() => { gameCacheRef.current = gameCache; }, [gameCache]);
      const inFlight = useRef(new Set());

      useEffect(() => { localStorage.setItem("nba-fav-teams",   JSON.stringify(favTeams));   }, [favTeams]);
      useEffect(() => { localStorage.setItem("nba-fav-players", JSON.stringify(favPlayers)); }, [favPlayers]);
      useEffect(() => { localStorage.setItem("nba-spoiler-mode", String(spoilerMode)); }, [spoilerMode]);
      // Show 7-day computed records immediately as a placeholder, then replace
      // with full-season standings once the async fetch completes.
      useEffect(() => {
        setStandings(computeStandingsFromGames(gameCache));
      }, [gameCache]);
      useEffect(() => {
        fetchStandings().then(fullSeason => {
          if (Object.keys(fullSeason).length > 0) {
            setApiStandings(fullSeason);
            setStandings(fullSeason);   // replace placeholder with accurate full-season data
          }
        });
      }, []);

      const loadDate = useCallback(async date => {
        if (gameCacheRef.current[date] !== undefined || inFlight.current.has(date)) return null;
        inFlight.current.add(date);
        try {
          const res = await loadGames(date);
          setGameCache(prev => ({ ...prev, [date]: res.games ?? [] }));
          inFlight.current.delete(date);
          return res;
        } catch (e) {
          console.error("loadDate failed:", date, e);
          inFlight.current.delete(date);
          return { games: null, errCode: "network" };
        }
      }, []);

      const isHome  = view === "home";
      const isFavs  = view === "favorites";
      const isTeam  = view?.type === "team";
      const isPlayer = view?.type === "player";

      return (
        <div style={{ minHeight:"100vh", background:"#eef4ff" }}>
          {/* Header */}
          <div style={{ position:"sticky", top:0, zIndex:50, background:"white",
            borderBottom:"1px solid #dbeafe", boxShadow:"0 1px 16px rgba(59,130,246,0.06)" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"10px 16px":"14px 24px",
              display:"flex", alignItems:"center", gap:isMobile?6:10, flexWrap:isMobile?"wrap":"nowrap" }}>
              <h1 style={{ fontSize:isMobile?16:20, fontWeight:900, color:"#1e3a8a", display:"flex", alignItems:"center", gap:isMobile?6:8, marginRight:isMobile?0:6, flexShrink:0 }}>
                🏀 <span>{isMobile?"":" NBA CatchUp"}</span>
              </h1>
              <div style={{ display:"flex", gap:6, order:isMobile?3:-1, width:isMobile?"100%":"auto" }}>
                {[
                  { id:"home",      label:isMobile?"🏀":"🏀 Games" },
                  { id:"favorites", label:isMobile?`⭐`:`⭐ Favourites${favTeams.length+favPlayers.length > 0 ? ` (${favTeams.length+favPlayers.length})` : ""}` },
                ].map(tab => {
                  const active = tab.id==="home" ? isHome : isFavs||isTeam||isPlayer;
                  return (
                    <button key={tab.id} onClick={() => setView(tab.id)} style={{ padding:isMobile?"6px 10px":"7px 16px",
                      borderRadius:20, fontSize:isMobile?11:12, fontWeight:700,
                      background:active?"#3b82f6":"#f0f6ff", color:active?"white":"#60a5fa",
                      boxShadow:active?"0 2px 8px rgba(59,130,246,0.3)":"none", transition:"all 0.15s" }}>
                      {tab.label}
                    </button>
                  );
                })}
              </div>
              {isMobile && <div style={{ flex:1 }} />}
              {!isMobile && <div style={{ flex:1 }} />}
              <button onClick={() => setSpoilerMode(m => !m)} style={{ display:"flex", alignItems:"center",
                gap:isMobile?4:7, padding:isMobile?"6px 12px":"8px 18px", borderRadius:20,
                background:spoilerMode?"#1e3a8a":"#f0f6ff", color:spoilerMode?"white":"#3b82f6",
                fontSize:isMobile?10:12, fontWeight:700, flexShrink:0,
                boxShadow:spoilerMode?"0 2px 14px rgba(30,58,138,.4), 0 0 0 3px rgba(59,130,246,.15)":"none",
                transition:"all 0.2s", animation:spoilerMode?"pulseGlow 2s infinite":"none" }}>
                <span style={{ fontSize:isMobile?14:15 }}>{spoilerMode?"🙈":"👁️"}</span>
                {isMobile?spoilerMode?"Hidden":"Visible":spoilerMode?"Spoilers Hidden":"No Spoilers"}
              </button>
            </div>
          </div>

          {/* Body: main content + sticky sidebar (desktop) / stacked (mobile) */}
          <div style={{ display:"flex", alignItems:"flex-start" }}>

            {/* ── Main content ── */}
            <div style={{ flex:1, minWidth:0 }}>
              {isHome && <HomeView gameCache={gameCache} loadDate={loadDate} spoilerMode={spoilerMode} standings={standings} />}
              {isFavs  && <FavoritesView favTeams={favTeams} setFavTeams={setFavTeams}
                favPlayers={favPlayers} setFavPlayers={setFavPlayers}
                onSelectTeam={t => setView({type:"team",team:t})}
                onSelectPlayer={p => setView({type:"player",player:p})} />}
              {isTeam  && <TeamView team={view.team} gameCache={gameCache} loadDate={loadDate}
                onBack={() => setView("favorites")} spoilerMode={spoilerMode} standings={standings} />}
              {isPlayer && <PlayerView player={view.player} onBack={() => setView("favorites")} />}
              {/* Mobile: standings at bottom of every page */}
              {isMobile && <StandingsPanel standings={standings} />}
            </div>

            {/* ── Desktop sticky sidebar ── */}
            {!isMobile && (
              <div style={{ width:210, flexShrink:0, position:"sticky", top:58,
                maxHeight:"calc(100vh - 58px)", overflowY:"auto",
                padding:"16px 12px 16px 0" }}>
                <StandingsPanel standings={standings} />
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary><NBAGames /></ErrorBoundary>
    );
  </script>
</body>
</html>
