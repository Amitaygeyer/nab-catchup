                    <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.5)", letterSpacing:"0.08em", marginBottom:10 }}>PICK YOUR AVATAR</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:8 }}>
                      {AVATARS.map(a => (
                        <button key={a.id} onClick={() => setSelAvatar(a.id)} style={{ aspect:"1/1", borderRadius:12,
                          background: selAvatar===a.id ? a.bg : "rgba(255,255,255,0.1)",
                          border: selAvatar===a.id ? `2px solid ${a.bg}` : "2px solid rgba(255,255,255,0.1)",
                          fontSize:20, display:"flex", alignItems:"center", justifyContent:"center",
                          boxShadow: selAvatar===a.id ? `0 4px 12px ${a.bg}55` : "none",
                          transform: selAvatar===a.id ? "scale(1.1)" : "scale(1)",
                          transition:"all 0.15s", cursor:"pointer" }}>
                          {a.emoji}
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  <div>
                    <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.5)", letterSpacing:"0.08em", marginBottom:6 }}>USERNAME</div>
                    <input value={username} onChange={e => setUsername(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && (tab==="login" ? handleLogin() : handleSignUp())}
                      placeholder="Enter username…" style={{ width:"100%", padding:"11px 14px", borderRadius:12,

    function StandingsPanel({ standings, spoilerMode }) {
      const isMobile = useWindowWidth() < 600;
      if (spoilerMode) return null;
      const hasData = Object.keys(standings).length > 0;

      // Sort a list of abbreviations by win-pct desc, then wins desc
      const ranked = abbrs => abbrs
        .map(abbr => {
          const r = standings[abbr] ?? { wins: 0, losses: 0 };
          const gp = r.wins + r.losses;
          return { abbr, wins: r.wins, losses: r.losses, pct: gp > 0 ? r.wins / gp : 0, gp };
        })
        .sort((a, b) => b.pct !== a.pct ? b.pct - a.pct : b.wins - a.wins);

      const east = ranked(EAST_ABBRS);
      const west = ranked(WEST_ABBRS);

      const Row = ({ t, i, compact }) => (
        <div style={{ display:"flex", alignItems:"center", gap:compact?3:5,
          padding:compact?"3px 6px":"5px 8px",
          background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.04)",
          borderRadius:4 }}>
          <span style={{ width:compact?12:16, fontSize:compact?8:9, fontWeight:700, textAlign:"right", flexShrink:0,
            color: i < 6 ? "#60a5fa" : "rgba(255,255,255,0.35)" }}>
            {i + 1}
          </span>
          <TeamLogo abbr={t.abbr} size={compact?14:16} />
          <span style={{ flex:1, fontSize:compact?9:10, fontWeight:700, color:"white",
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {t.abbr}
          </span>
          <span style={{ fontSize:compact?8:9, fontWeight:700, color:"rgba(255,255,255,0.6)", whiteSpace:"nowrap" }}>
            {t.wins}–{t.losses}
          </span>
        </div>
      );

      const Conf = ({ teams, title, compact }) => (
        <div>
          <div style={{ fontSize:compact?8:8, fontWeight:800, color:"#fbbf24", letterSpacing:"0.1em",
            textTransform:"uppercase", padding:compact?"3px 6px 2px":"4px 8px 3px" }}>
            {title}
          </div>
          {(hasData ? teams.filter(t => t.gp > 0) : teams).map((t, i) => (
            <Row key={t.abbr} t={t} i={i} compact={compact} />
          ))}
          {!hasData && <div style={{ padding:"8px", textAlign:"center" }}><Spinner /></div>}
        </div>
      );

      // ── Desktop: vertical card ───────────────────────────────────────────────
      if (!isMobile) return (
        <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:14, border:"1px solid rgba(245,158,11,0.22)",
          boxShadow:"0 3px 16px rgba(0,0,0,0.35)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)", padding:"9px 12px" }}>
            <span style={{ fontSize:11, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>🏆 Standings</span>
          </div>
          <div style={{ padding:"6px 2px 8px" }}>
            <Conf teams={east} title="Eastern" />
            <div style={{ height:1, background:"rgba(245,158,11,0.18)", margin:"6px 8px" }} />
            <Conf teams={west} title="Western" />
          </div>
        </div>
      );

      // ── Mobile: horizontal two-column card at bottom ─────────────────────────
      return (
        <div style={{ margin:"16px 12px 24px", background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:14,
          border:"1px solid rgba(245,158,11,0.22)", boxShadow:"0 3px 16px rgba(0,0,0,0.35)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)", padding:"9px 14px" }}>
            <span style={{ fontSize:12, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>🏆 Standings</span>
          </div>
          <div style={{ display:"flex" }}>
            <div style={{ flex:1, borderRight:"1px solid #dbeafe", padding:"4px 0 6px" }}>
              <Conf teams={east} title="Eastern" compact />
            </div>
            <div style={{ flex:1, padding:"4px 0 6px" }}>
              <Conf teams={west} title="Western" compact />
            </div>
          </div>
        </div>
      );
    }

    // ── Top Performers ───────────────────────────────────────────────────────────
    function TopPerformers({ games, spoilerMode }) {
      const isMobile = useWindowWidth() < 600;
      // Flatten all players from all finished games that have stats
      const allPlayers = games.flatMap(g => [
        ...(g.home.players    ?? []).map(p => ({ ...p, teamAbbr: g.home.abbreviation })),
        ...(g.visitor.players ?? []).map(p => ({ ...p, teamAbbr: g.visitor.abbreviation })),
      ]).filter(p => p.pts != null && p.player);

      if (spoilerMode) return null;
      if (allPlayers.length === 0) return null;

      const top5 = (key) =>
        [...allPlayers]
          .filter(p => (p[key] ?? 0) > 0)
          .sort((a, b) => (b[key] ?? 0) - (a[key] ?? 0))
          .slice(0, 5);

      const scorers    = top5("pts");
      const assisters  = top5("ast");
      const rebounders = top5("reb");

      // Top 5 by combined PTS+AST+REB, showing each stat individually
      const allRounders = [...allPlayers]
        .filter(p => (p.pts ?? 0) + (p.ast ?? 0) + (p.reb ?? 0) > 0)
        .sort((a, b) =>
          ((b.pts ?? 0) + (b.ast ?? 0) + (b.reb ?? 0)) -
          ((a.pts ?? 0) + (a.ast ?? 0) + (a.reb ?? 0))
        )
        .slice(0, 5);

      const medals = ["🥇", "🥈", "🥉", "4", "5"];
      const rankStyle = i => ({ fontSize: i === 0 ? (isMobile?12:14) : (isMobile?11:12), opacity: 1 - i * 0.12 });

      // Reusable avatar: player photo with tiny team logo badge
      const PlayerAvatar = ({ player, teamAbbr, photoSize = 32 }) => (
        <div style={{ position:"relative", flexShrink:0 }}>
          <PlayerPhoto player={player} size={photoSize} fetchDelay={300} />
          <div style={{ position:"absolute", bottom:-2, right:-2,
            width:14, height:14, borderRadius:"50%", overflow:"hidden",
            border:"1px solid rgba(8,12,28,0.7)", background:"rgba(8,12,28,0.7)" }}>
            <img src={logoUrl(teamAbbr)} alt={teamAbbr}
              style={{ width:"100%", height:"100%", objectFit:"contain" }} />
          </div>
        </div>
      );

      // Single-stat section (pts / ast / reb)
      const Section = ({ title, color, icon, players, statKey }) => (
        <div style={{ flex:isMobile?1:"auto", minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
            <span style={{ fontSize:isMobile?16:18 }}>{icon}</span>
            <span style={{ fontSize:isMobile?10:11, fontWeight:800, color, letterSpacing:"0.06em", textTransform:"uppercase" }}>{title}</span>
          </div>
          {players.map((p, i) => {
            const isFirst = i === 0;
            const name = isFirst
              ? `${p.player.first_name} ${p.player.last_name}`
              : `${p.player.first_name?.[0]}. ${p.player.last_name}`;
            return (
              <div key={p.player?.id ?? i} style={{ display:"flex", alignItems:"center", gap:8,
                padding: isFirst ? "8px 0 10px" : "5px 0",
                borderBottom: i < players.length-1 ? "1px solid #f0f6ff" : "none",
                ...rankStyle(i) }}>
                <span style={{ width:18, textAlign:"center", fontSize: i < 3 ? 13 : 11,
                  color: i < 3 ? "inherit" : "#94a3b8", fontWeight:700, flexShrink:0 }}>
                  {i < 3 ? medals[i] : `${i+1}.`}
                </span>
                {isFirst
                  ? <PlayerAvatar player={p.player} teamAbbr={p.teamAbbr} photoSize={44} />
                  : <div style={{ width:44, flexShrink:0 }} />}
                <span style={{ flex:1, fontSize: isFirst ? 13 : 12, fontWeight: isFirst ? 800 : 600,
                  color:"white", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {name}
                </span>
                {spoilerMode ? (
                  <span style={{ fontSize:11, color:"#bfdbfe" }}>—</span>
                ) : (
                  <span style={{ fontSize: isFirst ? 18 : 13, fontWeight:900, color,
                    minWidth:26, textAlign:"right", flexShrink:0 }}>
                    {p[statKey]}
                  </span>
                )}
              </div>

    // ── Upcoming Key Matchups ─────────────────────────────────────────────────────
    function UpcomingKeyMatchups({ gameCache, loadDate, standings }) {
      const isMobile = useWindowWidth() < 600;
      const KEY_DATES = FUTURE_DATES.slice(0, 3); // next 3 days
      const [ready, setReady] = useState(false);

      // Load the 3 future dates on mount; mark ready only once ALL are in cache
      useEffect(() => {
        KEY_DATES.forEach(d => {
          if (gameCache[d] === undefined) loadDate(d);
        });
      }, []);

      // Become ready once all 3 dates are loaded — prevents mid-load flicker
      useEffect(() => {
        if (!ready && KEY_DATES.every(d => gameCache[d] !== undefined)) {
          setReady(true);
        }
      }, [gameCache]);

      // Rank teams by win% from standings
      const ranked = React.useMemo(() => {
        const all = [...Object.entries(standings)].map(([abbr, r]) => {
          const gp = r.wins + r.losses;
          return { abbr, wins: r.wins, losses: r.losses, pct: gp > 0 ? r.wins / gp : 0 };
        }).sort((a, b) => b.pct !== a.pct ? b.pct - a.pct : b.wins - a.wins);
        const rankMap = {};
        all.forEach((t, i) => { rankMap[t.abbr] = i + 1; });
        return rankMap;
      }, [standings]);

      const isRivalry = (a, b) =>
        RIVALRIES.some(([x, y]) => (x === a && y === b) || (x === b && y === a));

      // Collect and classify key games from the next 3 days
      const keyGames = React.useMemo(() => {
        const results = [];
        KEY_DATES.forEach(d => {
          const games = gameCache[d] ?? [];
          games.forEach(g => {
            const ha = g.home.abbreviation;
            const va = g.visitor.abbreviation;
            const hr = ranked[ha] ?? 99;
            const vr = ranked[va] ?? 99;
            const diff = Math.abs((standings[ha]?.wins ?? 0) - (standings[va]?.wins ?? 0));
            let type = null, weight = 0;
            if (hr <= 6 && vr <= 6) { type = "TOP CLASH"; weight = 3; }
            else if (isRivalry(ha, va)) { type = "RIVALRY"; weight = 2; }
            else if (hr <= 10 && vr <= 10 && diff <= 2) { type = "CLOSE RACE"; weight = 1; }
            if (type) results.push({ game: g, date: d, type, weight, hr, vr });
          });
        });
        return results
          .sort((a, b) => b.weight !== a.weight ? b.weight - a.weight : (a.hr + a.vr) - (b.hr + b.vr))
          .slice(0, 6);
      }, [gameCache, ranked, standings]);

      if (!ready || keyGames.length === 0) return null;

      const typeColors = {
        "TOP CLASH":  { bg:"linear-gradient(135deg,#7c3aed,#4f46e5)", pill:"#ede9fe", pillText:"#5b21b6" },
        "RIVALRY":    { bg:"linear-gradient(135deg,#b91c1c,#dc2626)", pill:"#fee2e2", pillText:"#991b1b" },
        "CLOSE RACE": { bg:"linear-gradient(135deg,#0369a1,#0284c7)", pill:"#e0f2fe", pillText:"#075985" },
      };

      const fmtMatchupDate = d => {
        const dt = new Date(d + "T12:00:00");
        return dt.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
      };

      return (
        <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 12px 0":"16px 24px 0" }}>
          <div style={{ background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:18, border:"1px solid rgba(99,102,241,0.35)",
            boxShadow:"0 4px 24px rgba(0,0,0,0.4)", overflow:"hidden" }}>
            {/* Header */}
            <div style={{ background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4f46e5 100%)",
              padding:isMobile?"12px 16px":"14px 20px", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:isMobile?16:18 }}>🔮</span>
              <div>
                <div style={{ fontSize:isMobile?13:14, fontWeight:900, color:"white", letterSpacing:"0.02em" }}>Upcoming Key Matchups</div>
                <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.55)", fontWeight:600, marginTop:1 }}>Next 3 days · Top clashes, rivalries & close races</div>
              </div>
            </div>
            {/* Games list */}
            <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))" }}>
              {keyGames.map(({ game: g, date: d, type, hr, vr }, idx) => {
                const cols = typeColors[type] ?? typeColors["CLOSE RACE"];
                const gt = fmtGameTime(g.status);
                const ha = g.home.abbreviation;
                const va = g.visitor.abbreviation;
                const hs = standings[ha];
                const vs = standings[va];
                return (
                  <div key={g.id} style={{ padding:isMobile?"12px 14px":"14px 18px",
                    borderBottom: idx < keyGames.length - 1 ? "1px solid #f0f4ff" : "none",
                    borderRight: !isMobile && (idx % 3 !== 2) && idx < keyGames.length - 1 ? "1px solid #f0f4ff" : "none",
                    display:"flex", alignItems:"center", gap:10 }}>
                    {/* Type pill */}
                    <div style={{ background:cols.pill, borderRadius:6, padding:"3px 7px", flexShrink:0 }}>
                      <div style={{ fontSize:isMobile?7:8, fontWeight:900, color:cols.pillText, letterSpacing:"0.1em", whiteSpace:"nowrap" }}>{type}</div>
                    </div>
                    {/* Visitor */}
                    <div style={{ display:"flex", alignItems:"center", gap:isMobile?5:7, flex:1, minWidth:0 }}>
                      <TeamLogo abbr={va} size={isMobile?28:32} />
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:isMobile?11:12, fontWeight:900, color:"white" }}>{va}</div>
                        {vs && <div style={{ fontSize:isMobile?8:9, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>#{vr} · {vs.wins}–{vs.losses}</div>}
                      </div>
                    </div>
                    {/* VS + time */}
                    <div style={{ textAlign:"center", flexShrink:0, padding:"0 4px" }}>
                      <div style={{ fontSize:isMobile?8:9, fontWeight:800, color:"rgba(255,255,255,0.4)", letterSpacing:"0.1em" }}>VS</div>
                      {gt && <div style={{ fontSize:isMobile?10:11, fontWeight:800, color:"#fbbf24", marginTop:1 }}>{gt.time} <span style={{ fontSize:8, fontWeight:600, color:"rgba(255,255,255,0.45)" }}>{gt.ampm}</span></div>}
                      <div style={{ fontSize:isMobile?7:8, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>{fmtMatchupDate(d)}</div>
                    </div>
                    {/* Home */}
                    <div style={{ display:"flex", alignItems:"center", gap:isMobile?5:7, flex:1, minWidth:0, justifyContent:"flex-end" }}>
                      <div style={{ minWidth:0, textAlign:"right" }}>
                        <div style={{ fontSize:isMobile?11:12, fontWeight:900, color:"white" }}>{ha}</div>
                        {hs && <div style={{ fontSize:isMobile?8:9, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>#{hr} · {hs.wins}–{hs.losses}</div>}
                      </div>
                      <TeamLogo abbr={ha} size={isMobile?28:32} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Home View ────────────────────────────────────────────────────────────────
    function HomeView({ gameCache, loadDate, spoilerMode, standings }) {
      const isMobile = useWindowWidth() < 600;
      const [selected, setSelected] = useState(DATES[1]);
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState(null);

      useEffect(() => {
        let cancelled = false;
        async function go() {
          if (gameCache[selected] !== undefined) return;
          setLoading(true); setError(null);
          const res = await loadDate(selected);
          if (cancelled) return;
          if (res?.errCode) setError(res.errCode === 401 ? "auth" : "network");
          setLoading(false);
        }
        go();
        return () => { cancelled = true; };
      }, [selected]);

      const games = gameCache[selected];
      return (
        <>
          <div style={{ background:"transparent" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 16px 10px":"14px 24px 12px" }}>
              <div style={{ display:"flex", gap:isMobile?6:8, overflowX:"auto", paddingBottom:4 }} className="mobile-scroll">
                {[FUTURE_DATES[0], ...DATES].map(d => {
                  const active = d === selected;
                  return (
                    <button key={d} onClick={() => setSelected(d)} style={{ flexShrink:0, minWidth:isMobile?60:72,
                      padding:isMobile?"7px 10px":"9px 14px", borderRadius:12, outline:"none",

                        : "rgba(8,12,28,0.62)",

            </div>
          </div>

          {Object.keys(standings).length > 0 && (
            <UpcomingKeyMatchups gameCache={gameCache} loadDate={loadDate} standings={standings} />
          )}

          {/* Top Performers — only when data is ready and games exist */}
          {!loading && !error && games && games.length > 0 && (
            <div style={{ paddingTop:isMobile?12:20 }}>
              <TopPerformers games={games} spoilerMode={spoilerMode} />
            </div>
          )}

          {/* Games grid */}
          <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"16px 12px 20px":"20px 24px 24px",
            display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))", gap:isMobile?12:16, alignItems:"start" }}>
            {loading || !games ? <Spinner full />
            : error ? (
              <div style={{ gridColumn:"1/-1",
                background:"rgba(8,12,28,0.78)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",
                borderRadius:20, border:"1px solid rgba(245,158,11,0.2)", padding:"60px 24px", textAlign:"center",
                boxShadow:"0 4px 24px rgba(0,0,0,0.35)" }}>
                <p style={{ fontSize:44, marginBottom:12 }}>⚠️</p>
                <p style={{ fontWeight:700, color:"white", marginBottom:6 }}>
                  {error==="auth"?"API key not authorised":"Couldn't reach the API"}
                </p>
                <p style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>Check your plan at app.balldontlie.io</p>
              </div>
            ) : games.length === 0 ? (
              <div style={{ gridColumn:"1/-1",
                background:"rgba(8,12,28,0.78)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",

                <p style={{ fontSize:48, marginBottom:12 }}>😴</p>

          </div>
        </>
      );
    }

              <input type="text" placeholder="🔍  Search by player name…" value={playerQuery}
                onChange={e => setPlayerQuery(e.target.value)}
                style={{ width:"100%", maxWidth:isMobile?"100%":"400px", padding:isMobile?"8px 12px":"10px 16px", borderRadius:12,
                  border:"1px solid rgba(245,158,11,0.3)",
                  background:"rgba(8,12,28,0.65)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
                  fontSize:isMobile?12:13, color:"white", outline:"none", marginBottom:12 }} />
              {searching && <Spinner />}
              {!searching && playerResults.length > 0 && (
                <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(240px,1fr))", gap:isMobile?8:10 }}>
                  {playerResults.map(p => (
                    <div key={p.id} style={{
                      background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
                      borderRadius:14, padding:"12px 14px",
                      border:"1px solid rgba(245,158,11,0.18)", display:"flex", alignItems:"center", gap:12,
                      boxShadow:"0 2px 12px rgba(0,0,0,0.3)" }}>
                      <PlayerPhoto player={p} size={40} fetchDelay={800} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ fontSize:13, fontWeight:800, color:"white" }}>{p.first_name} {p.last_name}</p>
                        <p style={{ fontSize:11, color:"#fbbf24" }}>
                          {p.team?.abbreviation ? <><TeamLogo abbr={p.team.abbreviation} size={14} />{" "}{p.team.abbreviation}</> : "Free agent"}
                          {p.position ? ` · ${p.position}` : ""}
                        </p>
                      </div>
                      <button onClick={() => togglePlayer(p)} style={{ background:"none", fontSize:22,
                        lineHeight:1, padding:"4px", color:isFavPlayer(p.id)?"#f59e0b":"rgba(255,255,255,0.25)",
                        transition:"color 0.2s, transform 0.15s" }}
                        onMouseEnter={e => e.currentTarget.style.transform="scale(1.25)"}
                        onMouseLeave={e => e.currentTarget.style.transform="scale(1)"}
                        title={isFavPlayer(p.id)?"Remove from favourites":"Add to favourites"}>★</button>
                    </div>
                  ))}
                </div>
              )}
              {!searching && !playerResults.length && playerQuery.trim() && (
                <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>No players found for "{playerQuery}"</p>
              )}
            </div>
          )}

          {/* Teams search */}
          {tab === "teams" && (
            <div>
              <input type="text" placeholder="🔍  Search teams…" value={teamSearch}
                onChange={e => setTeamSearch(e.target.value)}
                style={{ width:"100%", maxWidth:isMobile?"100%":"400px", padding:isMobile?"8px 12px":"10px 16px", borderRadius:12,
                  border:"1px solid rgba(245,158,11,0.3)",
                  background:"rgba(8,12,28,0.65)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
                  fontSize:isMobile?12:13, color:"white", outline:"none", marginBottom:12 }} />
              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr 1fr":"repeat(auto-fill,minmax(220px,1fr))", gap:isMobile?8:10 }}>
                {filteredTeams.map(t => (
                  <div key={t.abbreviation} style={{
                    background:"rgba(8,12,28,0.72)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
                    borderRadius:14, padding:"12px 14px",
                    border:"1px solid rgba(245,158,11,0.18)", display:"flex", alignItems:"center", gap:12,
                    boxShadow:"0 2px 12px rgba(0,0,0,0.3)" }}>
                    <TeamLogo abbr={t.abbreviation} size={36} />
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.55)" }}>{t.city}</p>
                      <p style={{ fontSize:13, fontWeight:800, color:"white" }}>{t.name}</p>
                    </div>
                    <button onClick={() => toggleTeam(t)} style={{ background:"none", fontSize:22,
                      lineHeight:1, padding:"4px", color:isFavTeam(t.abbreviation)?"#f59e0b":"rgba(255,255,255,0.2)",
                      transition:"color 0.2s, transform 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.transform="scale(1.25)"}
                      onMouseLeave={e => e.currentTarget.style.transform="scale(1)"}
                      title={isFavTeam(t.abbreviation)?"Remove from favourites":"Add to favourites"}>★</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Thin wrapper so TeamView can render a highlights button per game row
    function TeamGameHighlightsBtn({ game }) {
      return (
        <div style={{ padding:"8px 24px 16px" }}>
          <HighlightsButton game={game} date={game.date}
            style={{ width:"auto", padding:"9px 20px" }} />
        </div>
      );
    }

    // ── Team View ────────────────────────────────────────────────────────────────
    function TeamView({ team, gameCache, loadDate, onBack, spoilerMode, standings }) {
      const isMobile = useWindowWidth() < 600;
      const [loadingAll, setLoadingAll] = useState(true);

      useEffect(() => {
        let active = true;
        // Load both past (DATES) and future (FUTURE_DATES) dates
        Promise.all([...DATES, ...FUTURE_DATES].map(d => loadDate(d))).then(() => { if (active) setLoadingAll(false); });
        return () => { active = false; };
      }, [team.abbreviation]);

      const teamGames = DATES
        .flatMap(d => (gameCache[d] ?? [])
          .filter(g => g.home.abbreviation === team.abbreviation || g.visitor.abbreviation === team.abbreviation)
          .map(g => ({ ...g, date: d }))
        )
        .sort((a, b) => b.date.localeCompare(a.date));

      // Upcoming: future dates sorted ascending (soonest first)
      const upcomingGames = FUTURE_DATES
        .flatMap(d => (gameCache[d] ?? [])
          .filter(g => g.home.abbreviation === team.abbreviation || g.visitor.abbreviation === team.abbreviation)
          .map(g => ({ ...g, date: d }))
        )
        .sort((a, b) => a.date.localeCompare(b.date));

      // Weekly record from last 7 days of games
      const finishedGames = teamGames.filter(g => g.status === "Final");
      const weeklyW = finishedGames.filter(g => {
        const isHome = g.home.abbreviation === team.abbreviation;
        const our = isHome ? (g.home.score??0) : (g.visitor.score??0);
        const opp = isHome ? (g.visitor.score??0) : (g.home.score??0);
        return our > opp;
      }).length;
      const weeklyL = finishedGames.length - weeklyW;

      // Upcoming: limit to next 5 games
      const upcomingGames5 = upcomingGames.slice(0, 5);

      // Schedule difficulty: average opponent win% across next 5 games
      const scheduleDifficulty = (() => {
        if (!upcomingGames5.length || !standings) return null;
        const avg = upcomingGames5.reduce((sum, g) => {
          const opp = g.home.abbreviation === team.abbreviation ? g.visitor : g.home;
          const rec = standings[opp.abbreviation];
          const gp = (rec?.wins ?? 0) + (rec?.losses ?? 0);
          return sum + (gp > 0 ? rec.wins / gp : 0.5);
        }, 0) / upcomingGames5.length;
        if (avg < 0.40) return { label:"Easy",      color:"#15803d", bg:"#f0fdf4", border:"#86efac", pct:avg };
        if (avg < 0.50) return { label:"Moderate",  color:"#a16207", bg:"#fefce8", border:"#fde047", pct:avg };
        if (avg < 0.57) return { label:"Hard",      color:"#c2410c", bg:"#fff7ed", border:"#fdba74", pct:avg };
        return                 { label:"Very Hard",  color:"#991b1b", bg:"#fff1f2", border:"#fca5a5", pct:avg };
      })();

      // Team form: last 5 finished games
      const last5 = finishedGames.slice(0, 5);
      const formResults = last5.map(g => {
        const isHome = g.home.abbreviation === team.abbreviation;
        const our  = isHome ? (g.home.score ?? 0) : (g.visitor.score ?? 0);
        const opp  = isHome ? (g.visitor.score ?? 0) : (g.home.score ?? 0);
        const oppAbbr = isHome ? g.visitor.abbreviation : g.home.abbreviation;
        return { won: our > opp, diff: our - opp, oppAbbr };
      });
      const formW = formResults.filter(r => r.won).length;
      const formL = formResults.length - formW;
      const avgDiff = formResults.length > 0
        ? formResults.reduce((s, r) => s + r.diff, 0) / formResults.length
        : null;

      // Season record from standings
      const seasonRec = standings?.[team.abbreviation];

      return (
        <div>
          <div style={{ background:"rgba(8,12,28,0.88)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", borderBottom:"1px solid rgba(245,158,11,0.2)" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 16px":"16px 24px",
              display:"flex", alignItems:"center", gap:isMobile?8:16, flexWrap:"wrap" }}>
              <button onClick={onBack} style={{ background:"rgba(245,158,11,0.15)", border:"1px solid rgba(245,158,11,0.35)",
                borderRadius:10, padding:isMobile?"6px 10px":"8px 14px", color:"#fbbf24", fontWeight:700, fontSize:isMobile?12:13 }}>← Back</button>
              <TeamLogo abbr={team.abbreviation} size={isMobile?32:44} />
              <div>
                <p style={{ fontSize:isMobile?10:11, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>{team.city}</p>
                <h2 style={{ fontSize:isMobile?16:20, fontWeight:900, color:"white" }}>{team.name}</h2>
              </div>
              {/* Records */}
              <div style={{ display:"flex", gap:isMobile?6:10, marginLeft:"auto", flexWrap:"wrap" }}>
                {seasonRec && (
                  <div style={{ background:"rgba(245,158,11,0.15)", borderRadius:isMobile?8:12, padding:isMobile?"6px 10px":"8px 16px", textAlign:"center",
                    border:"1px solid rgba(245,158,11,0.35)" }}>
                    <div style={{ fontSize:isMobile?14:18, fontWeight:900, color:"#fbbf24", lineHeight:1 }}>
                      {seasonRec.wins}–{seasonRec.losses}
                    </div>
                    <div style={{ fontSize:isMobile?8:9, fontWeight:700, color:"rgba(251,191,36,0.7)", letterSpacing:"0.07em", marginTop:1 }}>SEASON</div>
                  </div>
                )}
                {finishedGames.length > 0 && (
                  <div style={{ background: weeklyW > weeklyL ? "rgba(74,222,128,0.15)" : weeklyW < weeklyL ? "rgba(248,113,113,0.15)" : "rgba(255,255,255,0.08)",
                    borderRadius:isMobile?8:12, padding:isMobile?"6px 10px":"8px 16px", textAlign:"center",
                    border: `1px solid ${weeklyW > weeklyL ? "rgba(74,222,128,0.35)" : weeklyW < weeklyL ? "rgba(248,113,113,0.35)" : "rgba(255,255,255,0.15)"}` }}>
                    <div style={{ fontSize:isMobile?14:18, fontWeight:900, lineHeight:1,
                      color: weeklyW > weeklyL ? "#4ade80" : weeklyW < weeklyL ? "#f87171" : "white" }}>
                      {weeklyW}–{weeklyL}
                    </div>
                    <div style={{ fontSize:isMobile?8:9, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.07em", marginTop:1 }}>WEEK</div>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1280, margin:"0 auto", padding:isMobile?"12px 12px 0":"20px 24px 0" }}>

            {/* ── Schedule + Form row — always side-by-side ── */}
            <div style={{ display:"flex", gap:isMobile?12:20, flexDirection:isMobile?"column":"row",
              marginBottom:isMobile?12:20, alignItems:"flex-start" }}>

              {/* ── Upcoming Schedule (always rendered, empty state when no games) ── */}
              <div style={{ flex:"1 1 56%", minWidth:0, background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:isMobile?12:18,
                border:"1px solid rgba(245,158,11,0.22)", boxShadow:"0 4px 20px rgba(0,0,0,0.4)", overflow:"hidden" }}>
                <div style={{ background:"linear-gradient(135deg,#1e1b4b,#1e3a8a)",
                  padding:isMobile?"10px 14px":"12px 20px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <span style={{ fontSize:isMobile?13:15 }}>📅</span>
                  <span style={{ fontSize:isMobile?12:13, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>Upcoming Schedule</span>
                  <span style={{ fontSize:isMobile?10:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginLeft:4 }}>
                    {upcomingGames5.length > 0 ? `Next ${upcomingGames5.length} game${upcomingGames5.length !== 1 ? "s" : ""}` : ""}
                  </span>
                  {scheduleDifficulty && (
                    <span style={{ marginLeft:"auto", padding:"3px 10px", borderRadius:20,
                      background:scheduleDifficulty.bg, border:`1px solid ${scheduleDifficulty.border}`,
                      color:scheduleDifficulty.color, fontSize:isMobile?8:9, fontWeight:800, letterSpacing:"0.06em" }}>
                      {scheduleDifficulty.label.toUpperCase()} SCHEDULE
                    </span>
                  )}
                </div>
                {upcomingGames5.length === 0 ? (
                  <div style={{ padding:"28px 20px", textAlign:"center", color:"rgba(255,255,255,0.4)", fontSize:12, fontWeight:600 }}>
                    {loadingAll ? "Loading schedule…" : "No upcoming games in the next 6 days"}
                  </div>
                ) : (
                  <>
                    {scheduleDifficulty && (
                      <div style={{ padding:isMobile?"8px 14px":"10px 20px", borderBottom:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.04)" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                          <span style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.5)", letterSpacing:"0.06em" }}>DIFFICULTY RATING</span>
                          <span style={{ fontSize:9, fontWeight:800, color:scheduleDifficulty.color }}>
                            {(scheduleDifficulty.pct * 100).toFixed(0)}% avg opp win rate
                          </span>
                        </div>
                        <div style={{ height:5, borderRadius:4, background:"rgba(255,255,255,0.1)", overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${scheduleDifficulty.pct * 100}%`,
                            background:scheduleDifficulty.color, borderRadius:4 }} />
                        </div>
                      </div>
                    )}
                    <div style={{ display:"flex", flexDirection:"column" }}>
                      {upcomingGames5.map((game, idx) => {
                        const isHome = game.home.abbreviation === team.abbreviation;
                        const opp = isHome ? game.visitor : game.home;
                        const gt = fmtGameTime(game.status);
                        const oppRec = standings?.[opp.abbreviation];
                        const oppWinPct = oppRec ? oppRec.wins / Math.max(1, oppRec.wins + oppRec.losses) : null;
                        return (
                          <div key={game.id} style={{ display:"flex", alignItems:"center",
                            padding:isMobile?"10px 14px":"12px 20px", gap:isMobile?10:16,
                            borderBottom: idx < upcomingGames5.length - 1 ? "1px solid rgba(255,255,255,0.07)" : "none",
                            background: idx % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.02)" }}>
                            <div style={{ minWidth:isMobile?38:48, flexShrink:0, textAlign:"center" }}>
                              <div style={{ fontSize:isMobile?9:10, fontWeight:700, color:"rgba(255,255,255,0.45)",
                                letterSpacing:"0.07em", textTransform:"uppercase", lineHeight:1 }}>
                                {new Date(game.date + "T12:00:00").toLocaleDateString("en-US",{weekday:"short"})}
                              </div>
                              <div style={{ fontSize:isMobile?13:15, fontWeight:900, color:"white", lineHeight:1.2 }}>
                                {new Date(game.date + "T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"})}
                              </div>
                            </div>
                            <span style={{ fontSize:isMobile?8:9, fontWeight:800, letterSpacing:"0.07em",
                              padding:"2px 7px", borderRadius:20, flexShrink:0,
                              background: isHome ? "rgba(59,130,246,0.2)" : "rgba(255,255,255,0.1)",
                              color: isHome ? "#60a5fa" : "rgba(255,255,255,0.7)" }}>
                              {isHome ? "HOME" : "AWAY"}
                            </span>
                            <div style={{ display:"flex", alignItems:"center", gap:isMobile?6:10, flex:1, minWidth:0 }}>
                              <TeamLogo abbr={opp.abbreviation} size={isMobile?28:34} />
                              <div>
                                <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"white" }}>
                                  {isMobile ? opp.abbreviation : `${opp.city} ${opp.name}`}
                                </div>
                                {oppRec && (
                                  <div style={{ fontSize:isMobile?9:10, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>
                                    {oppRec.wins}–{oppRec.losses}
                                    {oppWinPct !== null && (
                                      <span style={{ color:"rgba(255,255,255,0.35)", marginLeft:4 }}>({(oppWinPct*100).toFixed(0)}%)</span>
                                    )}
                                  </div>
                                )}
                              </div>
                            </div>
                            <div style={{ flexShrink:0, textAlign:"right" }}>
                              {gt ? (
                                <>
                                  <div style={{ fontSize:isMobile?11:13, fontWeight:800, color:"white" }}>
                                    {gt.time} <span style={{ fontSize:isMobile?9:10, fontWeight:600 }}>{gt.ampm}</span>
                                  </div>
                                  <div style={{ fontSize:isMobile?8:9, color:"rgba(255,255,255,0.45)", fontWeight:600 }}>{gt.tz}</div>
                                </>
                              ) : (
                                <span style={{ fontSize:isMobile?10:11, color:"rgba(255,255,255,0.35)", fontWeight:700 }}>TBD</span>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>

              {/* ── Team Form ── */}
              {last5.length > 0 && (
                <div style={{ flex:"1 1 40%", minWidth:0, background:"rgba(8,12,28,0.78)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", borderRadius:isMobile?12:18,
                  border:"1px solid rgba(245,158,11,0.22)", boxShadow:"0 4px 20px rgba(0,0,0,0.4)", overflow:"hidden" }}>
                  <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a8a)",
                    padding:isMobile?"10px 14px":"12px 20px", display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:isMobile?13:15 }}>📈</span>
                    <span style={{ fontSize:isMobile?12:13, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>Team Form</span>
                    <span style={{ fontSize:isMobile?10:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginLeft:4 }}>
                      Last {last5.length} games
                    </span>
                  </div>
                  <div style={{ padding:isMobile?"14px":"20px", display:"flex", flexDirection:"column", gap:isMobile?14:18 }}>
                    <div>
                      <div style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.07em", marginBottom:8 }}>RESULTS (most recent first)</div>
                      <div style={{ display:"flex", gap:isMobile?8:12, flexWrap:"wrap" }}>
                        {formResults.map((r, i) => (
                          <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                            <div style={{ width:isMobile?34:40, height:isMobile?34:40, borderRadius:"50%",
                              background: r.won ? "rgba(74,222,128,0.2)" : "rgba(248,113,113,0.2)",
                              border:`2px solid ${r.won ? "rgba(74,222,128,0.6)" : "rgba(248,113,113,0.6)"}`,
                              display:"flex", alignItems:"center", justifyContent:"center",
                              fontSize:isMobile?12:14, fontWeight:900,
                              color: r.won ? "#4ade80" : "#f87171" }}>
                              {r.won ? "W" : "L"}
                            </div>
                            <div style={{ fontSize:8, fontWeight:700, color:"rgba(255,255,255,0.45)" }}>vs {r.oppAbbr}</div>
                            <div style={{ fontSize:8, fontWeight:800, color: r.diff > 0 ? "#4ade80" : "#f87171" }}>
                              {r.diff > 0 ? "+" : ""}{r.diff}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.07em" }}>FORM TREND</span>
                        <span style={{ fontSize:9, fontWeight:600, color:"rgba(255,255,255,0.45)" }}>
                          {[...formResults].reverse().map(r => r.won ? "W" : "L").join(" → ")}
                        </span>
                      </div>
                      <div style={{ display:"flex", gap:3, height:8, borderRadius:4, overflow:"hidden" }}>
                        {[...formResults].reverse().map((r, i) => (
                          <div key={i} style={{ flex:1, borderRadius:2,
                            background: r.won ? "#22c55e" : "#ef4444",
                            opacity: 0.45 + (i / Math.max(formResults.length - 1, 1)) * 0.55 }} />
                        ))}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:isMobile?10:14 }}>
                      <div style={{ flex:1, background: formW >= formL ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.15)",
                        border:`1px solid ${formW >= formL ? "rgba(74,222,128,0.35)" : "rgba(248,113,113,0.35)"}`,
                        borderRadius:10, padding:isMobile?"10px":"14px", textAlign:"center" }}>
                        <div style={{ fontSize:isMobile?22:28, fontWeight:900, lineHeight:1,
                          color: formW > formL ? "#4ade80" : formW < formL ? "#f87171" : "#fbbf24" }}>
                          {formW}–{formL}
                        </div>
                        <div style={{ fontSize:8, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.07em", marginTop:3 }}>FORM RECORD</div>
                      </div>
                      {avgDiff !== null && (
                        <div style={{ flex:1, background: avgDiff >= 0 ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.15)",
                          border:`1px solid ${avgDiff >= 0 ? "rgba(74,222,128,0.35)" : "rgba(248,113,113,0.35)"}`,
                          borderRadius:10, padding:isMobile?"10px":"14px", textAlign:"center" }}>
                          <div style={{ fontSize:isMobile?22:28, fontWeight:900, lineHeight:1,
                            color: avgDiff > 0 ? "#4ade80" : avgDiff < 0 ? "#f87171" : "rgba(255,255,255,0.5)" }}>
                            {avgDiff > 0 ? "+" : ""}{avgDiff.toFixed(1)}
                          </div>
                          <div style={{ fontSize:8, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:"0.07em", marginTop:3 }}>AVG PT DIFF</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* ── Past games grid ── */}
            {loadingAll && !teamGames.length ? <Spinner full />
            : !teamGames.length ? (
              <div style={{ textAlign:"center", padding:"80px 24px" }}>
                <p style={{ fontSize:48, marginBottom:12 }}>📅</p>
                <p style={{ fontWeight:700, color:"white" }}>No games in the last 7 days</p>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))", gap:isMobile?12:16, alignItems:"start",
                paddingBottom:isMobile?16:24 }}>
                {teamGames.map((game, idx) => (
                  <GameCard key={game.id} game={game} delay={idx} spoilerMode={spoilerMode}
                    date={game.date} standings={standings} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── ErrorBoundary — prevents a single component error from blanking the page ──
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      componentDidCatch(e, info) { console.error("NBA CatchUp error:", e, info); }
      render() {
        if (!this.state.err) return this.props.children;
        return (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            minHeight:"100vh", background:"rgba(8,12,28,0.85)", padding:32, textAlign:"center" }}>

            <p style={{ fontSize:13, color:"#60a5fa", marginBottom:24, maxWidth:400 }}>

                color:"white", fontSize:13, fontWeight:700 }}>

          </div>
        );
      }
    }

    // ── Stakes View ───────────────────────────────────────────────────────────────
    function StakesView({ gameCache, loadDate, currentUser, standings, votes, loadingVotes, leaderboard }) {
      const isMobile = useWindowWidth() < 600;
      const [tab,          setTab]          = useState("vote");
      const [submitting,   setSubmitting]   = useState(null); // gameId being submitted

      // Vote dates: today + next 2 days. Result dates: yesterday + 2 more past days.
      const VOTE_DATES    = [DATES[0], ...FUTURE_DATES.slice(0, 2)];
      const RESULT_DATES  = DATES.slice(1, 4);
      const ALL_DATES     = [...new Set([...VOTE_DATES, ...RESULT_DATES])];
      // Extra history for all-time leaderboard: load last 30 days of game results
      const HISTORY_DATES = Array.from({ length: 30 }, (_, i) => dateStr(i + 1));

      // Load game data — core dates immediately, history in background
      useEffect(() => {
        ALL_DATES.forEach(d => { if (gameCache[d] === undefined) loadDate(d); });
        // Load history in batches of 5 to feed the all-time leaderboard
        (async () => {
          for (let i = 0; i < HISTORY_DATES.length; i += 5) {
            await Promise.all(
              HISTORY_DATES.slice(i, i + 5)
                .filter(d => gameCache[d] === undefined)
                .map(d => loadDate(d))
            );
          }
        })();
      }, []);

      // Firestore real-time votes listener — query ALL votes (all-time)
      useEffect(() => {
        if (!fbDb) { setLoadingVotes(false); return; }
        const q = fbDb.collection("votes");
        const unsub = q.onSnapshot(snap => {
          const v = {};
          snap.docs.forEach(doc => {
            const d = doc.data();
            const key = `${d.date}_${d.gameId}`;
            if (!v[key]) v[key] = {};
            v[key][d.userId] = { teamAbbr: d.teamAbbr, username: d.username, avatar: d.avatar ?? AVATARS[0].id };
          });
          setVotes(v);
          setLoadingVotes(false);
        }, err => { console.error("Votes err:", err); setLoadingVotes(false); });
        return () => unsub();
      }, []);

      // Submit / change a vote
      const submitVote = async (gameId, date, teamAbbr) => {
        if (!currentUser || !fbDb) return;
        setSubmitting(gameId);
        try {
          const voteId = `${date}_${gameId}_${currentUser.uid}`;
          await fbDb.collection("votes").doc(voteId).set({
            userId:    currentUser.uid,
            username:  currentUser.username,
            avatar:    currentUser.avatar ?? AVATARS[0].id,
            teamAbbr, date,
            gameId:    String(gameId),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });
        } catch(e) { console.error("Vote submit err:", e); }
        setSubmitting(null);
      };

      // ── Voting deadline: 1 hour before each game's tip-off ───────────────────────
      // Returns the game's tip-off as a UTC ms timestamp, or null if time is unknown.
      const getGameStartMs = (game, gameDate) => {
        // If status is already an ISO timestamp, parse it directly — no tz math needed
        if (game.status && /^\d{4}-\d{2}-\d{2}T\d/.test(game.status)) {
          const ms = new Date(game.status).getTime();
          if (!isNaN(ms)) return ms;
        }
        const gt = fmtGameTime(game.status);
        if (!gt) return null;
        let hour = parseInt(gt.time.split(":")[0]);
        const min  = parseInt(gt.time.split(":")[1] ?? "0");
        if (gt.ampm.toUpperCase() === "PM" && hour !== 12) hour += 12;
        if (gt.ampm.toUpperCase() === "AM" && hour === 12) hour = 0;
        // Map BallDontLie timezone abbreviations to IANA zones
        const ianaZone = ({ ET:"America/New_York", CT:"America/Chicago", MT:"America/Denver", PT:"America/Los_Angeles" })[gt.tz] ?? "America/New_York";
        // Find the UTC offset for this zone on the game date using Intl
        const probe = new Date(`${gameDate}T12:00:00Z`);
        const localHour = parseInt(new Intl.DateTimeFormat("en-US", { timeZone: ianaZone, hour:"numeric", hour12:false }).format(probe));
        const offsetH = 12 - localHour; // hours to add to local time to get UTC
        // Build UTC milliseconds for the tip-off
        return Date.UTC(
          parseInt(gameDate.slice(0,4)),
          parseInt(gameDate.slice(5,7)) - 1,
          parseInt(gameDate.slice(8,10)),
          hour + offsetH, min, 0
        );
      };

      // Returns true if voting is still allowed for this specific game
      const isVotingOpenForGame = (game, gameDate) => {
        const { date: todayIL } = (() => {
          const now = new Date();
          const fmt = new Intl.DateTimeFormat("en-CA", { timeZone:"Asia/Jerusalem", year:"numeric", month:"2-digit", day:"2-digit" });
          const parts = fmt.formatToParts(now);
          const get = t => parts.find(p => p.type === t)?.value ?? "0";
          return { date: `${get("year")}-${get("month")}-${get("day")}` };
        })();
        if (gameDate < todayIL) return false;   // past date → always closed
        const startMs = getGameStartMs(game, gameDate);
        if (startMs === null) return gameDate >= todayIL; // no time info → open until game day passes
        return Date.now() < startMs - 60 * 60 * 1000;    // must be > 1 h before tip-off
      };

      // Returns a human countdown string ("2h 14m left", "45m left") or null
      const votingClosesInForGame = (game, gameDate) => {
        const startMs = getGameStartMs(game, gameDate);
        if (startMs === null) return null;
        const minsLeft = Math.round((startMs - 60 * 60 * 1000 - Date.now()) / 60000);
        if (minsLeft <= 0) return null;
        if (minsLeft < 60) return `${minsLeft}m left to vote`;
        return `${Math.floor(minsLeft / 60)}h ${minsLeft % 60}m left to vote`;
      };

      // Per-date check (used for the vote tab open/closed badge)
      const isVotingOpen = (gameDate) => {
        const gamesForDate = gameCache[gameDate] ?? [];
        // Date is open if ANY game on that day still accepts votes
        if (gamesForDate.length === 0) {
          // Fallback: check if the date itself is today or in the future
          const now = new Date();
          const today = new Intl.DateTimeFormat("en-CA", { timeZone:"Asia/Jerusalem" }).format(now);
          return gameDate >= today;
        }
        return gamesForDate.some(g => isVotingOpenForGame(g, gameDate));
      };

      // Determine game winner
      const getWinner = g =>
        g.status === "Final" && g.home.score != null && g.visitor.score != null
          ? ((g.home.score > g.visitor.score) ? g.home.abbreviation : g.visitor.abbreviation)
          : null;

      // leaderboard is passed as a prop from App (globalLeaderboard)

      const av = id => AVATARS.find(a => a.id === id) ?? AVATARS[0];
      const myVoteFor = (gameId, date) => votes[`${date}_${gameId}`]?.[currentUser?.uid]?.teamAbbr ?? null;

      // ── Vote card for a single upcoming game ──
      const VoteCard = ({ game, date }) => {
        const voteOpen    = isVotingOpenForGame(game, date);
        const countdown   = votingClosesInForGame(game, date);
        const myVote      = myVoteFor(game.id, date);
        const allVotes    = votes[`${date}_${game.id}`] ?? {};
        const homeVoterEntries = Object.entries(allVotes).filter(([, v]) => v.teamAbbr === game.home.abbreviation);
        const awayVoterEntries = Object.entries(allVotes).filter(([, v]) => v.teamAbbr === game.visitor.abbreviation);
        const totalVotes  = Object.keys(allVotes).length;
        const homePct     = totalVotes > 0 ? Math.round(homeVoterEntries.length / totalVotes * 100) : 50;
        const awayPct     = 100 - homePct;
        const gt          = fmtGameTime(game.status);
        const isBusy      = submitting === game.id;
        const [showPicks,       setShowPicks]       = useState(false);
        const [showFriendPicks, setShowFriendPicks] = useState(false);
        const friendUids  = currentUser?.friends ?? [];
        const friendVoterEntries = Object.entries(allVotes).filter(([uid]) => friendUids.includes(uid));
        const friendAwayEntries  = friendVoterEntries.filter(([, v]) => v.teamAbbr === game.visitor.abbreviation);
        const friendHomeEntries  = friendVoterEntries.filter(([, v]) => v.teamAbbr === game.home.abbreviation);
        const friendTotal        = friendVoterEntries.length;
        const friendAwayPct      = friendTotal > 0 ? Math.round(friendAwayEntries.length / friendTotal * 100) : 50;
        const friendHomePct      = 100 - friendAwayPct;

        const pickTeam = async (abbr) => {
          if (!voteOpen || !currentUser) return;
          await submitVote(game.id, date, abbr);
        };

        // Single voter row used in the expanded panel
        const VoterRow = ({ uid, vote }) => {
          const a = av(vote.avatar);
          const isMe = uid === currentUser?.uid;
          return (
            <div style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 8px", borderRadius:8,
              background: isMe ? "rgba(99,102,241,0.2)" : "rgba(255,255,255,0.06)", marginBottom:4,
              border: isMe ? "1px solid rgba(99,102,241,0.4)" : "1px solid transparent" }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:a.bg, flexShrink:0,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:11 }}>
                {a.emoji}
              </div>
              <span style={{ fontSize:isMobile?10:11, fontWeight:700, color:"white", flex:1,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{vote.username}</span>
              {isMe && <span style={{ fontSize:8, fontWeight:800, color:"#a5b4fc",
                background:"rgba(99,102,241,0.25)", borderRadius:8, padding:"1px 5px", flexShrink:0 }}>YOU</span>}
            </div>
          );

      // ── Result card for a finished game ──
      const ResultCard = ({ game, date }) => {
        const [showAll,     setShowAll]     = useState(false);
        const [showFriends, setShowFriends] = useState(false);

        const friendUids = currentUser?.friends ?? [];
        const av = id => AVATARS.find(a => a.id === id) ?? AVATARS[0];

        const winner    = getWinner(game);
        const allVotes  = votes[`${date}_${game.id}`] ?? {};
        const myVote    = allVotes[currentUser?.uid]?.teamAbbr ?? null;
        const myResult  = myVote && winner ? (myVote === winner ? "correct" : "wrong") : null;
        const voterList = Object.entries(allVotes);
        if (!winner && voterList.length === 0) return null;

        // Split votes by team
        const awayEntries = voterList.filter(([, v]) => v.teamAbbr === game.visitor.abbreviation);
        const homeEntries = voterList.filter(([, v]) => v.teamAbbr === game.home.abbreviation);
        const total       = voterList.length;
        const awayPct     = total > 0 ? Math.round(awayEntries.length / total * 100) : 0;
        const homePct     = total > 0 ? 100 - awayPct : 0;

        // Friends split
        const friendEntries = voterList.filter(([uid]) => friendUids.includes(uid));
        const friendAway    = friendEntries.filter(([, v]) => v.teamAbbr === game.visitor.abbreviation);
        const friendHome    = friendEntries.filter(([, v]) => v.teamAbbr === game.home.abbreviation);
        const friendTotal   = friendEntries.length;
        const friendAwayPct = friendTotal > 0 ? Math.round(friendAway.length / friendTotal * 100) : 0;
        const friendHomePct = friendTotal > 0 ? 100 - friendAwayPct : 0;

        const VRow = ({ uid, vote }) => {
          const correct = winner ? vote.teamAbbr === winner : null;
          const a = av(vote.avatar);
          const isMe = uid === currentUser?.uid;
          return (
            <div style={{ display:"flex", alignItems:"center", gap:6, padding:"4px 6px", borderRadius:7, marginBottom:3,

              border: isMe ? "1px solid rgba(99,102,241,0.35)" : "1px solid transparent" }}>
              <div style={{ width:20, height:20, borderRadius:"50%", background:a.bg,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, flexShrink:0 }}>{a.emoji}</div>
              <span style={{ flex:1, fontSize:isMobile?9:10, fontWeight:700, color:"white",
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{vote.username}</span>
              {correct !== null && <span style={{ fontSize:10 }}>{correct ? "✅" : "❌"}</span>}
            </div>
          );
        };

        return (
          <div style={{ background:"rgba(8,12,28,0.72)", backdropFilter:"blur(14px)", WebkitBackdropFilter:"blur(14px)",

            {/* Score header */}
            <div style={{ background: winner ? "linear-gradient(135deg,#0f172a,#1e3a8a)" : "rgba(255,255,255,0.06)",

              <TeamLogo abbr={game.visitor.abbreviation} size={22} />
              <span style={{ fontSize:isMobile?12:13, fontWeight:800,
                color: winner === game.visitor.abbreviation ? "white" : "rgba(255,255,255,0.45)" }}>
                {game.visitor.abbreviation}
              </span>
              <span style={{ fontSize:isMobile?14:16, fontWeight:900, color:"white", flex:1, textAlign:"center" }}>
                {game.visitor.score ?? "?"} – {game.home.score ?? "?"}
              </span>
              <span style={{ fontSize:isMobile?12:13, fontWeight:800,
                color: winner === game.home.abbreviation ? "white" : "rgba(255,255,255,0.45)" }}>
                {game.home.abbreviation}
              </span>
              <TeamLogo abbr={game.home.abbreviation} size={22} />
              {myResult && (
                <span style={{ fontSize:13, marginLeft:4 }}>{myResult === "correct" ? "✅" : "❌"}</span>
              )}
            </div>

            {/* Vote % bar */}
            {total > 0 && (
              <div style={{ padding:"10px 14px 0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <TeamLogo abbr={game.visitor.abbreviation} size={14} />
                    <span style={{ fontSize:isMobile?11:12, fontWeight:900, color:"#a5b4fc" }}>{awayPct}%</span>
                    <span style={{ fontSize:9, color:"rgba(255,255,255,0.4)" }}>({awayEntries.length})</span>
                  </div>
                  <span style={{ fontSize:9, color:"rgba(255,255,255,0.4)", fontWeight:700 }}>{total} pick{total !== 1 ? "s" : ""}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <span style={{ fontSize:9, color:"rgba(255,255,255,0.4)" }}>({homeEntries.length})</span>
                    <span style={{ fontSize:isMobile?11:12, fontWeight:900, color:"#f59e0b" }}>{homePct}%</span>
                    <TeamLogo abbr={game.home.abbreviation} size={14} />
                  </div>
                </div>
                <div style={{ height:8, borderRadius:6, background:"rgba(255,255,255,0.1)", overflow:"hidden", display:"flex" }}>
                  <div style={{ width:`${awayPct}%`, background:"linear-gradient(90deg,#6366f1,#818cf8)", transition:"width 0.5s", borderRadius:"6px 0 0 6px" }} />
                  <div style={{ flex:1, background:"linear-gradient(90deg,#f59e0b,#fbbf24)", borderRadius:"0 6px 6px 0" }} />
                </div>
              </div>
            )}

            {/* Toggle buttons */}
            <div style={{ display:"flex", borderTop:"1px solid rgba(255,255,255,0.08)", marginTop: total > 0 ? 10 : 0 }}>
              <button onClick={() => { setShowAll(p => !p); setShowFriends(false); }}
                style={{ flex:1, padding:"9px 8px", background: showAll ? "rgba(99,102,241,0.15)" : "none",
                  border:"none", borderRight:"1px solid rgba(255,255,255,0.08)", cursor:"pointer",
                  fontSize:isMobile?10:11, fontWeight:700, color:"#a5b4fc",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                <span>👥</span>
                <span>{total > 0 ? `All ${total} pick${total !== 1 ? "s" : ""}` : "No picks"}</span>

                  display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                <span>🤝</span>
                <span>Friends{friendTotal > 0 ? ` (${friendTotal})` : ""}</span>

            {showAll && (
              <div style={{ padding:"0 12px 12px", borderTop:"1px solid rgba(255,255,255,0.08)" }}>
